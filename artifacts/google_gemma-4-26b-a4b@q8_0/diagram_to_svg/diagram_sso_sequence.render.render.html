<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{padding:24px;display:inline-block;background:#fff}
  /* Force a concrete render box: many model-emitted SVGs only set viewBox.
     Without a width here, an inline-block parent collapses the SVG to its
     intrinsic ~300x150 (or smaller) and the screenshot becomes a tiny
     blank tile. Fixed width + auto height uses viewBox aspect-ratio. */
  .wrap svg{display:block;width:1200px;height:auto;max-width:none}
</style></head><body><div class="wrap"><svg viewBox="0 0 1000 850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Title -->
  <text x="500" y="50" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" font-weight="bold">SSO - Ablaufdiagramm</text>

  <!-- Entities -->
  
  <!-- Benutzer (Stick Figure) -->
  <g id="user_group">
    <circle cx="100" cy="250" r="15" fill="none" stroke="black" stroke-width="2"/>
    <line x1="100" y1="265" x2="100" y2="310" stroke="black" stroke-width="2"/>
    <line x1="80" y1="280" x2="120" y2="280" stroke="black" stroke-width="2"/>
    <line x1="100" y1="310" x2="85" y2="340" stroke="black" stroke-width="2"/>
    <line x1="100" y1="310" x2="115" y2="340" stroke="black" stroke-width="2"/>
    <text x="100" y="365" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Benutzer</text>
  </g>

  <!-- App / Service Provider -->
  <g id="app_sp_group">
    <rect x="350" y="220" width="160" height="80" fill="none" stroke="black" stroke-width="2"/>
    <text x="430" y="255" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">App /</text>
    <text x="430" y="275" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Service Provider</text>
  </g>

  <!-- Identity Provider (IdP) -->
  <g id="idp_group">
    <rect x="650" y="180" width="180" height="80" fill="none" stroke="black" stroke-width="2"/>
    <text x="740" y="215" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Identity Provider</text>
    <text x="740" y="235" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">(IdP)</text>
  </g>

  <!-- Login-Seite -->
  <g id="login_group">
    <rect x="650" y="380" width="160" height="70" fill="none" stroke="black" stroke-width="2"/>
    <text x="730" y="420" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Login-Seite</text>
  </g>

  <!-- Decision Diamond -->
  <g id="decision_group">
    <polygon points="730,540 810,580 730,620 650,580" fill="none" stroke="black" stroke-width="2"/>
    <text x="730" y="575" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Anmeldedaten</text>
    <text x="730" y="595" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">korrekt?</text>
  </g>

  <!-- Token / Assertion Box -->
  <g id="token_group">
    <rect x="650" y="700" width="180" height="70" fill="none" stroke="black" stroke-width="2"/>
    <text x="740" y="730" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">5. Token / Assertion</text>
    <text x="740" y="750" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">(SSO-Response)</text>
  </g>

  <!-- Zugriff gewährt Box -->
  <g id="access_group">
    <rect x="350" y="700" width="160" height="70" fill="none" stroke="black" stroke-width="2"/>
    <text x="430" y="740" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Zugriff gewährt</text>
  </g>

  <!-- Connections and Arrows -->
  <g id="connections_group">
    <!-- 1. Zugang zu App -->
    <line x1="140" y1="280" x2="350" y2="260" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)" />
    <text x="245" y="250" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">1. Zugang zu App</text>

    <!-- 2. Weiterleitung zur Login-Seite -->
    <line x1="510" y1="240" x2="650" y2="220" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)" />
    <text x="580" y="210" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">2. Weiterleitung zur Login-Seite</text>

    <!-- 3. Login-Seite anzeigen -->
    <line x1="740" y1="260" x2="740" y2="380" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)" />
    <text x="750" y="320" font-family="Arial, sans-serif" font-size="12" text-anchor="start">3. Login-Seite anzeigen</text>

    <!-- Benutzer gibt Anmeldedaten ein -->
    <line x1="140" y1="330" x2="650" y2="415" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)" />
    <text x="400" y="370" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Benutzer gibt Anmeldedaten ein</text>

    <!-- 4. Authentifizierung -->
    <line x1="730" y1="450" x2="730" y2="540" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)" />
    <text x="740" y="490" font-family="Arial, sans-serif" font-size="12" text-anchor="start">4. Authentifizierung</text>

    <!-- 5. Token / Assertion (Ja) -->
    <line x1="730" y1="620" x2="730" y2="700" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)" />
    <text x="740" y="660" font-family="Arial, sans-serif" font-size="12" text-anchor="start">Ja</text>

    <!-- Nein path -->
    <line x1="810" y1="580" x2="850" y2="580" stroke="black" stroke-width="1.5" />
    <text x="830" y="575" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Nein</text>

    <!-- 6. Redirect zurück zur App mit Token -->
    <path d="M 650 580 L 300 580 L 300 300 L 350 300" fill="none" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)" />
    <text x="475" y="570" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">6. Redirect zurück zur App mit Token</text>

    <!-- 7. Zugriff auf Ressourcen -->
    <line x1="430" y1="300" x2="430" y2="700" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)" />
    <text x="440" y="500" font-family="Arial, sans-serif" font-size="12" text-anchor="start">7. Zugriff auf Ressourcen</text>
  </g>
</svg></div></body></html>
