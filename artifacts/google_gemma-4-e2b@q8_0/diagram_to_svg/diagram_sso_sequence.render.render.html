<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{padding:24px;display:inline-block;background:#fff}
  /* Force a concrete render box: many model-emitted SVGs only set viewBox.
     Without a width here, an inline-block parent collapses the SVG to its
     intrinsic ~300x150 (or smaller) and the screenshot becomes a tiny
     blank tile. Fixed width + auto height uses viewBox aspect-ratio. */
  .wrap svg{display:block;width:1200px;height:auto;max-width:none}
</style></head><body><div class="wrap"><svg width="100%" height="650" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
    <style>
        .box {
            fill: #f9f9f9;
            stroke: #333;
            stroke-width: 2;
            rx: 8;
        }
        .text {
            font-family: Arial, sans-serif;
            font-size: 14px;
            fill: #000;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            fill: #333;
        }
        .arrow {
            stroke: #333;
            stroke-width: 2;
            marker-end: url(#arrowhead);
        }
    </style>

    <defs>
        <!-- Marker Definition for Arrows -->
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="600" y="40" text-anchor="middle" class="title">SSO - Ablaufdiagramm</text>

    <!-- Node Definitions (Coordinates based on a central flow) -->

    <!-- 1. Benutzer -->
    <g id="user">
        <rect x="150" y="300" width="150" height="60" class="box"/>
        <text x="225" y="335" text-anchor="middle" class="text">1. Benutzer</text>
    </g>

    <!-- 2. App / Service Provider -->
    <g id="app_sp">
        <rect x="400" y="300" width="180" height="60" class="box"/>
        <text x="490" y="335" text-anchor="middle" class="text">2. App / Service Provider</text>
    </g>

    <!-- 3. Identity Provider (IdP) -->
    <g id="idp">
        <rect x="650" y="150" width="200" height="100" class="box"/>
        <text x="750" y="205" text-anchor="middle" class="text">Identity Provider (IdP)</text>
    </g>

    <!-- 4. Login-Seite -->
    <g id="login_page">
        <rect x="650" y="450" width="200" height="80" class="box"/>
        <text x="750" y="485" text-anchor="middle" class="text">3. Login-Seite</text>
    </g>

    <!-- 5. Token / Assertion (SSO-Response) -->
    <g id="token">
        <rect x="950" y="300" width="180" height="60" class="box"/>
        <text x="1040" y="335" text-anchor="middle" class="text">5. Token / Assertion (SSO-Response)</text>
    </g>

    <!-- 6. Redirect zurück zur App mit Token -->
    <g id="redirect_back">
        <rect x="400" y="550" width="200" height="60" class="box"/>
        <text x="500" y="585" text-anchor="middle" class="text">6. Redirect zurück zur App mit Token</text>
    </g>

    <!-- 7. Zugriff aus Ressourcen -->
    <g id="access_resource">
        <rect x="150" y="650" width="150" height="60" class="box"/>
        <text x="225" y="685" text-anchor="middle" class="text">7. Zugriff aus Ressourcen</text>
    </g>

    <!-- 8. Zugriff gewährt -->
    <g id="access_granted">
        <rect x="400" y="650" width="180" height="60" class="box"/>
        <text x="490" y="685" text-anchor="middle" class="text">8. Zugriff gewährt</text>
    </g>

    <!-- Internal Flow / Decision Points -->

    <!-- Connection 1: User -> App/SP -->
    <line x1="300" y1="330" x2="400" y2="330" class="arrow"/>
    <text x="350" y="310" class="text">Start</text>

    <!-- Connection 2: App/SP -> IdP (Initiation) -->
    <line x1="580" y1="330" x2="650" y2="200" class="arrow"/>

    <!-- Connection 3: IdP -> Login Page -->
    <line x1="750" y1="250" x2="750" y2="450" class="arrow"/>

    <!-- Connection 4: Login Page -> IdP (Authentication Request) -->
    <line x1="750" y1="530" x2="650" y2="450" class="arrow"/>

    <!-- Connection 5: IdP -> Token (Success Path) -->
    <line x1="850" y1="250" x2="950" y2="300" class="arrow"/>

    <!-- Connection 6: Token -> App/SP (Implied flow after token acquisition) -->
    <line x1="950" y1="360" x2="400" y2="550" class="arrow"/>

    <!-- Connection 7: App/SP -> Redirect Back -->
    <line x1="580" y1="550" x2="580" y2="550" class="arrow"/> <!-- Placeholder for flow clarity -->


    <!-- Failure Path (Login Page decision) -->
    <line x1="750" y1="530" x2="750" y2="600" class="arrow" style="stroke: red; stroke-width: 2; marker-end: url(#arrowhead_fail);"/>
    <text x="750" y="545" class="text" fill="red">Nein</text>

    <!-- Failure Path -> IdP (Retry/Error handling) -->
    <line x1="750" y1="600" x2="650" y2="250" class="arrow" style="stroke: red; stroke-width: 2; marker-end: url(#arrowhead_fail);"/>

    <!-- Dummy Marker for Failure (Red) -->
    <marker id="arrowhead_fail" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="red" />
    </marker>

    <!-- Final Access Flow -->
    <line x1="490" y1="685" x2="490" y2="700" class="arrow"/> <!-- Vertical line down to access granted -->


</svg></div></body></html>
