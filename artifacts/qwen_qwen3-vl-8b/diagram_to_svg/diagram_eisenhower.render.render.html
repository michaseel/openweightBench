<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{padding:24px;display:inline-block;background:#fff}
  /* Force a concrete render box: many model-emitted SVGs only set viewBox.
     Without a width here, an inline-block parent collapses the SVG to its
     intrinsic ~300x150 (or smaller) and the screenshot becomes a tiny
     blank tile. Fixed width + auto height uses viewBox aspect-ratio. */
  .wrap svg{display:block;width:1200px;height:auto;max-width:none}
</style></head><body><div class="wrap"><svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .axis { stroke: #000; stroke-width: 2; }
    .label { fill: #000; font-size: 16px; font-family: Arial, sans-serif; }
    .box { fill: #f9f9f9; stroke: #000; stroke-width: 2; }
    .text { fill: #000; font-size: 14px; font-family: Arial, sans-serif; }
    .arrow { stroke: #000; stroke-width: 2; marker-end: url(#arrowhead); }
    .marker { fill: #000; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#000" />
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="200" y1="100" x2="200" y2="700" class="axis" />
  <line x1="200" y1="700" x2="1000" y2="700" class="axis" />

  <!-- Y-Axis Label -->
  <text x="150" y="350" class="label" transform="rotate(-90)">Wichtigkeit</text>

  <!-- X-Axis Label -->
  <text x="600" y="750" class="label">Dringlichkeit</text>

  <!-- Quadrant Labels -->
  <text x="300" y="120" class="label" font-weight="bold">Wichtig + Nicht dringend</text>
  <text x="700" y="120" class="label" font-weight="bold">Wichtig + Dringend</text>
  <text x="300" y="680" class="label" font-weight="bold">Nicht wichtig + Nicht dringend</text>
  <text x="700" y="680" class="label" font-weight="bold">Nicht wichtig + Dringend</text>

  <!-- Quadrant Boxes -->
  <rect x="250" y="100" width="400" height="400" class="box" />
  <rect x="650" y="100" width="400" height="400" class="box" />
  <rect x="250" y="500" width="400" height="400" class="box" />
  <rect x="650" y="500" width="400" height="400" class="box" />

  <!-- Quadrant Text -->
  <g class="text">
    <!-- Top Left -->
    <text x="300" y="150" class="text">• Content-Strategie</text>
    <text x="300" y="180" class="text">• Brand schärfen</text>
    <text x="300" y="210" class="text">• SEO aufräumen</text>
    <text x="300" y="240" class="text">• Zielgruppen verstehen</text>

    <!-- Top Right -->
    <text x="700" y="150" class="text">• Kampagne retten</text>
    <text x="700" y="180" class="text">• Shitstorm beantworten</text>
    <text x="700" y="210" class="text">• Newsletter mit falschem Link fixen</text>
    <text x="700" y="240" class="text">• Chef will bis 14 Uhr „viral gehen“</text>

    <!-- Bottom Left -->
    <text x="300" y="600" class="text">• Merch-Ideen mit Glitzer</text>
    <text x="300" y="630" class="text">• Buzzword-Bingo</text>
    <text x="300" y="660" class="text">• TikTok-Tanz mit dem Maskottchen</text>
    <text x="300" y="690" class="text">• Hashtag brainstormen #innovation #synergy #wow</text>

    <!-- Bottom Right -->
    <text x="700" y="600" class="text">• Noch ein Last-Minute-Meeting</text>
    <text x="700" y="630" class="text">• Kann das Logo größer?</text>
    <text x="700" y="660" class="text">• LinkedIn-Post für „Welttag der Büroklammer“</text>
    <text x="700" y="690" class="text">• Folie 27 schöner machen</text>
  </g>

  <!-- Title -->
  <text x="400" y="60" class="label" font-size="24" font-weight="bold">Eisenhower-Matrix - Marketing</text>

  <!-- Axis Arrows -->
  <line x1="200" y1="100" x2="200" y2="90" class="axis" />
  <line x1="1000" y1="700" x2="1010" y2="700" class="axis" />

  <!-- Axis Labels -->
  <text x="180" y="120" class="label" font-size="14">hoch</text>
  <text x="180" y="720" class="label" font-size="14">niedrig</text>
  <text x="1000" y="720" class="label" font-size="14">hoch</text>
  <text x="1000" y="120" class="label" font-size="14">hoch</text>

  <!-- Annotations -->
  <text x="100" y="600" class="label" font-size="12">Erledigen, wenn das Internet wieder da ist. 😊</text>
  <text x="1000" y="100" class="label" font-size="12">Kaffee zählt nicht. Aber hilft. 😊</text>

  <!-- Icons -->
  <g transform="translate(280, 600)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#000" stroke-width="1" />
    <circle cx="0" cy="0" r="5" fill="#fff" />
    <line x1="0" y1="0" x2="0" y2="10" stroke="#000" stroke-width="1" />
    <line x1="0" y1="0" x2="10" y2="0" stroke="#000" stroke-width="1" />
  </g>

  <g transform="translate(680, 600)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#000" stroke-width="1" />
    <circle cx="0" cy="0" r="5" fill="#fff" />
    <line x1="0" y1="0" x2="0" y2="10" stroke="#000" stroke-width="1" />
    <line x1="0" y1="0" x2="10" y2="0" stroke="#000" stroke-width="1" />
  </g>

  <!-- Viral Annotation -->
  <text x="750" y="150" class="label" font-size="16" font-weight="bold" fill="#000">VIRAL??</text>
  <polygon points="750,140 770,130 760,120 750,130" fill="#000" />
  <polygon points="750,140 760,150 770,140 760,130" fill="#000" />

  <!-- Megaphone -->
  <g transform="translate(800, 300)">
    <polygon points="0,0 100,0 50,50" fill="#000" />
    <polygon points="0,0 100,0 50,20" fill="#fff" />
    <line x1="50" y1="20" x2="50" y2="50" stroke="#000" stroke-width="2" />
    <line x1="50" y1="20" x2="70" y2="30" stroke="#000" stroke-width="2" />
    <line x1="50" y1="20" x2="30" y2="30" stroke="#000" stroke-width="2" />
  </g>

  <!-- Coffee Cup -->
  <g transform="translate(1000, 100)">
    <circle cx="0" cy="0" r="20" fill="#000" />
    <circle cx="0" cy="0" r="15" fill="#fff" />
    <line x1="0" y1="0" x2="0" y2="10" stroke="#000" stroke-width="2" />
    <line x1="0" y1="0" x2="10" y2="0" stroke="#000" stroke-width="2" />
    <line x1="0" y1="0" x2="-10" y2="0" stroke="#000" stroke-width="2" />
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#000" stroke-width="2" />
  </g>

  <!-- Unicorn -->
  <g transform="translate(680, 600)">
    <path d="M 0 0 C 10 10 20 0 30 0 C 40 0 50 10 60 0 C 70 0 80 10 90 0 C 100 0 110 10 120 0" fill="#000" stroke="#000" stroke-width="1" />
    <path d="M 0 0 C 10 10 20 0 30 0 C 40 0 50 10 60 0 C 70 0 80 10 90 0 C 100 0 110 10 120 0" fill="#fff" stroke="#000" stroke-width="1" />
    <circle cx="120" cy="0" r="10" fill="#000" />
    <circle cx="120" cy="0" r="5" fill="#fff" />
  </g>

  <!-- Exclamation Marks -->
  <g transform="translate(1000, 600)">
    <line x1="1000" y1="600" x2="1000" y2="620" stroke="#000" stroke-width="2" />
    <line x1="1000" y1="620" x2="1020" y2="640" stroke="#000" stroke-width="2" />
    <line x1="1000" y1="620" x2="980" y2="640" stroke="#000" stroke-width="2" />
  </g>

  <!-- Arrows -->
  <line x1="200" y1="100" x2="200" y2="700" class="arrow" />
  <line x1="200" y1="700" x2="1000" y2="700" class="arrow" />
  <line x1="200" y1="700" x2="200" y2="100" class="arrow" />
  <line x1="1000" y1="700" x2="200" y2="700" class="arrow" />
</svg></div></body></html>
