<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Confetti Animation Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Custom styles for drag and drop visual feedback */
        .dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .drag-over {
            background-color: #f0f9ff;
            border: 2px dashed #3b82f6;
        }

        /* Smooth transitions for cards */
        .kanban-card {
            transition: all 0.2s ease-in-out;
        }

        .kanban-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* Edit mode styling */
        .editable-content {
            outline: none;
            min-height: 24px;
        }

        .editable-content[contenteditable="true"] {
            background-color: #fffbeb;
            border-radius: 4px;
            padding: 2px 4px;
            cursor: text;
        }

        /* Column header gradients */
        .column-backlog .header-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .column-in-progress .header-bg { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .column-review .header-bg { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .column-done .header-bg { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

        /* Modal animation */
        .modal-overlay {
            transition: opacity 0.3s ease;
        }

        .modal-content {
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Delete button animation on hover */
        .delete-btn {
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background-color: #fee2e2;
            transform: scale(1.1);
        }

        /* Add card button animation */
        .add-card-btn {
            transition: all 0.2s ease;
        }

        .add-card-btn:hover {
            transform: scale(1.05);
        }

        /* Card entry animation */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .kanban-card {
            animation: slideIn 0.3s ease-out;
        }

        /* Progress bar for card count */
        .progress-bar {
            transition: width 0.5s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 min-h-screen p-6">
    
    <!-- Header Section -->
    <header class="mb-8 text-center">
        <h1 class="text-5xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent mb-2">
            🚀 Kanban Board
        </h1>
        <p class="text-gray-600 text-lg">Drag cards between columns to manage your workflow</p>
    </header>

    <!-- Kanban Board Container -->
    <div class="flex gap-6 justify-center flex-wrap px-4" id="kanban-board">
        <!-- Columns will be dynamically generated here -->
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal-overlay fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="modal-content bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 transform scale-100">
            <div class="text-center mb-6">
                <div class="mx-auto w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.337-3.147L12 6l-8.253 10.853c-1.165 1.48-.203 3.147 1.337 3.147z"></path>
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">Delete Card?</h3>
                <p class="text-gray-600">This action cannot be undone. Are you sure you want to delete this card?</p>
            </div>
            
            <div class="flex gap-4 justify-center">
                <button onclick="closeDeleteModal()" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition-colors">
                    Cancel
                </button>
                <button id="confirm-delete-btn" data-testid="confirm-delete" class="px-6 py-3 bg-red-500 text-white rounded-lg font-semibold hover:bg-red-600 transition-colors shadow-lg">
                    Delete Card
                </button>
            </div>
        </div>
    </div>

    <!-- Add Card Modal -->
    <div id="add-modal" class="modal-overlay fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="modal-content bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 transform scale-90 opacity-0">
            <div class="text-center mb-6">
                <h3 class="text-2xl font-bold text-gray-800 mb-2">Add New Card</h3>
                <p class="text-gray-600 mb-4">Enter the title for your new card</p>
                <input 
                    type="text" 
                    id="new-card-input" 
                    data-testid="card-input"
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:outline-none text-lg"
                    placeholder="What needs to be done?"
                    autocomplete="off"
                >
            </div>
            
            <div class="flex gap-4 justify-center">
                <button onclick="closeAddModal()" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition-colors">
                    Cancel
                </button>
                <button id="add-card-confirm-btn" class="px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-lg font-semibold hover:from-purple-600 hover:to-pink-600 transition-all shadow-lg">
                    Add Card
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION AND STATE MANAGEMENT
        // ============================================

        // Namespace for localStorage to avoid conflicts with other applications
        const STORAGE_NAMESPACE = 'kanban-board-v1';

        // Column definitions with their properties
        const COLUMNS = [
            { id: 'backlog', title: '📋 Backlog', testid: 'column-backlog', class: 'column-backlog' },
            { id: 'in-progress', title: '🔄 In Progress', testid: 'column-in-progress', class: 'column-in-progress' },
            { id: 'review', title: '🔍 Review', testid: 'column-review', class: 'column-review' },
            { id: 'done', title: '✅ Done', testid: 'column-done', class: 'column-done' }
        ];

        // Dummy data for initial state
        const DUMMY_DATA = {
            backlog: [
                { id: 'card-1', title: 'Research competitors', createdAt: Date.now() },
                { id: 'card-2', title: 'Define user personas', createdAt: Date.now() },
                { id: 'card-3', title: 'Create wireframes', createdAt: Date.now() }
            ],
            'in-progress': [
                { id: 'card-4', title: 'Design system setup', createdAt: Date.now() },
                { id: 'card-5', title: 'API integration', createdAt: Date.now() }
            ],
            review: [
                { id: 'card-6', title: 'Unit tests coverage', createdAt: Date.now() }
            ],
            done: [
                { id: 'card-7', title: 'Project setup', createdAt: Date.now() },
                { id: 'card-8', title: 'Authentication module', createdAt: Date.now() }
            ]
        };

        // Application state
        let appState = { columns: {} };
        let cardBeingDeleted = null; // Stores the card info currently being deleted
        let targetColumnId = null; // Stores the target column for adding a new card

        // ============================================
        // LOCAL STORAGE FUNCTIONS
        // ============================================

        /**
         * Loads state from localStorage or initializes with dummy data
         */
        function loadState() {
            try {
                const stored = localStorage.getItem(STORAGE_NAMESPACE);
                if (stored) {
                    appState = JSON.parse(stored);
                    console.log('State loaded from localStorage');
                } else {
                    // Initialize with dummy data if no saved state exists
                    appState = { columns: JSON.parse(JSON.stringify(DUMMY_DATA)) };
                    saveState();
                    console.log('Initialized with dummy data');
                }
            } catch (error) {
                console.error('Error loading state:', error);
                appState = { columns: JSON.parse(JSON.stringify(DUMMY_DATA)) };
            }
        }

        /**
         * Saves current state to localStorage
         */
        function saveState() {
            try {
                localStorage.setItem(STORAGE_NAMESPACE, JSON.stringify(appState));
            } catch (error) {
                console.error('Error saving state:', error);
            }
        }

        /**
         * Generates a unique ID for new cards
         */
        function generateCardId() {
            return `card-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
        }

        // ============================================
        // CARD OPERATIONS
        // ============================================

        /**
         * Adds a new card to the specified column
         */
        function addCard(columnId, title) {
            if (!title.trim()) return null;

            const card = {
                id: generateCardId(),
                title: title.trim(),
                createdAt: Date.now()
            };

            if (!appState.columns[columnId]) {
                appState.columns[columnId] = [];
            }

            appState.columns[columnId].push(card);
            saveState();
            
            // Trigger confetti for new card addition
            triggerConfetti(50);

            return card;
        }

        /**
         * Updates a card's title
         */
        function updateCardTitle(columnId, cardId, newTitle) {
            if (!appState.columns[columnId]) return false;

            const card = appState.columns[columnId].find(c => c.id === cardId);
            if (card) {
                card.title = newTitle.trim();
                saveState();
                return true;
            }
            return false;
        }

        /**
         * Deletes a card from its column
         */
        function deleteCard(columnId, cardId) {
            if (!appState.columns[columnId]) return false;

            const column = appState.columns[columnId];
            const index = column.findIndex(c => c.id === cardId);

            if (index !== -1) {
                column.splice(index, 1);
                saveState();
                
                // Update the modal state
                cardBeingDeleted = null;
                return true;
            }
            return false;
        }

        /**
         * Moves a card from one column to another
         */
        function moveCard(fromColumnId, toColumnId, cardId) {
            if (!appState.columns[fromColumnId]) return false;

            const fromColumn = appState.columns[fromColumnId];
            const cardIndex = fromColumn.findIndex(c => c.id === cardId);

            if (cardIndex === -1) return false;

            // Remove from source column
            const [card] = fromColumn.splice(cardIndex, 1);

            // Add to destination column
            if (!appState.columns[toColumnId]) {
                appState.columns[toColumnId] = [];
            }
            appState.columns[toColumnId].push(card);

            saveState();

            // Trigger confetti if moved to "Done" column
            if (toColumnId === 'done') {
                triggerConfetti(200);
            }

            return true;
        }

        // ============================================
        // CONFETTI ANIMATION
        // ============================================

        /**
         * Triggers confetti animation with specified particle count
         */
        function triggerConfetti(particleCount = 100) {
            if (typeof confetti === 'function') {
                // Celebration confetti with multiple colors
                const colors = ['#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#38f9d7'];
                
                confetti({
                    particleCount: particleCount,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: colors,
                    shapes: ['circle', 'square'],
                    disableForReducedMotion: true,
                    drift: 0.5,
                    scalar: 1.2,
                    ticks: 300,
                    gravity: 0.8
                });

                // Additional burst effect
                setTimeout(() => {
                    confetti({
                        particleCount: particleCount / 2,
                        spread: 100,
                        origin: { y: 0.7 },
                        colors: colors,
                        disableForReducedMotion: true
                    });
                }, 100);
            }
        }

        // ============================================
        // DRAG AND DROP HANDLERS
        // ============================================

        let draggedCard = null;
        let sourceColumnId = null;

        /**
         * Handles drag start event
         */
        function handleDragStart(e, cardId, columnId) {
            draggedCard = { id: cardId, columnId };
            sourceColumnId = columnId;

            // Set drag data for Firefox compatibility
            e.dataTransfer.setData('text/plain', cardId);
            
            // Add dragging class for visual feedback
            const cardElement = e.target.closest('.kanban-card');
            if (cardElement) {
                cardElement.classList.add('dragging');
            }

            e.dataTransfer.effectAllowed = 'move';
        }

        /**
         * Handles drag end event
         */
        function handleDragEnd(e) {
            // Remove dragging class from all cards
            document.querySelectorAll('.kanban-card').forEach(card => {
                card.classList.remove('dragging');
            });

            // Remove drag-over class from all columns
            document.querySelectorAll('.kanban-column').forEach(column => {
                column.classList.remove('drag-over');
            });

            draggedCard = null;
            sourceColumnId = null;
        }

        /**
         * Handles drag over event on columns
         */
        function handleDragOver(e) {
            e.preventDefault(); // Necessary to allow dropping
            
            const columnElement = e.currentTarget;
            if (columnElement && !columnElement.classList.contains('drag-over')) {
                columnElement.classList.add('drag-over');
            }

            e.dataTransfer.dropEffect = 'move';
        }

        /**
         * Handles drag leave event on columns
         */
        function handleDragLeave(e) {
            const columnElement = e.currentTarget;
            if (columnElement) {
                columnElement.classList.remove('drag-over');
            }
        }

        /**
         * Handles drop event on columns
         */
        function handleDrop(e, targetColumnId) {
            e.preventDefault();

            // Remove drag-over class
            const columnElement = e.currentTarget;
            if (columnElement) {
                columnElement.classList.remove('drag-over');
            }

            // Check if card is being moved to a different column
            if (draggedCard && sourceColumnId !== targetColumnId) {
                moveCard(sourceColumnId, targetColumnId, draggedCard.id);
            }

            // Clean up
            document.querySelectorAll('.kanban-card').forEach(card => {
                card.classList.remove('dragging');
            });

            draggedCard = null;
            sourceColumnId = null;

            renderBoard();
        }

        // ============================================
        // MODAL HANDLERS
        // ============================================

        /**
         * Opens the add card modal for a specific column
         */
        function openAddModal(columnId) {
            targetColumnId = columnId;
            const modal = document.getElementById('add-modal');
            const input = document.getElementById('new-card-input');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Reset input
            input.value = '';
            input.focus();

            // Animate modal
            const modalContent = modal.querySelector('.modal-content');
            setTimeout(() => {
                modalContent.classList.remove('scale-90', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        /**
         * Closes the add card modal
         */
        function closeAddModal() {
            const modal = document.getElementById('add-modal');
            const modalContent = modal.querySelector('.modal-content');

            // Animate out
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-90', 'opacity-0');

            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);

            targetColumnId = null;
        }

        /**
         * Confirms adding a new card from the modal
         */
        function confirmAddCard() {
            const input = document.getElementById('new-card-input');
            const title = input.value.trim();

            if (title && targetColumnId) {
                addCard(targetColumnId, title);
                renderBoard();
            }

            closeAddModal();
        }

        /**
         * Opens the delete confirmation modal
         */
        function openDeleteModal(columnId, cardId) {
            cardBeingDeleted = { columnId, cardId };
            
            const modal = document.getElementById('delete-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            // Animate modal content
            const modalContent = modal.querySelector('.modal-content');
            setTimeout(() => {
                modalContent.classList.remove('scale-90', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        /**
         * Closes the delete confirmation modal
         */
        function closeDeleteModal() {
            const modal = document.getElementById('delete-modal');
            const modalContent = modal.querySelector('.modal-content');

            // Animate out
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-90', 'opacity-0');

            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);

            cardBeingDeleted = null;
        }

        /**
         * Confirms deleting a card from the modal
         */
        function confirmDeleteCard() {
            if (cardBeingDeleted) {
                deleteCard(cardBeingDeleted.columnId, cardBeingDeleted.cardId);
                renderBoard();
            }
            closeDeleteModal();
        }

        // ============================================
        // RENDER FUNCTIONS
        // ============================================

        /**
         * Renders a single card element
         */
        function renderCard(card, columnId) {
            const cardElement = document.createElement('div');
            cardElement.className = 'kanban-card bg-white rounded-xl p-4 shadow-md cursor-move group border-l-4 border-transparent hover:border-purple-500';
            cardElement.setAttribute('draggable', 'true');
            cardElement.dataset.cardId = card.id;
            cardElement.dataset.columnId = columnId;
            cardElement.setAttribute('data-testid', 'card');

            // Drag event listeners
            cardElement.addEventListener('dragstart', (e) => handleDragStart(e, card.id, columnId));
            cardElement.addEventListener('dragend', handleDragEnd);

            // Card content container
            const contentContainer = document.createElement('div');
            contentContainer.className = 'flex justify-between items-start gap-2';

            // Card title (editable)
            const titleElement = document.createElement('div');
            titleElement.className = 'flex-1 editable-content text-gray-800 font-medium break-words min-h-[24px]';
            titleElement.textContent = card.title;
            
            // Make title editable on click
            titleElement.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent drag from starting
                
                // Set contenteditable
                titleElement.setAttribute('contenteditable', 'true');
                titleElement.focus();

                // Select all text for easy editing
                const range = document.createRange();
                range.selectNodeContents(titleElement);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);

                // Handle blur (commit changes)
                const handleBlur = () => {
                    titleElement.removeAttribute('contenteditable');
                    const newTitle = titleElement.textContent.trim();
                    
                    if (newTitle !== card.title) {
                        updateCardTitle(columnId, card.id, newTitle);
                    }

                    // Remove blur listener
                    titleElement.removeEventListener('blur', handleBlur);
                };

                // Handle Enter key (commit changes)
                const handleKeyDown = (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        titleElement.blur();
                    }
                };

                titleElement.addEventListener('blur', handleBlur);
                titleElement.addEventListener('keydown', handleKeyDown);

                // Clean up listeners after editing
                const cleanup = () => {
                    titleElement.removeEventListener('blur', handleBlur);
                    titleElement.removeEventListener('keydown', handleKeyDown);
                };
                
                setTimeout(() => {
                    titleElement.addEventListener('blur', cleanup);
                }, 1000);
            });

            // Delete button container
            const deleteContainer = document.createElement('div');
            deleteContainer.className = 'opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0';

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn p-1 rounded-lg text-gray-400 hover:text-red-500';
            deleteBtn.setAttribute('data-testid', 'delete-card');
            deleteBtn.innerHTML = `
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            `;
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                openDeleteModal(columnId, card.id);
            };

            deleteContainer.appendChild(deleteBtn);
            contentContainer.appendChild(titleElement);
            contentContainer.appendChild(deleteContainer);

            // Card metadata (created date)
            const metaElement = document.createElement('div');
            const date = new Date(card.createdAt);
            metaElement.className = 'mt-2 text-xs text-gray-400 flex items-center gap-1';
            metaElement.innerHTML = `
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                ${date.toLocaleDateString()}
            `;

            cardElement.appendChild(contentContainer);
            cardElement.appendChild(metaElement);

            return cardElement;
        }

        /**
         * Renders a single column
         */
        function renderColumn(column) {
            const columnElement = document.createElement('div');
            
            // Column classes with drag-and-drop handlers
            columnElement.className = `kanban-column flex-1 min-w-[280px] max-w-[350px] rounded-2xl flex flex-col transition-all`;
            columnElement.dataset.columnId = column.id;
            columnElement.setAttribute('data-testid', column.testid);

            // Drag-and-drop event listeners for column
            columnElement.addEventListener('dragover', (e) => handleDragOver(e));
            columnElement.addEventListener('dragleave', (e) => handleDragLeave(e));
            columnElement.addEventListener('drop', (e) => handleDrop(e, column.id));

            // Column header
            const header = document.createElement('div');
            header.className = 'header-bg rounded-t-2xl p-5 text-white shadow-lg';
            
            const headerContent = document.createElement('div');
            headerContent.className = 'flex justify-between items-center';

            // Column title and card count
            const titleContainer = document.createElement('div');
            titleContainer.className = 'flex items-center gap-2';
            
            const titleElement = document.createElement('h2');
            titleElement.className = 'text-xl font-bold';
            titleElement.textContent = column.title;

            // Card count badge
            const cardCount = appState.columns[column.id] ? appState.columns[column.id].length : 0;
            const badge = document.createElement('span');
            badge.className = 'bg-white bg-opacity-20 px-2 py-1 rounded-full text-sm font-semibold';
            badge.textContent = cardCount;

            titleContainer.appendChild(titleElement);
            titleContainer.appendChild(badge);

            // Progress bar (visual indicator of card count)
            const progressBar = document.createElement('div');
            progressBar.className = 'mt-3 h-1 bg-black bg-opacity-20 rounded-full overflow-hidden';
            const progressInner = document.createElement('div');
            progressInner.className = 'progress-bar bg-white';
            progressInner.style.width = `${Math.min(cardCount * 10, 100)}%`;
            progressBar.appendChild(progressInner);

            headerContent.appendChild(titleContainer);
            header.appendChild(headerContent);
            header.appendChild(progressBar);

            // Cards container
            const cardsContainer = document.createElement('div');
            cardsContainer.className = 'bg-gray-50 flex-1 p-3 rounded-b-2xl overflow-y-auto min-h-[300px] max-h-[600px]';

            // Add card button
            const addCardBtn = document.createElement('button');
            addCardBtn.className = 'add-card-btn w-full py-3 px-4 bg-white border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-purple-400 hover:text-purple-600 transition-all mb-3 flex items-center justify-center gap-2';
            addCardBtn.setAttribute('data-testid', 'add-card');
            addCardBtn.innerHTML = `
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                </svg>
                Add card
            `;
            addCardBtn.onclick = () => openAddModal(column.id);

            cardsContainer.appendChild(addCardBtn);

            // Render cards
            const cards = appState.columns[column.id] || [];
            
            if (cards.length === 0) {
                // Empty state
                const emptyState = document.createElement('div');
                emptyState.className = 'text-center py-8 text-gray-400';
                emptyState.innerHTML = `
                    <svg class="w-16 h-16 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    <p>No cards yet</p>
                    <p class="text-sm">Click "Add card" to get started</p>
                `;
                cardsContainer.appendChild(emptyState);
            } else {
                // Render each card
                cards.forEach(card => {
                    cardsContainer.appendChild(renderCard(card, column.id));
                });
            }

            // Assemble column
            columnElement.appendChild(header);
            columnElement.appendChild(cardsContainer);

            return columnElement;
        }

        /**
         * Renders the entire board
         */
        function renderBoard() {
            const board = document.getElementById('kanban-board');
            board.innerHTML = '';

            COLUMNS.forEach(column => {
                board.appendChild(renderColumn(column));
            });
        }

        // ============================================
        // EVENT LISTENERS SETUP
        // ============================================

        /**
         * Sets up all event listeners for modals and global actions
         */
        function setupEventListeners() {
            // Add card modal handlers
            document.getElementById('add-card-confirm-btn').addEventListener('click', confirmAddCard);
            
            // Handle Enter key in add card input
            document.getElementById('new-card-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    confirmAddCard();
                }
            });

            // Delete confirmation modal handlers
            document.getElementById('confirm-delete').addEventListener('click', confirmDeleteCard);

            // Close modals when clicking on overlay
            document.getElementById('add-modal').addEventListener('click', (e) => {
                if (e.target.id === 'add-modal') {
                    closeAddModal();
                }
            });

            document.getElementById('delete-modal').addEventListener('click', (e) => {
                if (e.target.id === 'delete-modal') {
                    closeDeleteModal();
                }
            });

            // Keyboard accessibility - Escape to close modals
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeAddModal();
                    closeDeleteModal();
                }
            });

            // Prevent default drag behavior on body
            document.body.addEventListener('dragover', (e) => {
                e.preventDefault();
            });

            document.body.addEventListener('drop', (e) => {
                e.preventDefault();
            });
        }

        // ============================================
        // INITIALIZATION
        // ============================================

        /**
         * Main initialization function
         */
        function init() {
            // Load state from localStorage or use dummy data
            loadState();

            // Set up event listeners
            setupEventListeners();

            // Initial render
            renderBoard();

            console.log('Kanban board initialized successfully');
        }

        // Run initialization when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    </script>
</body>
</html>
