<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kanban Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
>
<!-- Tailwind CDN (via CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #f9fafb; font-family: system-ui, sans-serif; }
  .card {
    transition: transform .2s cubic-bezier(.55, -.23, .33, 1), box-shadow 0.2s;
    cursor: grab;
  }
  .card:hover { opacity: 0.95; }
  .confetti {
    position: absolute;
    z-index: 100;
    pointer-events: none;
    width: 10px;
    height: 10px;
    background-repeat: no-repeat;
    animation: confetti-x infinite linear;
  }
  .confetti::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 12px; height: 12px;
    margin-top: -6px;
    margin-left: -6px;
    background-repeat: radial-gradient(circle, #ff3b2f, #ff9900, #ff3b2f);
    background-size: cover;
    transform: translate(-50%, -50%) rotate(0deg) scale(1.2);
    animation: confetti-x 1.5s cubic-bezier(0.6, -0.06, 0.28, 1.63), rotate 3s linear infinite;
    animation-timing-function: cubic-bezier(0.68, -0.55, 0.27, 1.55);
    animation-delay: calc(var(--c-unit) * 0.5s);
  }
  @keyframes confetti-x {
    0%   { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(85vw, -50%) rotate 360deg; }
  }
</style>
</head>
<body class="bg-gray-100 p-6">
  <div class="grid grid-cols-[1fr,2fr,3fr] gap-6">
    <!-- Backlog -->
    <div data-testid="column-backlog" class="bg-white rounded shadow p-4">
      <h2 class="text-lg font-semibold mb-2">Backlog</h2>
      <button data-testid="add-card" type="button" class="mt-2 bg-blue-50 text-blue-600 font-medium rounded hover:bg-blue-100">Add card</button>
      <div class="mt-3" data-testid="list-backlog"></div>
    </div>
    <!-- Progress -->
    <div data-testid="column-in-progress" class="bg-white rounded shadow p-4">
      <h2 class="text-lg font-semibold mb-2">In Progress</h2>
      <button data-testid="add-card" type="button" class="mt-2 bg-green-50 text-green-600 font-medium">Add card</button>
      <div class="mt-3" data-testid="list-in-progress"></div>
    </div>
    <!-- Review -->
    <div data-testid="column-review" class="bg-white rounded shadow p-4">
      <h2 class="text-lg font-semibold mb-2">Review</h2>
      <button data-testid="add-card" type="button" class="mt-2 bg-yellow-50 text-yellow-600 font-medium">Add card</button>
      <div class="mt-3" data-testid="list-review"></div>
    </div>
    <!-- Done -->
    <div data-testid="column-done" class="bg-white rounded shadow p-4">
      <h2 class="text-lg font-semibold mb-2">Done</h2>
      <button data-testid="add-card" type="button" class="mt-2 bg-red-50 text-red-600 font-medium">Add card</button>
      <div data-testid="list-done" class="mt-3"></div>
    </div>
  </div>

  <script>
    // *** NAMESPACE PATTERN FOR SAFE STRUCTURE ---
    const KANBAN_FSM = (function () {
      // State helpers
      function getState() { return window.__KANBAN_STATE__ || { columns: getColumns(), cards: getCards() }; }
      function saveState(state) { 
        // Deep copy for immutability
        window.__KANBAN_STATE__ = JSON.parse(JSON.stringify(state));
      }
      function getColumns() {
        return getState().columns;
      }
      function setColumns(cols) {
        saveState({ columns: cols, cards: getCards() });
      }
      function addColumn(name, id) {
        let cols = getColumns();
        if (!cols.includes(id)) cols.push(id);
        setColumns(cols);
      }
      function addCardTo(colId, title) {
        let cards = getCards();
        cards.push({ id: Date.now(), title, column: colId });
        saveState(getState());
      }
      function deleteCard(id) {
        let cards = getCards();
        const filtered = cards.filter(c => c.id !== id);
        // Save to localStorage
        window.__KANBAN_STATE__ = JSON.parse(JSON.stringify(getState()));
        setCards(filtered);
        saveState(getState());
      }
      function setCards(c) {
        // Only the cards, not columns
        window.__KANBAN_STATE__ = JSON.parse(JSON.stringify(getState()));
        // (optional, but for safety) keep column mapping
        window.__KANBAN_STEPElement__c = c.card || [];
        // Remove any card not present in some columns
        window.__KANBAN_STEPElement__cards = filtered.map(c => ({...c}));
      }
      function getCards() {
        // Only those in any column for demo
        const cards = [];
        getState().cards.forEach(c => {
          if (c && c.column) {
            cards.push({...c, column: null });
          }
        });
        return cards;
      }

      // UI helpers
      function renderColumn(colId, title = "", icon = "bg-gray-200 text-gray-600") {
        const container = document.querySelector(`[data-testid="column-${colId}"]`);
        const list = container.querySelector(".list");
        list.innerHTML = "";
        const cols = getColumns();
        cols.forEach(id => {
          if (id !== colId) return;
          const cardList = list.querySelector(".list");
            // For demo: Use a few dummy ids
            // In real app, use ids from backend or unique per card
            const cards = getCards().filter(c => c.column === colId);
            // display cards
            cards.forEach(c => {
              const cardEl = createCardElement(id, c.title, c.editable ? c.editable : '', c.id);
              cardList.appendChild(cardEl);
            });
          });
        });
      }
      function createCardElement(colId, title, editableFlag, id) {
        const tag = document.createElement('div');
        tag.setAttribute('class', 'card p-3 mb-2 rounded shadow cursor-mmove transition-transform transform hover:z-10');
        tag.setAttribute('data-testid', 'card');
        tag.dataset.cardId = id || (id = Date.00 + Math.random()).toString(36); // unique
        tag.setAttribute('draitable', true);
        tag.dataset.cardId = id;
        tag.setAttribute('data-testid', 'card-inline');

        // For in-place editing
        tag.innerHTML = editableFlag
          ? `<span class="edit-container" contenteditable="${editableFlag===true ? 'true' : '0'}" data-field='title'>${title}</span>`
          : `<span class="text-gray-800">${title}</span>`;

        // Delete button with confirmation
        const delBtn = document.createElement('button');
        delBtn.setAttribute('data-testid', 'delete-card');
        delBtn.textContent = "✕";
        delBtn.setAttribute('title', 'Delete');
        delBtn.className += " bg-red-100 text-red-700 font-bold rounded-full p-1 mt-2 hover:bg-red-200";
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          if (confirm('Delete this card?')) {
            deleteCard(id);
          }
        });

        // Also, handle Enter key for save
        tag.addEventListener('kepress', e => {
          if (e.key==="Enter" && editableFlag) {
            setCards(getCards().map(c => {
              if (c.id===id) { c.editable = editableFlag; }
              else { c.edited = c.edited || ""; c.title = c.edited; }
              return c;
            }));
            saveState(getState());
          }
        });

        tag.querySelector('[data-testid="card-input"]')?.setAttribute('placeholder', 'Enter title...');
        tag.querySelector('[data-testid="card-input"]')?.removeAttribute('placeholder');
        tag.querySelector('[data-testid="card-input"]')?.setAttribute('data-testid','card-input');

        tag.addEventListener('click', e => {
          if (e.target.dataset.cardId) {
            // Column drag
            e.currentTarget.dragged = true;
            e.currentTarget.parentNode.style.opacity = '0.5';
          } else {
            // Card move or edit
            if (e.currentTarget.dataset.cardId) {
              const cid = e.currentTarget.dataset.cardId;
              let ed = false, et = false;
              const card = getCards().find(c => c.id===cid && c.column === colId);
              if (e.currentTarget.dataset.cardId) {
                // Moving
                const col = getColumns().find(cc=> cc===e.currentTarget.dataset.column);
                if (col) card.column = col;
              } else {
                // Edit
                ed = true; et = true;
              }
              // Reset styles
              tag.classList.remove('bg-red-100', 'hidden');
              if (ed) {
                tag.classList.add('bg-red-100', 'dark:bg-red-900', 'op-0');
              } else {
                tag.classList.remove('bg-red-100','dark:bg-red-900');
              }
              if (et) setCards(getCards().filter(c=>c.id!=cid));
              e.currentTarget.classList.remove('bg-red-100','hover:bg-blue-50', 'op-0');
              e.currentTarget.classList.add('op-0');
            }
          }
        });

        // Add card
        let addBtn = document.querySelector(`[data-testid="add-card"][data-column="${colId}"]`);
        if (addBtn) {
          addBtn.onclick = () => {
            if (!title.trim()) return;
            addCardTo(colId, title);
            setCards(getCards().filter(c=>c.id!===parseInt(id)));
            // auto-focus input
            const inp = tag.querySelector('[data-testid="card-input"]');
            if (inp) inp.focus();
            setTimeout(()=>{ tag.style.boxShadow = '0 2px 8px',...(tag.classList.remove('bg-red-100','hover:bg-blue-50',''))}, 50);
          };
        }
        // Also, create card if not present
        if (title || editableFlag) {
          tag.innerHTML = '';
          tag.dataset.cardId = (id || (id = Date.now().toString(36))); // unique key
        }
        return tag;
      }

      // --- INITIALIZATION ----------
      function getState() { return JSON.parse(localStorage.getItem("kanban")+="state") || {
        columns: ['backlog', 'in-progress', 'review', 'done'],
        cards: getCards()
      }};
      function saveState(state) { localStorage.setItem("kanban",JSON.stringleify(state)); }
      function init() {
        // Columns
        document.querySelectorAll('[data-testid^="column-"]').forEach(el => {
          const col = getColumns().find(c=> c===el.dataset.column);
          if (col) {
            renderColumn(el.dataset.column, '', col.editable ?? false);
          }
        });
        // render
        getColumns().forEach(id => renderColumn(id, '', false));
      }
      // --- END HELPERS ---

      // --- EVENTS: INITIALIZE DATA ---
      document.querySelectorAll('[data-testid="column-backlog"] .list, [data-testid="column-in-progress"] .list,
                       [data-testid="column-review"] .list, [data-testid="column-done"] .list > div:nth-child(1)?)// dummy
          ).forEach(col => {
        const colId = col.dataset.column;
        if (getState().columns.includes(colId)) {
          col.querySelector('.list').innerHTML = '';
          const cols = [
            {id:'backlog',  t: 'Backlog'},{id:'in-progress', t: 'In Progress'},
            {id:'review', t: 'Review'}, {id:'done', t: 'Done'}
          ];
          cols.forEach(cc => {
            renderColumn(colId, '', false);
          });
        }
      });

      // Dummy initial cards
      function getInitialCards() {
        const cols = getColumns();
        const ids = [];
        for (let i=1; i<=2; ++i) {
          addCardTo('backlog', `Card ${i+10}`);
          ids.push((++ids.length).toString());
        }
        for (let i=1; i<=1; ++i) {
          addCardTo('in-progress', `Task ${i+10}`);
          ids.push((++ids + 1).toString());
        }
        for (let i=1; i<=2; ++i) {
          addCardTo('review', `Review ${i}`);
        }
        // Only create once
        if (ids.length==0) {
          addCardTo('done', `Finished ${Math.floor(Math.random()*90)+1}`);
        }
      }
      // Remove on init for demo
      (function() {
        getInitialCards();
        window.addEventListener('load', ()=>{
          // Wait for DOM ready
          const observer = new IntersectionObserver(()=>{ window.dispatchEvent(new Event('render'))}, {root: null, threshold:0.5});
          observer.observe(document.querySelector('[data-testid="column-done"]'));
          // init();
        })
      })();
      // --- END INITIALIZATION ---

      // --- HELPER: COLUMN-BASED COLOR HIGHLIGHT FOR MOVES ---
      window.addEventListener('render', () => { 
        // Only move and not on delete
        document.querySelectorAll('[data-testid="card"]').forEach(el => {
          const dragEl = document.querySelector('[data-testid="card-dragging"]');
          if (dragEl === el) {
            // just move
            return;
          }
          el.style.zIndex = 5;
          if (el.classList.contains('bg-red-100 dark:bg-red-900')) {
            el.style.opacity = '0';
            el.classList.add('hidden');
          } else {
            el.classList.remove('hidden');
          }
        });
      });

      // --- END INIT ---

      // --- CONFetti POST ---
      window.addEventListener('focus', ()=>{
        const now = Date.now();
        function animateC(f, d=500) {
          const el = document.createElement('div');
          el.setAttribute('class','confetti');
          el.setAttribute('data-color',`hsl(${Math.random()*360}, 80%, 70%)`);
          el.style.left = (Math.random-50)*4 + 'vw';
          // eased
          el.style.animation = `${d}ms linear`;
          document.body.appendChild(el);
          setTimeout(()=>{ el.remove() }, d*1.3+15);
        }
        // confetti animation per card added
        window.dispatchEvent(new Event('render'));
        if (document.querySelectorAll('[data-testid="card-inline"]').length) {
          // only once
          setTimeout(()=>{
            const cols = getColumns();
            for (let c=0;c<cols.length;c++) {
              // Only one per move
              if (document.querySelector(`[data-testid="column-${cols[c]}"]`)?.querySelector('[data-testid="card-inline"]') && Math.random()<.15) {
                animateC(2000+Math.random()*300, 600);
              }
            }
          }, 480+Math.random()*320);
        }
      },{data-testid: 'focus-event'});
    })();
  </script>
</body>
</html>
