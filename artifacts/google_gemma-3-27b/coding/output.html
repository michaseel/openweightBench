<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Subtle transitions */
        .card {
            transition: background-color 0.2s ease, transform 0.15s ease;
        }

        /* Confetti animation (basic example - consider a library for more complex effects) */
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .confetti::before,
        .confetti::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: rgba(255, 239, 164, 0.7);
            border-radius: 50%;
        }

        /* Add more confetti particles for a better effect */
    </style>
</head>

<body class="bg-gray-100 font-sans">

    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6 text-center">Kanban Board</h1>

        <div class="flex space-x-4">
            <!-- Backlog Column -->
            <div id="column-backlog" class="w-1/4 bg-white rounded shadow p-3 min-h-[50vh]" data-testid="column-backlog">
                <h2 class="font-semibold mb-2">Backlog</h2>
                <div id="backlog-cards" class="space-y-2"></div>
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none"
                    data-testid="add-card">Add card</button>
            </div>

            <!-- In Progress Column -->
            <div id="column-in-progress" class="w-1/4 bg-white rounded shadow p-3 min-h-[50vh]"
                data-testid="column-in-progress">
                <h2 class="font-semibold mb-2">In Progress</h2>
                <div id="in-progress-cards" class="space-y-2"></div>
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none"
                    data-testid="add-card">Add card</button>
            </div>

            <!-- Review Column -->
            <div id="column-review" class="w-1/4 bg-white rounded shadow p-3 min-h-[50vh]" data-testid="column-review">
                <h2 class="font-semibold mb-2">Review</h2>
                <div id="review-cards" class="space-y-2"></div>
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none"
                    data-testid="add-card">Add card</button>
            </div>

            <!-- Done Column -->
            <div id="column-done" class="w-1/4 bg-white rounded shadow p-3 min-h-[50vh]" data-testid="column-done">
                <h2 class="font-semibold mb-2">Done</h2>
                <div id="done-cards" class="space-y-2"></div>
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none"
                    data-testid="add-card">Add card</button>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div id="delete-modal" class="fixed top-0 left-0 w-full h-full bg-gray-500 opacity-70 hidden">
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded shadow p-4">
                <h2 class="font-bold mb-2">Confirm Delete</h2>
                <p id="delete-message" class="mb-4">Are you sure you want to delete this card?</p>
                <div class="flex space-x-2">
                    <button id="confirm-delete" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded focus:outline-none"
                        data-testid="confirm-delete">Delete</button>
                    <button id="cancel-delete" class="bg-gray-300 hover:bg-gray-400 text-gray-700 font-bold py-2 px-4 rounded focus:outline-none">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Card Input Modal -->
        <div id="card-input-modal" class="fixed top-0 left-0 w-full h-full bg-gray-500 opacity-70 hidden">
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded shadow p-4">
                <h2 class="font-bold mb-2">Add New Card</h2>
                <textarea id="card-input" class="w-full p-2 border rounded focus:outline-none mb-4"
                    placeholder="Enter card title..." data-testid="card-input"></textarea>
                <div class="flex space-x-2">
                    <button id="save-card" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none">Save</button>
                    <button id="cancel-card" class="bg-gray-300 hover:bg-gray-400 text-gray-700 font-bold py-2 px-4 rounded focus:outline-none">Cancel</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Namespace for localStorage keys to avoid conflicts
        const KANBAN_STORAGE_KEY = 'kanban_board_state';

        // Get column elements
        const backlogColumn = document.getElementById('column-backlog');
        const inProgressColumn = document.getElementById('column-in-progress');
        const reviewColumn = document.getElementById('column-review');
        const doneColumn = document.getElementById('column-done');

        // Get card containers
        const backlogCardsContainer = document.getElementById('backlog-cards');
        const inProgressCardsContainer = document.getElementById('in-progress-cards');
        const reviewCardsContainer = document.getElementById('review-cards');
        const doneCardsContainer = document.getElementById('done-cards');

        // Get modal elements
        const deleteModal = document.getElementById('delete-modal');
        const deleteMessage = document.getElementById('delete-message');
        const confirmDeleteButton = document.getElementById('confirm-delete');
        const cancelDeleteButton = document.getElementById('cancel-delete');
        const cardInputModal = document.getElementById('card-input-modal');
        const cardInputTextarea = document.getElementById('card-input');
        const saveCardButton = document.getElementById('save-card');
        const cancelCardButton = document.getElementById('cancel-card');

        let cardsData = {}; // Store card data by column ID

        // Load state from localStorage
        function loadState() {
            const storedData = localStorage.getItem(KANBAN_STORAGE_KEY);
            cardsData = storedData ? JSON.parse(storedData) : {
                backlog: [],
                inProgress: [],
                review: [],
                done: []
            };

            // Dummy data if no cards exist
            if (Object.keys(cardsData).every(key => cardsData[key].length === 0)) {
                cardsData = {
                    backlog: [{ id: '1', text: 'Task 1' }, { id: '2', text: 'Feature Request' }],
                    inProgress: [{ id: '3', text: 'Development in progress' }],
                    review: [],
                    done: [{ id: '4', text: 'Completed Task' }]
                };
            }

            renderCards();
        }

        // Save state to localStorage
        function saveState() {
            localStorage.setItem(KANBAN_STORAGE_KEY, JSON.stringify(cardsData));
        }

        // Render cards based on the current data
        function renderCards() {
            renderColumnCards('backlog', backlogColumn, backlogCardsContainer);
            renderColumnCards('inProgress', inProgressColumn, inProgressCardsContainer);
            renderColumnCards('review', reviewColumn, reviewCardsContainer);
            renderColumnCards('done', doneColumn, doneCardsContainer);
        }

        // Render cards for a specific column
        function renderColumnCards(columnId, columnElement, container) {
            container.innerHTML = ''; // Clear existing cards

            cardsData[columnId].forEach(card => {
                const cardElement = createCardElement(card, columnId);
                container.appendChild(cardElement);
            });

            // Initialize drag and drop for each column after rendering. Important!
            initDragAndDrop(columnId);
        }

        // Create a card element
        function createCardElement(card, columnId) {
            const cardElement = document.createElement('div');
            cardElement.classList.add('bg-gray-200 rounded shadow p-3 flex items-center justify-between card');
            cardElement.setAttribute('data-testid', 'card');
            cardElement.draggable = true;
            cardElement.dataset.columnId = columnId;  // Store the original column ID

            const cardContentDiv = document.createElement('div');
            cardContentDiv.classList.add('flex-grow');

            const cardTitleSpan = document.createElement('span');
            cardTitleSpan.textContent = card.text;
            cardContentDiv.appendChild(cardTitleSpan);

            const editButton = document.createElement('button');
            editButton.innerHTML = 'Edit';
            editButton.classList.add('bg-yellow-500 hover:bg-yellow-700 text-white font-bold py-1 px-2 rounded');

            const deleteButton = document.createElement('button');
            deleteButton.innerHTML = 'Delete';
            deleteButton.classList.add('bg-red-500 hover:bg-red-700 text-white font-bold py-1 px-2 rounded');
            deleteButton.setAttribute('data-testid', 'delete-card');

            const cardFooterDiv = document.createElement('div');
            cardFooterDiv.classList.add('flex space-x-2');
            cardFooterDiv.appendChild(editButton);
            cardFooterDiv.appendChild(deleteButton);

            cardElement.appendChild(cardContentDiv);
            cardElement.appendChild(cardFooterDiv);

            // Edit functionality
            editButton.addEventListener('click', () => editCard(card, cardElement));

            // Delete functionality
            deleteButton.addEventListener('click', () => deleteCard(card, columnId));

            return cardElement;
        }

        // Initialize drag and drop functionality for a column
        function initDragAndDrop(columnId) {
            const cards = document.querySelectorAll(`#${columnId}-cards .card`);

            cards.forEach(card => {
                card.addEventListener('dragstart', dragStart);
            });

            const columnElements = document.querySelectorAll('[data-testid^="column-"]');
            columnElements.forEach(col => {
                col.addEventListener('dragover', dragOver);
                col.addEventListener('drop', drop);
            });
        }

        // Drag start event handler
        function dragStart(event) {
            event.dataTransfer.setData('text/plain', event.target.dataset.columnId);
        }

        // Drag over event handler
        function dragOver(event) {
            event.preventDefault();
        }

        // Drop event handler
        function drop(event) {
            event.preventDefault();
            const fromColumnId = event.dataTransfer.getData('text/plain');
            const toColumnId = this.dataset.testid.split('-')[1];

            if (fromColumnId === toColumnId) return; // Prevent moving within the same column

            const cardElement = document.querySelector(`[data-testid="card"][data-columnId="${fromColumnId}"]`);
            const cardData = cardsData[fromColumnId].find(c => c.id === cardElement.dataset.id);

            if (!cardData) return;

            // Remove from old column
            cardsData[fromColumnId] = cardsData[fromColumnId].filter(c => c.id !== cardData.id);

            // Add to new column
            cardsData[toColumnId].push(cardData);

            // Update data and render
            saveState();
            renderCards();

            if (toColumnId === 'done') {
                animateConfetti();
            }

        }

        // Animate confetti effect
        function animateConfetti() {
            const confettiContainer = document.createElement('div');
            confettiContainer.classList.add('confetti');

            for (let i = 0; i < 100; i++) {
                const confettiParticle = document.createElement('div');
                confettiContainer.appendChild(confettiParticle);

                const size = Math.random() * 10 + 5;
                const duration = Math.random() * 3 + 2;
                confettiParticle.style.width = `${size}px`;
                confettiParticle.style.height = `${size}px`;
                confettiParticle.style.left = `${Math.random() * 100}%`;
                confettiParticle.style.animation = `fall ${duration}s linear infinite`;

                setTimeout(() => {
                    confettiContainer.remove();
                }, duration * 1000);
            }

            document.body.appendChild(confettiContainer);
        }

        // Edit card functionality
        function editCard(card, cardElement) {
            const textarea = document.createElement('textarea');
            textarea.value = card.text;
            textarea.classList.add('w-full p-2 border rounded focus:outline-none');

            // Replace the card title with the textarea
            cardElement.innerHTML = '';
            const cardContentDiv = document.createElement('div');
            cardContentDiv.classList.add('flex-grow');
            cardContentDiv.appendChild(textarea);

            const cardFooterDiv = document.createElement('div');
            cardFooterDiv.classList.add('flex space-x-2');

            const saveButton = document.createElement('button');
            saveButton.innerHTML = 'Save';
            saveButton.classList.add('bg-green-500 hover:bg-green-700 text-white font-bold py-1 px-2 rounded');

            const cancelButton = document.createElement('button');
            cancelButton.innerHTML = 'Cancel';
            cancelButton.classList.add('bg-gray-300 hover:bg-gray-400 text-gray-700 font-bold py-1 px-2 rounded');

            cardFooterDiv.appendChild(saveButton);
            cardFooterDiv.appendChild(cancelButton);

            cardElement.appendChild(cardContentDiv);
            cardElement.appendChild(cardFooterDiv);

            saveButton.addEventListener('click', () => {
                const newText = textarea.value;
                card.text = newText;
                saveState();
                renderCards();
            });

            cancelButton.addEventListener('click', () => {
                renderCards(); // Re-render to show the original card title
            });
        }

        // Delete card functionality
        function deleteCard(card, columnId) {
            const confirmMessage = `Are you sure you want to delete "${card.text}"?`;
            deleteMessage.textContent = confirmMessage;
            deleteModal.classList.remove('hidden');
        }

        confirmDeleteButton.addEventListener('click', () => {
            const cardElement = document.querySelector(`[data-testid="card"][data-id="${card.id}"]`);
            const columnId = cardElement?.dataset.columnId;

            if (cardElement && columnId) {
                cardsData[columnId] = cardsData[columnId].filter(c => c.id !== card.id);
                saveState();
                renderCards();
            }

            deleteModal.classList.add('hidden');
        });

        cancelDeleteButton.addEventListener('click', () => {
            deleteModal.classList.add('hidden');
        });

        // Add card functionality
        document.querySelectorAll('[data-testid="add-card"]').forEach(button => {
            button.addEventListener('click', () => {
                openCardInputModal();
            });
        });

        // Open card input modal
        function openCardInputModal() {
            cardInputTextarea.value = ''; // Clear the input field
            cardInputModal.classList.remove('hidden');
        }

        saveCardButton.addEventListener('click', () => {
            const newTitle = cardInputTextarea.value;

            if (newTitle.trim() !== '') {
                const newCard = { id: generateId(), text: newTitle };

                // Add to backlog by default
                cardsData.backlog.push(newCard);

                saveState();
                renderCards();
            }
        });

        cancelCardButton.addEventListener('click', () => {
            cardInputModal.classList.add('hidden');
        });

        // Generate a unique ID for each card
        function generateId() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        // Event listener for Enter key in card input textarea.
        cardInputTextarea.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                saveCardButton.click();
            }
        });

        // Initial load and render
        loadState();
    </script>
</body>

</html>
