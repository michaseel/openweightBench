<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="black"/>
    </marker>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1200" height="800" fill="white"/>
  </g>

  <g id="eisenhower-matrix">
    <!-- Quadranten -->
    <rect x="200" y="150" width="380" height="380" fill="#F2F2F2" stroke="black" stroke-width="2"/>
    <rect x="600" y="150" width="380" height="380" fill="#F2F2F2" stroke="black" stroke-width="2"/>
    <rect x="200" y="550" width="380" height="180" fill="#F2F2F2" stroke="black" stroke-width="2"/>
    <rect x="600" y="550" width="380" height="180" fill="#F2F2F2" stroke="black" stroke-width="2"/>

    <!-- Achsen -->
    <line x1="490" y1="150" x2="490" y2="630" stroke="black" stroke-width="2"/>
    <line x1="200" y1="340" x2="600" y2="340" stroke="black" stroke-width="2"/>

    <!-- Beschriftungen Achsen -->
    <text x="480" y="130" font-size="16">hoch</text>
    <text x="480" y="650" font-size="16">niedrig</text>
    <text x="280" y="330" font-size="16">Dringlichkeit</text>
    <text x="580" y="330" font-size="16">Dringlichkeit</text>

    <!-- Inhalt Quadranten -->
    <g id="quadrant-1">
      <text x="250" y="200" font-size="14">Content - Strategie</text>
      <text x="250" y="230" font-size="14">Brand schärfen</text>
      <text x="250" y="260" font-size="14">SEO aufräumen</text>
      <text x="250" y="290" font-size="14">Zielgruppen verstehen</text>
    </g>

    <g id="quadrant-2">
      <text x="650" y="200" font-size="14">Shitstorm beantworten</text>
      <text x="650" y="230" font-size="14">Newsletter mit</text>
      <text x="650" y="260" font-size="14">Chef will bis 4 Uhr</text>
      <text x="650" y="290" font-size="14">viral gehen</text>
    </g>

    <g id="quadrant-3">
      <text x="250" y="600" font-size="14">Merch-Ideen mit Glitzer</text>
      <text x="250" y="630" font-size="14">Buzzword - Bingo</text>
      <text x="250" y="660" font-size="14">TikTok - Tanz mit dem</text>
      <text x="250" y="690" font-size="14">Maskottchen</text>
    </g>

    <g id="quadrant-4">
      <text x="650" y="600" font-size="14">Hashtag brainstormen</text>
      <text x="650" y="630" font-size="14">#innovation #synergy #wow</text>
      <text x="650" y="660" font-size="14">Kann das Logo grüner?</text>
      <text x="650" y="690" font-size="14">LinkedIn - Post für</text>
      <text x="650" y="720" font-size="14">„Welttag der Bürokrammer“</text>
      <text x="650" y="750" font-size="14">Folie 27 schöner machen</text>
    </g>

    <!-- Pfeile -->
    <line x1="490" y1="150" x2="490" y2="340" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="490" y1="340" x2="490" y2="550" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="200" y1="340" x2="600" y2="340" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="200" y1="340" x2="200" y2="550" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="600" y1="340" x2="600" y2="550" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>
  </g>

  <g id="zusatz">
    <text x="100" y="50" font-size="24">Eisenhower - Matrix</text>
    <text x="100" y="80" font-size="24">Marketing</text>
    <text x="100" y="120" font-size="14">Kampagne retten</text>
    <text x="100" y="140" font-size="14">falschem Link fixen</text>
    <text x="100" y="160" font-size="14">zählt nicht.</text>
    <text x="100" y="180" font-size="14">Aber hilft.</text>
  </g>

    <g id="zusatz2">
        <line x1="900" y1="50" x2="930" y2="80" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>
        <line x1="900" y1="80" x2="930" y2="110" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>
        <line x1="900" y1="110" x2="930" y2="140" stroke="black" stroke-width="1" marker-end="url(#arrow)"/>
    </g>

</svg>