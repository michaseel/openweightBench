<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="0" refY="0" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8" fill="black"/>
    </marker>
  </defs>

  <g id="background">
    <rect width="100%" height="100%" fill="white"/>
  </g>

  <g id="nodes">
    <!-- Frontend -->
    <rect x="150" y="100" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
    <text x="150 + 75" y="100 + 40" dominant-baseline="middle" text-anchor="middle">Frontend (React)</text>

    <!-- Backend -->
    <rect x="450" y="100" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
    <text x="450 + 75" y="100 + 40" dominant-baseline="middle" text-anchor="middle">Backend (Python / FastAPI)</text>

    <!-- API Gateway -->
    <rect x="150" y="250" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
    <text x="150 + 75" y="250 + 40" dominant-baseline="middle" text-anchor="middle">API Gateway (Kong)</text>

    <!-- Auth Service -->
    <rect x="450" y="250" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
    <text x="450 + 75" y="250 + 40" dominant-baseline="middle" text-anchor="middle">Auth Service (JWT)</text>

    <!-- Worker Service -->
    <rect x="450" y="400" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
    <text x="450 + 75" y="400 + 40" dominant-baseline="middle" text-anchor="middle">Worker Service (Python)</text>

    <!-- Message Queue -->
    <rect x="150" y="400" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
    <text x="150 + 75" y="400 + 40" dominant-baseline="middle" text-anchor="middle">Message Queue (RabbitMQ)</text>

    <!-- External API -->
    <rect x="150" y="550" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
    <text x="150 + 75" y="550 + 40" dominant-baseline="middle" text-anchor="middle">External API (Payment Provider)</text>

    <!-- File Storage -->
    <rect x="450" y="550" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
    <text x="450 + 75" y="550 + 40" dominant-baseline="middle" text-anchor="middle">File Storage (S3)</text>

    <!-- User DB -->
    <rect x="750" y="100" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
    <text x="750 + 75" y="100 + 40" dominant-baseline="middle" text-anchor="middle">User DB (PostgreSQL)</text>

    <!-- Database -->
    <rect x="750" y="250" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
    <text x="750 + 75" y="250 + 40" dominant-baseline="middle" text-anchor="middle">Database (PostgreSQL)</text>
  </g>

  <g id="connections">
    <!-- Frontend -> API Gateway -->
    <line x1="200" y1="140" x2="300" y2="290" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Backend -> API Gateway -->
    <line x1="600" y1="140" x2="300" y2="290" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- API Gateway -> Backend -->
    <line x1="300" y1="290" x2="600" y2="140" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Auth Service -> User DB -->
    <line x1="600" y1="290" x2="750" y2="140" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Backend -> Database -->
    <line x1="600" y1="290" x2="750" y2="340" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Message Queue -> Worker Service -->
    <line x1="300" y1="440" x2="600" y2="440" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Worker Service -> File Storage -->
    <line x1="600" y1="440" x2="600" y2="590" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- External API -> Message Queue -->
    <line x1="300" y1="590" x2="300" y2="440" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="notes">
    <text x="150" y="700" font-size="14">Notes:</text>
    <line x1="150" y1="720" x2="300" y2="720" stroke="black"/>
    <text x="180" y="735"> - Use Docker for all services</text>
    <line x1="150" y1="760" x2="300" y2="760" stroke="black"/>
    <text x="180" y="775"> - CI/CD with Github Actions</text>
    <line x1="150" y1="800" x2="300" y2="800" stroke="black"/>
    <text x="180" y="815"> - Logs -> ELK Stack</text>
  </g>

  <g id="goals">
    <text x="150" y="30" font-size="14">Goals:</text>
    <line x1="150" y1="50" x2="300" y2="50" stroke="black"/>
    <text x="180" y="65"> - Scalability</text>
    <line x1="150" y1="90" x2="300" y2="90" stroke="black"/>
    <text x="180" y="105"> - Reliability</text>
    <line x1="150" y1="120" x2="300" y2="120" stroke="black"/>
    <text x="180" y="135"> - Security</text>
    <line x1="150" y1="150" x2="300" y2="150" stroke="black"/>
    <text x="180" y="165"> - Maintainability</text>
  </g>

</svg>