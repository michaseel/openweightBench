<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.tailwindcss.com/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        /* Custom styles for transitions and confetti */
        .transition-opacity {
            transition: opacity 0.3s ease;
        }

        .confetti {
            position: fixed;
            top: -10px; /* Start above the viewport */
            left: 0;
            width: 100%;
            height: 100vh; /* Full viewport height */
            overflow: hidden;
            pointer-events: none;
            z-index: 1000; /* Ensure confetti is on top */
        }

        .confetti-particle {
            position: absolute;
            animation: confettiMove 5s linear infinite; /* Animate the particles */
        }

        @keyframes confettiMove {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh); /* Move particle off-screen */
                opacity: 0;
            }
        }

    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="w-full max-w-4xl bg-white shadow-lg rounded-lg overflow-auto">
        <!-- Column containers -->
        <div data-testid="column-backlog" class="flex flex-col p-4">
            <h2 class="text-lg font-semibold mb-4 text-blue-600">Backlog</h2>
            <button data-testid="add-card" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Add card</button>
        </div>

        <div data-testid="column-in-progress" class="flex flex-col p-4">
            <h2 class="text-lg font-semibold mb-4 text-yellow-600">In Progress</h2>
            <button data-testid="add-card" class="bg-yellow-500 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Add card</button>
        </div>

        <div data-testid="column-review" class="flex flex-col p-4">
            <h2 class="text-lg font-semibold mb-4 text-green-600">Review</h2>
            <button data-testid="add-card" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Add card</button>
        </div>

        <div data-testid="column-done" class="flex flex-col p-4">
            <h2 class="text-lg font-semibold mb-4 text-red-600">Done</h2>
            <button data-testid="add-card" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Add card</button>
        </div>
    </div>

    <!-- Script -->
    <script>
        const columns = {
            backlog: document.getElementById('column-backlog'),
            inProgress: document.getElementById('column-in-progress'),
            review: document.getElementById('column-review'),
            done: document.getElementById('column-done')
        };

        const localStorageKey = 'kanbanBoard'; // Unique namespace to prevent conflicts

        // Function to load data from localStorage
        function loadData() {
            const storedData = localStorage.getItem(localStorageKey);
            return storedData ? JSON.parse(storedData) : {
                backlog: [],
                inProgress: [],
                review: [],
                done: []
            };
        }

        // Function to save data to localStorage
        function saveData(data) {
            localStorage.setItem(localStorageKey, JSON.stringify(data));
        }

        let boardData = loadData(); // Initialize with loaded data or empty state

        // Function to create a card element
        function createCard(title) {
            const card = document.createElement('div');
            card.classList.add('bg-gray-200', 'rounded-lg', 'p-4', 'mb-4', 'shadow-md', 'transition-opacity');
            card.setAttribute('data-testid', 'card');

            const cardTitle = document.createElement('input');
            cardTitle.type = 'text';
            cardTitle.value = title;
            cardTitle.classList.add('block', 'w-full', 'p-2', 'text-gray-800', 'border-b', 'focus:outline-none', 'focus:ring-2', 'focus:ring-blue-500');
            cardTitle.setAttribute('data-testid', 'card-input');

            const deleteButton = document.createElement('button');
            deleteButton.classList.add('bg-red-500', 'hover:bg-red-700', 'text-white', 'font-bold', 'py-1', 'px-2', 'rounded', 'focus:outline-none', 'focus:shadow-outline');
            deleteButton.setAttribute('data-testid', 'delete-card');
            deleteButton.textContent = 'Delete';

            card.appendChild(cardTitle);
            card.appendChild(deleteButton);

            return card;
        }


        // Add dummy cards if none exist
        if (Object.values(boardData).every(arr => arr.length === 0)) {
            boardData.backlog.push({ title: "Initial Backlog Card 1" });
            boardData.backlog.push({ title: "Initial Backlog Card 2" });
            boardData.inProgress.push({ title: "Initial In Progress Card"});
            saveData(boardData); // Save dummy data to localStorage
        }



        // Function to render cards in a column
        function renderColumn(column, data) {
            column.innerHTML = ''; // Clear existing cards

            data.forEach(cardData => {
                const cardElement = createCard(cardData.title);

                // Add delete event listener
                cardElement.querySelector('[data-testid="delete-card"]').addEventListener('click', (event) => {
                    const isConfirmed = confirm("Are you sure you want to delete this card?");
                    if (isConfirmed) {
                        const index = data.findIndex(c => c.title === cardData.title);
                        if (index !== -1) {
                            data.splice(index, 1);
                            saveData(boardData); // Save updated data to localStorage
                            renderColumn(column, data); // Re-render the column
                        }

                    }
                });

                // Add card editing event listener
                 cardElement.querySelector('[data-testid="card-input"]').addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') {
                        const newTitle = event.target.value;

                         // Update card data in boardData
                        const index = data.findIndex(c => c.title === cardData.title);
                         if (index !== -1) {
                            data[index].title = newTitle;
                         }

                        saveData(boardData); // Save updated data to localStorage
                    }
                });


                column.appendChild(cardElement);
            });
        }

        // Initial rendering of the board
        renderColumn(columns.backlog, boardData.backlog);
        renderColumn(columns.inProgress, boardData.inProgress);
        renderColumn(columns.review, boardData.review);
        renderColumn(columns.done, boardData.done);

        // Add card event listeners to each column
        Object.keys(columns).forEach(columnName => {
            columns[columnName].querySelector('[data-testid="add-card"]').addEventListener('click', () => {
                const newCardTitle = prompt("Enter a title for the new card:");

                if (newCardTitle) {
                    const newCard = createCard(newCardTitle);

                    boardData[columnName].push({ title: newCardTitle });
                    saveData(boardData);

                    columns[columnName].appendChild(newCard);
                }
            });
        });

         // Drag and drop functionality (basic) - requires more robust implementation for production use
        let draggedCard = null;

        Object.keys(columns).forEach(columnName => {
            const column = columns[columnName];

            // Drag start event listener on card elements
            column.addEventListener('dragstart', (event) => {
                draggedCard = event.target;
                event.dataTransfer.effectAllowed = 'move';
            });

             // Drag over event listener on column elements
             column.addEventListener('dragover', (event) => {
                event.preventDefault(); // Necessary to allow drop
            });

            // Drop event listener on column elements
            column.addEventListener('drop', (event) => {
                event.preventDefault();

                if (draggedCard) {
                    const fromColumn = draggedCard.parentNode;
                    const toColumnIndex = Object.keys(columns).indexOf(columnName);

                    // Find the index of the dragged card in its original column
                    const fromIndex = Array.from(fromColumn.children).indexOf(draggedCard);

                    // Remove the card from its original column
                    fromColumn.removeChild(draggedCard);

                    // Add the card to the target column
                    column.appendChild(draggedCard);

                    // Update board data (simple title-based matching)
                    const cardTitle = draggedCard.querySelector('[data-testid="card-input"]').value;

                    // Update boardData
                    let fromColumnName = "";
                    if (fromIndex !== -1) {
                        for(const col in boardData){
                            if (Array.isArray(boardData[col]) && boardData[col].some(card => card.title === cardTitle)) {
                                fromColumnName = col;
                                break;
                            }
                        }

                    }

                    if(fromColumnName){
                         boardData[fromColumnName] = boardData[fromColumnName].filter(card => card.title !== cardTitle);
                    }

                     for(const col in boardData){
                         if (Array.isArray(boardData[col]) && boardData[col].some(card => card.title === cardTitle)) {
                            boardData[col].push({ title: cardTitle });
                             break;
                         }
                     }


                    saveData(boardData);

                    if (columnName === 'done') {
                        // Trigger confetti animation when card moves to "Done" column
                        const confettiElement = document.createElement('div');
                        confettiElement.classList.add('confetti');
                        document.body.appendChild(confettiElement);

                         // Create confetti particles (basic example)
                        for (let i = 0; i < 100; i++) {
                            const particle = document.createElement('div');
                            particle.classList.add('confetti-particle');
                            const randomColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                            particle.style.backgroundColor = randomColor;

                            // Random position and size
                            particle.style.left = `${Math.random() * 100}vw`;
                            particle.style.top = `${Math.random() * 100}vh`;
                            particle.style.size = `${Math.random() * 5 + 1}px`;
                            confettiElement.appendChild(particle);

                        }


                    }



                }
                draggedCard = null; // Reset dragged card after drop
            });

        });




    </script>
</body>
</html>
