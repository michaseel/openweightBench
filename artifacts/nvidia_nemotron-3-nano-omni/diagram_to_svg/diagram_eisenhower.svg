<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#ffffff"/>
  <!-- vertical axis -->
  <line x1="150" y1="200" x2="150" y2="600" stroke="#333" stroke-width="2"/>
  <!-- horizontal axis -->
  <line x1="150" y1="400" x2="1050" y2="400" stroke="#333" stroke-width="2"/>
  <!-- quadrant outlines -->
  <rect x="150" y="200" width="450" height="200" stroke="#333" fill="none"/>
  <rect x="600" y="200" width="450" height="200" stroke="#333" fill="none"/>
  <rect x="150" y="400" width="450" height="200" stroke="#333" fill="none"/>
  <rect x="600" y="400" width="450" height="200" stroke="#333" fill="none"/>
  <!-- quadrant titles -->
  <text x="250" y="230" font-family="sans-serif" font-size="16" fill="#000">Wichtig + Nicht dringend</text>
  <text x="750" y="230" font-family="sans-serif" font-size="16" fill="#000">Wichtig + Dringend</text>
  <text x="250" y="450" font-family="sans-serif" font-size="16" fill="#000">Nicht wichtig + Nicht dringend</text>
  <text x="750" y="450" font-family="sans-serif" font-size="16" fill="#000">Nicht wichtig + Dringend</text>
  <!-- items top-left -->
  <g id="tl-items">
    <text x="180" y="250" font-family="sans-serif" font-size="14" fill="#000">Content-Strategie</text>
    <text x="180" y="270" font-family="sans-serif" font-size="14" fill="#000">Brand schützen</text>
    <text x="180" y="290" font-family="sans-serif" font-size="14" fill="#000">SEO optimieren</text>
    <text x="180" y="310" font-family="sans-serif" font-size="14" fill="#000">Rückgriffen verstehen</text>
  </g>
  <!-- items top-right -->
  <g id="tr-items">
    <text x="620" y="250" font-family="sans-serif" font-size="14" fill="#000">Kampagne retten</text>
    <text x="620" y="270" font-family="sans-serif" font-size="14" fill="#000">Siteltern bearbeiten</text>
    <text x="620" y="290" font-family="sans-serif" font-size="14" fill="#000">Newsletter mit falschen Link fixen</text>
    <text x="620" y="310" font-family="sans-serif" font-size="14" fill="#000">Event will bis 49 Uhr sonst geil</text>
  </g>
  <!-- items bottom-left -->
  <g id="bl-items">
    <text x="180" y="460" font-family="sans-serif" font-size="14" fill="#000">Mark-Ideen mit Sticker</text>
    <text x="180" y="480" font-family="sans-serif" font-size="14" fill="#000">Buzzword-Bingo</text>
    <text x="180" y="500" font-family="sans-serif" font-size="14" fill="#000">TikTok-Tags mit den Marketingdosen</text>
    <text x="180" y="520" font-family="sans-serif" font-size="14" fill="#000">Hashtag kreieren #machen #ausprobieren #new</text>
  </g>
  <!-- items bottom-right -->
  <g id="br-items">
    <text x="620" y="460" font-family="sans-serif" font-size="14" fill="#000">Noch ein Lead-Magnet-Marketing?</text>
    <text x="620" y="480" font-family="sans-serif" font-size="14" fill="#000">Kenn das Logo größer?</text>
    <text x="620" y="500" font-family="sans-serif" font-size="14" fill="#000">LinkedIn-Post für „Wichtig der Businessname“</text>
    <text x="620" y="520" font-family="sans-serif" font-size="14" fill="#000">Fake 2% schöner machen</text>
  </g>
  <!-- axis labels -->
  <text x="130" y="400" font-family="sans-serif" font-size="16" fill="#000" transform="rotate(-90 130,400)">Wichtigkeit</text>
  <text x="600" y="620" font-family="sans-serif" font-size="16" fill="#000">Dringlichkeit</text>
  <!-- bottom arrow -->
  <line x1="150" y1="630" x2="1050" y2="630" stroke="#333" stroke-width="2"/>
  <polygon points="150,630 158,625 158,635" fill="#333"/>
  <polygon points="1050,630 1042,625 1042,635" fill="#333"/>
  <!-- decorative heart -->
  <path d="M120 560 C115 555,115 570,120 580 C125 595,140 595,145 580 C150 565,155 555,150 560 Z" fill="#ff6f61"/>
  <text x="130" y="570" font-family="sans-serif" font-size="14" fill="#000">Erfahrung macht das Internet ungleich viel Spaß</text>
  <!-- coffee cup -->
  <ellipse cx="960" cy="240" rx="30" ry="20" fill="#ffcc80" stroke="#333" stroke-width="1"/>
  <path d="M990 235 Q1005 245 1005 260" fill="none" stroke="#333" stroke-width="2"/>
  <text x="970" y="280" font-family="sans-serif" font-size="14" fill="#000">Kaffee zahlt nicht aber hilft</text>
  <!-- exclamation marks -->
  <text x="1060" y="580" font-family="sans-serif" font-size="24" fill="#ff0000">!!!</text>
  <!-- main title -->
  <text x="600" y="180" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#000">Eisenhower - Matrix - Marketing</text>
  <!-- intersection marker (optional) -->
  <circle cx="600" cy="400" r="5" fill="#333"/>
</svg>