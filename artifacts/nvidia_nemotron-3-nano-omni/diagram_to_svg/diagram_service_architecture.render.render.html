<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{padding:24px;display:inline-block;background:#fff}
  /* Force a concrete render box: many model-emitted SVGs only set viewBox.
     Without a width here, an inline-block parent collapses the SVG to its
     intrinsic ~300x150 (or smaller) and the screenshot becomes a tiny
     blank tile. Fixed width + auto height uses viewBox aspect-ratio. */
  .wrap svg{display:block;width:1200px;height:auto;max-width:none}
</style></head><body><div class="wrap"><svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="50" y="60" font-size="18" font-family="Arial, sans-serif">System Architecture</text>

  <!-- Frontend Box -->
  <g id="frontend">
    <rect x="200" y="300" width="150" height="60" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
    <text x="275" y="340" font-size="14" font-family="Arial, sans-serif">Frontend (React)</text>
  </g>

  <!-- API Gateway Box -->
  <g id="apigw">
    <rect x="450" y="300" width="150" height="60" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
    <text x="525" y="340" font-size="14" font-family="Arial, sans-serif">API Gateway</text>
  </g>

  <!-- Auth Service Box -->
  <g id="auth">
    <rect x="750" y="280" width="120" height="50" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
    <text x="810" y="310" font-size="14" font-family="Arial, sans-serif">Auth Service (JWT)</text>
  </g>

  <!-- File Upload Box -->
  <g id="fileupload">
    <rect x="600" y="350" width="120" height="50" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
    <text x="660" y="380" font-size="14" font-family="Arial, sans-serif">File Upload (S3/MinIO)</text>
  </g>

  <!-- Backend API Box -->
  <g id="backend">
    <rect x="500" y="400" width="140" height="60" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
    <text x="575" y="430" font-size="14" font-family="Arial, sans-serif">Backend API (Spring Boot / Node.js)</text>
  </g>

  <!-- Message Queue Box -->
  <g id="mq">
    <rect x="450" y="450" width="120" height="50" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
    <text x="510" y="480" font-size="14" font-family="Arial, sans-serif">Message Queue (Kafka/MQ)</text>
  </g>

  <!-- Worker Service Box -->
  <g id="worker">
    <rect x="500" y="550" width="150" height="60" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
    <text x="575" y="580" font-size="14" font-family="Arial, sans-serif">Worker Service (Python)</text>
  </g>

  <!-- Database Box -->
  <g id="db">
    <rect x="500" y="650" width="150" height="50" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
    <text x="575" y="680" font-size="14" font-family="Arial, sans-serif">Database (PostgreSQL/SQLite)</text>
  </g>

  <!-- Connections -->
  <!-- Frontend -> API Gateway -->
  <line x1="350" y1="330" x2="450" y2="330" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- API Gateway -> Auth Service -->
  <line x1="600" y1="330" x2="750" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- API Gateway -> File Upload -->
  <line x1="600" y1="360" x2="600" y2="400" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- File Upload -> Backend API -->
  <line x1="720" y1="380" x2="500" y2="400" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Backend API -> Message Queue -->
  <line x1="640" y1="460" x2="450" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Frontend -> Backend API (Dashed) -->
  <line x1="350" y1="360" x2="500" y2="400" stroke="#333" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  
  <!-- Message Queue -> Worker Service -->
  <line x1="570" y1="500" x2="500" y2="550" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Worker Service -> Database -->
  <line x1="650" y1="610" x2="500" y2="650" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

</svg></div></body></html>
