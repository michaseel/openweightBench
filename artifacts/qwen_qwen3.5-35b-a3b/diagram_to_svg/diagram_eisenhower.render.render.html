<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{padding:24px;display:inline-block;background:#fff}
  /* Force a concrete render box: many model-emitted SVGs only set viewBox.
     Without a width here, an inline-block parent collapses the SVG to its

  .wrap svg{display:block;width:1200px;height:auto;max-width:none}

    </g>

    <!-- Side Note: Erledigen... -->
    <g transform="translate(80, 450)">
       <path d="M 30,10 Q 15,-10 -10,10 T -55,10" fill="none" stroke="#2b6cb0" stroke-width="3"/> <!-- Heart top -->
       <path d="M -55,10 L -40,30 L -55,50 L -70,30 Z M 10,10 L 25,30 L 10,50 L -5,30 Z" fill="#e2e8f0" stroke="#2b6cb0" stroke-width="3"/> <!-- Two lobes -->

      <line x1="50" y1="10" x2="50" y2="40" stroke="#2b6cb0" stroke-width="4"/>

  <!-- Coffee Cup Note -->
  <g transform="translate(850, 120)">
    <path d="M 40,20 L 70,20 Q 80,20 80,30 L 80,50 Q 80,60 70,60 L 40,60 Q 30,60 30,50 L 30,30 Q 30,20 40,20" fill="#e2e8f0" stroke="#2b6cb0" stroke-width="3"/>

</svg></div></body></html>
