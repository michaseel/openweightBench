<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrant Kanban Board</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for transitions and confetti */
        .card {
            transition: transform 0.3s ease, box-shadow 0.2s ease;
        }
        .card-moving {
            opacity: 0.5;
            transform: scale(0.98);
        }
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: #000;
        }
        .confetti-particle {
            position: absolute;
            background: hsl(0, 70%, 50%);
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            animation: confetti 3s linear infinite;
        }
        @keyframes confetti {
            0% { transform: translate(0, -100vh) rotate(0deg); opacity: 1; }
            100% { transform: translate(0, 100vh) rotate(720deg); opacity: 0; }
        }
        /* Delete confirmation modal */
        .delete-modal {
            backdrop-filter: blur(5px);
            transition: opacity 0.3s ease;
        }
        .delete-modal.hidden {
            display: none;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-100 to-indigo-200 min-h-screen p-4 md:p-8">
    <!-- Confetti container -->
    <div id="confetti" class="confetti"></div>

    <!-- Kanban Board Container -->
    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <h1 class="text-2xl font-bold text-center py-4 text-indigo-800">Vibrant Kanban Board</h1>
        <div class="flex flex-col md:flex-row gap-4 px-4 pb-4">
            <!-- Backlog Column -->
            <div id="column-backlog" data-testid="column-backlog" class="w-full md:w-1/4 bg-gradient-to-b from-purple-50 to-purple-100 rounded-lg p-3 flex flex-col">
                <h2 class="font-semibold text-lg mb-2 text-purple-800">Backlog</h2>
                <div id="backlog-cards" class="flex-1 min-h-[150px] space-y-4">
                    <!-- Cards will be dynamically added here -->
                </div>
                <button
                    data-testid="add-card"
                    class="mt-3 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2"
                >
                    <span>+ Add Card</span>
                </button>
            </div>

            <!-- In Progress Column -->
            <div id="column-in-progress" data-testid="column-in-progress" class="w-full md:w-1/4 bg-gradient-to-b from-blue-50 to-blue-100 rounded-lg p-3 flex flex-col">
                <h2 class="font-semibold text-lg mb-2 text-blue-800">In Progress</h2>
                <div id="in-progress-cards" class="flex-1 min-h-[150px] space-y-4">
                    <!-- Cards will be dynamically added here -->
                </div>
                <button
                    data-testid="add-card"
                    class="mt-3 w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2"
                >
                    <span>+ Add Card</span>
                </button>
            </div>

            <!-- Review Column -->
            <div id="column-review" data-testid="column-review" class="w-full md:w-1/4 bg-gradient-to-b from-green-50 to-green-100 rounded-lg p-3 flex flex-col">
                <h2 class="font-semibold text-lg mb-2 text-green-800">Review</h2>
                <div id="review-cards" class="flex-1 min-h-[150px] space-y-4">
                    <!-- Cards will be dynamically added here -->
                </div>
                <button
                    data-testid="add-card"
                    class="mt-3 w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2"
                >
                    <span>+ Add Card</span>
                </button>
            </div>

            <!-- Done Column -->
            <div id="column-done" data-testid="column-done" class="w-full md:w-1/4 bg-gradient-to-b from-emerald-50 to-emerald-100 rounded-lg p-3 flex flex-col">
                <h2 class="font-semibold text-lg mb-2 text-emerald-800">Done</h2>
                <div id="done-cards" class="flex-1 min-h-[150px] space-y-4">
                    <!-- Cards will be dynamically added here -->
                </div>
                <button
                    data-testid="add-card"
                    class="mt-3 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2"
                >
                    <span>+ Add Card</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-black bg-opacity-50 delete-modal hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full relative">
            <h3 class="text-lg font-semibold mb-4 text-red-700">Confirm Deletion</h3>
            <p class="mb-6 text-gray-600">Are you sure you want to delete this card? This action cannot be undone.</p>
            <div class="flex justify-end gap-3">
                <button id="cancel-delete" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-lg transition-colors duration-200">
                    Cancel
                </button>
                <button
                    id="confirm-delete"
                    data-testid="confirm-delete"
                    class="bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200"
                >
                    Confirm Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Card Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full relative">
            <h3 class="text-lg font-semibold mb-4 text-indigo-700">Edit Card</h3>
            <textarea
                id="edit-input"
                data-testid="card-input"
                class="w-full h-24 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none"
                placeholder="Enter card title..."
            ></textarea>
            <div class="flex justify-end gap-3 mt-4">
                <button id="cancel-edit" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-lg transition-colors duration-200">
                    Cancel
                </button>
                <button id="save-edit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // KANBAN BOARD APP - VANILLA JAVASCRIPT
        // Namespace: kanbanBoardApp_v1.0
        // Features:
        // - Draggable cards between columns
        // - Editable card titles in-place
        // - LocalStorage persistence with unique namespace
        // - Delete confirmation modal (no window.alert)
        // - Add card functionality for each column
        // - Confetti animation on moving to "Done"
        // - Modern vibrant design with Tailwind CSS
        // =============================================

        document.addEventListener('DOMContentLoaded', function() {
            // DOM Elements
            const columns = {
                backlog: {
                    element: document.getElementById('column-backlog'),
                    cardsContainer: document.getElementById('backlog-cards'),
                    addButton: document.querySelector('[data-testid="add-card"]:nth-of-type(1)')
                },
                inProgress: {
                    element: document.getElementById('column-in-progress'),
                    cardsContainer: document.getElementById('in-progress-cards'),
                    addButton: document.querySelector('[data-testid="add-card"]:nth-of-type(2)')
                },
                review: {
                    element: document.getElementById('column-review'),
                    cardsContainer: document.getElementById('review-cards'),
                    addButton: document.querySelector('[data-testid="add-card"]:nth-of-type(3)')
                },
                done: {
                    element: document.getElementById('column-done'),
                    cardsContainer: document.getElementById('done-cards'),
                    addButton: document.querySelector('[data-testid="add-card"]:nth-of-type(4)')
                }
            };

            const deleteModal = document.getElementById('delete-modal');
            const confirmDeleteBtn = document.getElementById('confirm-delete');
            const cancelDeleteBtn = document.getElementById('cancel-delete');

            const editModal = document.getElementById('edit-modal');
            const editInput = document.getElementById('edit-input');
            const saveEditBtn = document.getElementById('save-edit');
            const cancelEditBtn = document.getElementById('cancel-edit');

            const confettiContainer = document.getElementById('confetti');

            // State management
            let currentDragCard = null;
            let cardsData = JSON.parse(localStorage.getItem('kanbanBoardApp_v1.0')) || {
                backlog: [],
                inProgress: [],
                review: [],
                done: []
            };

            // Initialize the board with dummy data if empty
            if (Object.values(cardsData).every(col => col.length === 0)) {
                cardsData = {
                    backlog: [
                        { id: generateId(), title: 'Design wireframes', color: '#9370DB' },
                        { id: generateId(), title: 'Implement responsive layout', color: '#8A2BE2' }
                    ],
                    inProgress: [
                        { id: generateId(), title: 'Build API integration', color: '#4169E1' }
                    ],
                    review: [],
                    done: []
                };
            }

            // Render the board from stored data
            renderBoard();

            // =========================================
            // EVENT LISTENERS
            // =========================================

            // Add card buttons for each column
            Object.values(columns).forEach(column => {
                column.addButton.addEventListener('click', () => openAddCardModal(column.element.id));
            });

            // Delete button in cards (will be added dynamically)
            document.addEventListener('click', (e) => {
                if (e.target.closest('[data-testid="delete-card"]')) {
                    const card = e.target.closest('[data-testid="card"]');
                    openDeleteModal(card);
                }
            });

            // Confetti click handler
            confettiContainer.addEventListener('click', () => {
                if (confettiContainer.classList.contains('active')) return;
                showConfetti();
            });

            // =========================================
            // MODAL HANDLERS
            // =========================================

            function openAddCardModal(columnId) {
                editInput.value = '';
                editInput.focus();
                editInput.dataset.columnId = columnId;

                // Set modal title based on column
                const modalTitle = document.querySelector('#edit-modal h3');
                if (modalTitle) {
                    switch(columnId) {
                        case 'backlog':
                            modalTitle.textContent = 'Add New Card to Backlog';
                            break;
                        case 'in-progress':
                            modalTitle.textContent = 'Add New Card to In Progress';
                            break;
                        case 'review':
                            modalTitle.textContent = 'Add New Card to Review';
                            break;
                        case 'done':
                            modalTitle.textContent = 'Add New Card to Done';
                            break;
                    }
                }

                editModal.classList.remove('hidden');
            }

            function closeEditModal() {
                editModal.classList.add('hidden');
            }

            saveEditBtn.addEventListener('click', () => {
                if (!editInput.value.trim()) return;

                const columnId = editInput.dataset.columnId;
                if (columnId) {
                    addCard(columnId, editInput.value);
                    closeEditModal();
                }
            });

            cancelEditBtn.addEventListener('click', closeEditModal);

            // Close modals when clicking outside
            deleteModal.addEventListener('click', (e) => {
                if (e.target === deleteModal) closeDeleteModal();
            });
            editModal.addEventListener('click', (e) => {
                if (e.target === editModal) closeEditModal();
            });

            function openDeleteModal(cardElement) {
                const card = cardElement;
                const deleteBtn = card.querySelector('[data-testid="delete-card"]');

                // Store reference to the card being deleted
                cardElement.dataset.tmpIdToDelete = card.id;

                deleteModal.classList.remove('hidden');
            }

            function closeDeleteModal() {
                // Clean up temp ID if it exists
                const tempId = document.querySelector('[data-tmp-id-to-delete]');
                if (tempId) tempId.removeAttribute('data-tmp-id-to-delete');

                deleteModal.classList.add('hidden');
            }

            confirmDeleteBtn.addEventListener('click', () => {
                const cardElement = document.querySelector('[data-tmp-id-to-delete]');
                if (!cardElement) return;

                // Find which column the card is in
                let columnId;
                for (const [col, data] of Object.entries(cardsData)) {
                    const foundCard = data.find(card => card.id === cardElement.dataset.tmpIdToDelete);
                    if (foundCard) {
                        columnId = col;
                        break;
                    }
                }

                // Remove the card
                removeCard(columnId, cardElement.dataset.tmpIdToDelete);

                closeDeleteModal();
            });

            cancelDeleteBtn.addEventListener('click', closeDeleteModal);

            // =========================================
            // CARD INTERACTIONS
            // =========================================

            // Make cards draggable
            function makeCardsDraggable() {
                const cardElements = document.querySelectorAll('[data-testid="card"]');

                cardElements.forEach(card => {
                    card.setAttribute('draggable', 'true');
                    card.classList.add('cursor-move');

                    card.addEventListener('dragstart', (e) => {
                        e.dataTransfer.effectAllowed = 'move';
                        currentDragCard = card;
                        card.classList.add('card-moving');
                    });

                    // Handle drag over columns
                    document.querySelectorAll('[data-testid^="column-"]').forEach(column => {
                        column.addEventListener('dragover', (e) => {
                            e.preventDefault();
                            const cardsContainer = column.querySelector('[data-testid^="cards"]');
                            if (!cardsContainer.contains(e.target)) {
                                // Only allow drop on the column, not inside it
                                e.dataTransfer.dropEffect = 'move';
                            }
                        });

                        column.addEventListener('drop', (e) => {
                            e.preventDefault();
                            const cardsContainer = column.querySelector('[data-testid^="cards"]');

                            if (!cardsContainer.contains(e.target) && currentDragCard !== null) {
                                // Only process drop if it's on the column itself
                                const fromColumnId = currentDragCard.closest('[data-testid^="column-"]').id;
                                const toColumnId = column.id;

                                if (fromColumnId !== toColumnId) {
                                    moveCard(fromColumnId, toColumnId);
                                }
                            }

                            // Reset drag state
                            document.querySelectorAll('[data-testid^="card"]').forEach(c => c.classList.remove('card-moving'));
                        });
                    });
                });
            }

            function moveCard(fromColumnId, toColumnId) {
                if (fromColumnId === 'done') return; // No confetti for moving within done

                const fromCards = cardsData[fromColumnId];
                const toCards = cardsData[toColumnId];

                let cardToMove;
                let index;

                // Find the card in source column
                for (let i = 0; i < fromCards.length; i++) {
                    if (currentDragCard.dataset.id === fromCards[i].id) {
                        cardToMove = { ...fromCards[i] };
                        index = i;
                        break;
                    }
                }

                if (cardToMove) {
                    // Remove from source column
                    cardsData[fromColumnId].splice(index, 1);

                    // Add to target column with a new position
                    const cardWithPosition = { ...cardToMove };
                    cardsData[toColumnId].push(cardWithPosition);
                }

                // Persist changes and re-render
                persistData();
                renderBoard();

                // Show confetti if moving to done
                if (toColumnId === 'done') {
                    showConfetti();
                }
            }

            function addCard(columnId, title) {
                const newCard = {
                    id: generateId(),
                    title: title.trim() || 'Untitled Card',
                    color: getRandomColor()
                };

                cardsData[columnId].push(newCard);
                persistData();
                renderBoard();

                // Focus the input if it's an add operation
                if (editInput && editInput.value) {
                    closeEditModal();
                }
            }

            function removeCard(columnId, cardId) {
                const index = cardsData[columnId].findIndex(card => card.id === cardId);
                if (index !== -1) {
                    cardsData[columnId].splice(index, 1);
                    persistData();
                    renderBoard();
                }
            }

            function editCard(cardElement, newTitle) {
                const cardId = cardElement.dataset.id;
                let columnId;

                // Find which column the card is in
                for (const [col, data] of Object.entries(cardsData)) {
                    const foundCard = data.find(card => card.id === cardId);
                    if (foundCard) {
                        columnId = col;
                        break;
                    }
                }

                if (columnId && newTitle.trim()) {
                    cardsData[columnId].find(card => card.id === cardId).title = newTitle.trim();
                    persistData();
                    renderBoard();
                }
            }

            // =========================================
            // RENDER FUNCTIONS
            // =========================================

            function renderBoard() {
                // Clear all cards first
                Object.values(columns).forEach(column => {
                    column.cardsContainer.innerHTML = '';
                });

                // Render each card for each column
                Object.entries(cardsData).forEach(([columnId, cards]) => {
                    const column = columns[columnId];
                    if (!column) return;

                    cards.forEach(card => {
                        const cardElement = createCardElement(card);
                        column.cardsContainer.appendChild(cardElement);
                    });
                });

                // Reattach event listeners
                makeCardsDraggable();
            }

            function createCardElement(card) {
                return document.createElement('div', {
                    class: 'card bg-white rounded-lg shadow-md p-4 border-l-4 border-indigo-200 hover:border-indigo-300 transition-all cursor-pointer',
                    'data-testid': 'card',
                    id: card.id
                });
            }

            // =========================================
            // UTILITY FUNCTIONS
            // =========================================

            function persistData() {
                localStorage.setItem('kanbanBoardApp_v1.0', JSON.stringify(cardsData));
            }

            function generateId() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            }

            function getRandomColor() {
                // Generate a vibrant color that works well with the theme
                const colors = [
                    '#9370DB', '#8A2BE2', '#4169E1',
                    '#00BFFF', '#1E90FF', '#4169E1',
                    '#00CED1', '#00FA9A', '#228B22',
                    '#32CD32', '#7CFC00', '#7FFF00'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            function showConfetti() {
                confettiContainer.classList.add('active');

                // Remove confetti after animation completes
                setTimeout(() => {
                    confettiContainer.classList.remove('active');
                }, 3000);
            }

            // =========================================
            // ENTER KEY HANDLER FOR CARD INPUTS
            // =========================================

            editInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    saveEditBtn.click();
                }
            });

            // =========================================
            // INITIAL RENDER WITH DUMMY DATA IF NEEDED
            // This is handled at the start of the script, but we'll ensure it's robust
            // =========================================

        });
    </script>
</body>
</html>
