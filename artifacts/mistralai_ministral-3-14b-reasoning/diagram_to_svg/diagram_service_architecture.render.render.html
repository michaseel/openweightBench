<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{padding:24px;display:inline-block;background:#fff}
  /* Force a concrete render box: many model-emitted SVGs only set viewBox.
     Without a width here, an inline-block parent collapses the SVG to its
     intrinsic ~300x150 (or smaller) and the screenshot becomes a tiny
     blank tile. Fixed width + auto height uses viewBox aspect-ratio. */
  .wrap svg{display:block;width:1200px;height:auto;max-width:none}
</style></head><body><div class="wrap"><svg width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
    <marker id="async-arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000" stroke-dasharray="5,2"/>
    </marker>
  </defs>

  <!-- Goals -->
  <g id="goals">
    <rect x="50" y="50" width="200" height="100" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="70" y="75" font-size="14" font-family="Arial">Goals</text>
    <text x="70" y="95" font-size="12" font-family="Arial">- Scalability</text>
    <text x="70" y="115" font-size="12" font-family="Arial">- Reliability</text>
    <text x="70" y="135" font-size="12" font-family="Arial">- Security</text>
    <text x="70" y="155" font-size="12" font-family="Arial">- Maintainability</text>
  </g>

  <!-- Notes -->
  <g id="notes">
    <rect x="50" y="300" width="200" height="150" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="70" y="325" font-size="14" font-family="Arial">Notes</text>
    <text x="70" y="345" font-size="12" font-family="Arial">- Use Docker for all services</text>
    <text x="70" y="365" font-size="12" font-family="Arial">- CI/CD with GitHub Actions</text>
    <text x="70" y="385" font-size="12" font-family="Arial">- Logs → ELK Stack</text>
  </g>

  <!-- Frontend -->
  <g id="frontend">
    <rect x="400" y="100" width="150" height="100" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="420" y="120" font-size="16" font-family="Arial">Frontend</text>
    <text x="420" y="140" font-size="12" font-family="Arial">(React)</text>
  </g>

  <!-- API Gateway -->
  <g id="api-gateway">
    <rect x="650" y="100" width="150" height="100" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="670" y="120" font-size="16" font-family="Arial">API Gateway</text>
    <text x="670" y="140" font-size="12" font-family="Arial">(Kong)</text>
  </g>

  <!-- Auth Service -->
  <g id="auth-service">
    <rect x="950" y="80" width="150" height="100" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="970" y="100" font-size="16" font-family="Arial">Auth Service</text>
    <text x="970" y="120" font-size="12" font-family="Arial">(JWT)</text>
  </g>

  <!-- User DB -->
  <g id="user-db">
    <rect x="1150" y="80" width="100" height="60" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="1170" y="100" font-size="14" font-family="Arial">User DB</text>
    <text x="1170" y="120" font-size="12" font-family="Arial">(PostgreSQL)</text>
  </g>

  <!-- Backend -->
  <g id="backend">
    <rect x="650" y="300" width="150" height="100" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="670" y="320" font-size="16" font-family="Arial">Backend</text>
    <text x="670" y="340" font-size="12" font-family="Arial">(Python/FastAPI)</text>
  </g>

  <!-- Database -->
  <g id="database">
    <rect x="850" y="300" width="100" height="60" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="870" y="320" font-size="14" font-family="Arial">Database</text>
    <text x="870" y="340" font-size="12" font-family="Arial">(PostgreSQL)</text>
  </g>

  <!-- Message Queue -->
  <g id="message-queue">
    <rect x="650" y="500" width="150" height="80" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="670" y="520" font-size="16" font-family="Arial">Message Queue</text>
    <text x="670" y="540" font-size="12" font-family="Arial">(RabbitMQ)</text>
  </g>

  <!-- Worker Service -->
  <g id="worker-service">
    <rect x="950" y="500" width="150" height="80" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="970" y="520" font-size="16" font-family="Arial">Worker Service</text>
    <text x="970" y="540" font-size="12" font-family="Arial">(Python)</text>
  </g>

  <!-- File Storage -->
  <g id="file-storage">
    <rect x="1150" y="500" width="100" height="60" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="1170" y="520" font-size="14" font-family="Arial">File Storage</text>
    <text x="1170" y="540" font-size="12" font-family="Arial">(S3)</text>
  </g>

  <!-- Monitoring -->
  <g id="monitoring">
    <rect x="650" y="650" width="150" height="80" rx="5" ry="5" fill="#f8f8f8" stroke="#333" stroke-width="1"/>
    <text x="670" y="670" font-size="16" font-family="Arial">Monitoring</text>
    <text x="670" y="690" font-size="12" font-family="Arial">(Prometheus + Grafana)</text>
  </g>

  <!-- External API -->
  <g id="external-api">
    <rect x="450" y="300" width="150" height="80" rx="5" ry="5" fill="#ffcccc" stroke="#d8000c" stroke-width="1"/>
    <text x="470" y="320" font-size="16" font-family="Arial">External API</text>
    <text x="470" y="340" font-size="12" font-family="Arial">(Payment Provider)</text>
  </g>

  <!-- Connections -->
  <line x1="550" y1="150" x2="650" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="600" y="145" font-size="12" font-family="Arial">HTTPS</text>

  <line x1="700" y1="300" x2="950" y2="80" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="650" y1="400" x2="650" y2="500" stroke="#000" stroke-dasharray="5,2" stroke-width="2" marker-end="url(#async-arrowhead)"/>

  <line x1="950" y1="380" x2="950" y2="500" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="650" y1="580" x2="650" y2="650" stroke="#000" stroke-dasharray="5,2" stroke-width="2" marker-end="url(#async-arrowhead)"/>

  <line x1="950" y1="580" x2="1150" y2="500" stroke="#000" stroke-dasharray="5,2" stroke-width="2" marker-end="url(#async-arrowhead)"/>
</svg></div></body></html>
