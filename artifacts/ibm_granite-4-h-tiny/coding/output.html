<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .confetti {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 9999;
      pointer-events: none;
    }
    
    .confetti-canvas {
      position: absolute;
      width: 200px;
      height: 400px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      overflow: hidden;
    }
    
    @keyframes confetti {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .confetti-circle {
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: #ff9a9e;
      border-radius: 50%;
      animation: confetti 1s linear infinite;
      opacity: 0.5;
    }
    
    .confetti-circle::before,
    .confetti-circle::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: inherit;
      border-radius: 50%;
      animation: confetti 1s linear infinite;
    }
    
    .confetti-circle::before {
      transform: rotate(0deg);
      top: -10px;
      left: -10px;
    }
    
    .confetti-circle::after {
      transform: rotate(360deg);
      bottom: -10px;
      right: -10px;
    }
  </style>
</head>
<body>
  <div class="container mx-auto px-4">
    <h1 class="text-2xl font-bold mb-6 text-center">Kanban Board</h1>

    <div id="kanban-board" data-testid="kanban-board">
      <div id="column-backlog" class="bg-gray-200 rounded-lg p-4 flex flex-col justify-between" data-testid="column-backlog">
        <h2>Backlog</h2>
        <div id="backlog-cards" data-testid="backlog-cards"></div>
        <button id="add-card-btn" data-testid="add-card">Add Card</button>
      </div>

      <div id="column-in-progress" class="bg-gray-200 rounded-lg p-4 flex flex-col justify-between mt-4" data-testid="column-in-progress">
        <h2>In Progress</h2>
        <div id="in-progress-cards" data-testid="in-progress-cards"></div>
        <button id="add-card-btn" data-testid="add-card">Add Card</button>
      </div>

      <div id="column-review" class="bg-gray-200 rounded-lg p-4 flex flex-col justify-between mt-4">
        <h2>Review</h2>
        <div id="review-cards" data-testid="review-cards"></div>
        <button id="add-card-btn" data-testid="add-card">Add Card</button>
      </div>

      <div id="column-done" class="bg-gray-200 rounded-lg p-4 flex flex-col justify-between mt-4">
        <h2>Done</h2>
        <div id="done-cards" data-testid="done-cards"></div>
        <button id="add-card-btn" data-testid="add-card">Add Card</button>
      </div>
    </div>

    <script>
      const kanbanBoard = document.getElementById('kanban-board');
      const columns = {
        backlog: document.getElementById('backlog-cards'),
        inProgress: document.getElementById('in-progress-cards'),
        review: document.getElementById('review-cards'),
        done: document.getElementById('done-cards')
      };
      const addCardBtns = {
        backlog: document.getElementById('add-card-btn'),
        inProgress: document.getElementById('add-card-btn'),
        review: document.getElementById('add-card-btn'),
        done: document.getElementById('add-card-btn')
      };

      // Load cards from localStorage or create dummy cards if none exist
      const loadCards = () => {
        const storedCards = JSON.parse(localStorage.getItem('kanban-cards') || '[]');
        storedCards.forEach(card => {
          addCardToBoard(card.title, card.column);
        });
      };

      const saveCards = () => {
        localStorage.setItem('kanban-cards', JSON.stringify(Array.from(columns.values()).flatMap(col => col.querySelectorAll('.card'))));
      };

      // Add a card to the specified column
      const addCardToColumn = (title, columnId) => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.innerHTML = `
          <input type="text" class="w-full p-2 border rounded-md focus:border-primary" data-testid="card-input">
          <button data-testid="delete-card">Delete</button>
        `;
        card.querySelector('.card').innerHTML = title;
        columnId.appendChild(card);
        saveCards();
      };

      // Add a card to the Kanban board
      const addCard = (title, column) => {
        if (!column) {
          return;
        }
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'Enter card title';
        input.setAttribute('data-testid', 'card-input');
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            addCardToColumn(input.value.trim(), column);
            input.value = '';
          }
        });
        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.setAttribute('data-testid', 'delete-card');
        deleteBtn.addEventListener('click', () => confirmAndRemoveCard(column, title));
        card.appendChild(input);
        card.appendChild(deleteBtn);
        column.appendChild(card);
        saveCards();
      };

      // Confirm deletion of a card and remove it from the board
      const confirmAndRemoveCard = (column, title) => {
        if (!confirm(`Are you sure you want to delete "${title}"?`)) {
          return;
        }
        column.querySelector('.card').remove();
        saveCards();

        // Trigger confetti animation when a card is removed from "Done" column
        const doneCards = document.getElementById('done-cards');
        if (column === 'done') {
          const confettiCanvas = document.createElement('div');
          confettiCanvas.classList.add('confetti-canvas');
          for (let i = 0; i < 50; i++) {
            const circle = document.createElement('div');
            circle.classList.add('confetti-circle');
            confettiCanvas.appendChild(circle);
          }
          doneCards.parentNode.insertBefore(confettiCanvas, doneCards);
        }
      };

      // Make cards draggable across columns
      const makeDraggable = () => {
        const cards = Array.from(kanbanBoard.querySelectorAll('.card'));
        cards.forEach(card => {
          card.setAttribute('draggable', true);
          card.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', e.target.textContent));
          card.addEventListener('dragover', e => e.preventDefault());
          card.addEventListener('drop', e => {
            const targetColumn = e.target.closest('[data-testid]');
            if (targetColumn && targetColumn !== card.parentNode) {
              const title = card.querySelector('.card').textContent;
              targetColumn.appendChild(card);
              saveCards();
              // Trigger confetti animation when a card is moved to "Done" column
              if (targetColumn === 'done') {
                const doneCards = document.getElementById('done-cards');
                if (column === 'done') {
                  const confettiCanvas = document.createElement('div');
                  confettiCanvas.classList.add('confetti-canvas');
                  for (let i = 0; i < 50; i++) {
                    const circle = document.createElement('div');
                    circle.classList.add('confetti-circle');
                    confettiCanvas.appendChild(circle);
                  }
                  doneCards.parentNode.insertBefore(confettiCanvas, doneCards);
                }
              }
            }
          });
        });
      };

      // Initialize the Kanban board
      loadCards();
      makeDraggable();

      // Add event listeners for adding cards to columns
      addCardBtns.backlog.addEventListener('click', () => addCard('Backlog Card'));
      addCardBtns.inProgress.addEventListener('click', () => addCard('In Progress Card'));
      addCardBtns.review.addEventListener('click', () => addCard('Review Card'));
      addCardBtns.done.addEventListener('click', () => addCard('Done Card'));

      // Add event listeners for deleting cards
      kanbanBoard.querySelectorAll('[data-testid="delete-card"]').forEach(deleteBtn => {
        deleteBtn.addEventListener('click', e => confirmAndRemoveCard(e.target.closest('.card').closest('[data-testid]'), e.target.closest('.card').querySelector('.card').textContent));
      });
    </script>
  </div>
</body>
</html>
