<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board</title>
  <!-- Tailwind CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.2.4/dist/tailwind.min.css" rel="stylesheet">
  <!-- Confetti via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
  <div class="w-full max-w-4xl bg-white rounded-lg shadow-md p-6">
    <h1 class="text-2xl font-bold mb-4">Kanban Board</h1>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <!-- Backlog Column -->
      <div data-testid="column-backlog" class="bg-blue-50 p-4 rounded-lg">
        <div class="text-lg font-semibold mb-2">Backlog</div>
        <div class="cards-container"></div>
        <button data-testid="add-card" class="mt-2 bg-blue-500 text-white px-3 py-1 rounded">Add card</button>
      </div>

      <!-- In Progress Column -->
      <div data-testid="column-in-progress" class="bg-yellow-50 p-4 rounded-lg">
        <div class="text-lg font-semibold mb-2">In Progress</div>
        <div class="cards-container"></div>
        <button data-testid="add-card" class="mt-2 bg-yellow-500 text-white px-3 py-1 rounded">Add card</button>
      </div>

      <!-- Review Column -->
      <div data-testid="column-review" class="bg-purple-50 p-4 rounded-lg">
        <div class="text-lg font-semibold mb-2">Review</div>
        <div class="cards-container"></div>
        <button data-testid="add-card" class="mt-2 bg-purple-500 text-white px-3 py-1 rounded">Add card</button>
      </div>

      <!-- Done Column -->
      <div data-testid="column-done" class="bg-green-50 p-4 rounded-lg">
        <div class="text-lg font-semibold mb-2">Done</div>
        <div class="cards-container"></div>
        <button data-testid="add-card" class="mt-2 bg-green-500 text-white px-3 py-1 rounded">Add card</button>
      </div>
    </div>
  </div>

  <script>
    const localStorageKey = 'kanban-board';
    let cards = [];

    function saveToLocalStorage(data) {
      localStorage.setItem(localStorageKey, JSON.stringify(data));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem(localStorageKey);
      return saved ? JSON.parse(saved) : [];
    }

    function renderCards() {
      const cardsData = loadFromLocalStorage();
      // Clear all containers
      document.querySelectorAll('[data-testid^="column-"]').forEach(column => {
        const container = column.querySelector('.cards-container');
        container.innerHTML = '';
      });

      cardsData.forEach(card => {
        const cardElement = document.createElement('div');
        cardElement.setAttribute('data-testid', 'card');
        cardElement.setAttribute('data-id', card.id);
        cardElement.classList.add('bg-blue-100', 'p-2', 'mb-2', 'rounded');

        const titleDiv = document.createElement('div');
        titleDiv.setAttribute('contenteditable', 'true');
        titleDiv.textContent = card.title;

        const deleteBtn = document.createElement('button');
        deleteBtn.setAttribute('data-testid', 'delete-card');
        deleteBtn.textContent = 'Delete';
        deleteBtn.classList.add('ml-2', 'text-red-500');

        // Handle delete
        deleteBtn.addEventListener('click', () => {
          showConfirmModal(card.id);
        });

        cardElement.appendChild(titleDiv);
        cardElement.appendChild(deleteBtn);

        // Handle drag and drop
        cardElement.setAttribute('draggable', true);
        cardElement.classList.add('cursor-grab');

        // Handle drag start
        cardElement.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', card.id);
        });

        // Handle editable
        titleDiv.addEventListener('input', () => {
          const newTitle = titleDiv.textContent.trim();
          card.title = newTitle;
          saveToLocalStorage(cardsData);
        });

        // Append to the correct container
        const columnContainer = document.querySelector(`[data-testid="column-${card.column}"]`).querySelector('.cards-container');
        columnContainer.appendChild(cardElement);
      });
    }

    // Handle drag over
    document.querySelectorAll('[data-testid^="column-"]').forEach(column => {
      column.addEventListener('dragover', (e) => e.preventDefault());
    });

    // Handle drop
    document.querySelectorAll('[data-testid^="column-"]').forEach(column => {
      column.addEventListener('drop', (e) => {
        e.preventDefault();
        const cardId = e.dataTransfer.getData('text/plain');
        const cardElement = document.querySelector(`[data-id="${cardId}"]`);
        if (cardElement) {
          e.currentTarget.appendChild(cardElement);
          const cardsData = loadFromLocalStorage();
          for (let i = 0; i < cardsData.length; i++) {
            if (cardsData[i].id === cardId) {
              cardsData[i].column = e.currentTarget.getAttribute('data-testid').split('-')[1];
              break;
            }
          }
          saveToLocalStorage(cardsData);
          // Trigger confetti if dropped into 'done' column
          if (e.currentTarget.getAttribute('data-testid') === 'column-done') {
            confetti({
              particleCount: 100,
              spread: 70,
              origin: { y: 0.6 }
            });
          }
        }
      });
    });

    // Initialize
    function init() {
      const initialCards = loadFromLocalStorage();
      if (initialCards.length === 0) {
        // Create dummy data
        const dummyData = [
          { id: '1', column: 'backlog', title: 'Card in Backlog' },
          { id: '2', column: 'inprogress', title: 'Card in In Progress' },
          { id: '3', column: 'review', title: 'Card in Review' },
          { id: '4', column: 'done', title: 'Card in Done' }
        ];
        saveToLocalStorage(dummyData);
      }
      renderCards();
    }

    init();

    // Handle "Add card" buttons
    document.querySelectorAll('[data-testid="add-card"]').forEach(button => {
      button.addEventListener('click', () => {
        const columnContainer = button.closest('[data-testid^="column-"]').querySelector('.cards-container');
        const input = document.createElement('input');
        input.setAttribute('data-testid', 'card-input');
        input.type = 'text';
        input.placeholder = 'Enter card title';

        // Handle Enter key
        input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            const title = input.value.trim();
            if (title) {
              addNewCard(title, button.closest('[data-testid^="column-"]').getAttribute('data-testid').split('-')[1]);
              columnContainer.removeChild(input);
            }
          }
        });

        columnContainer.appendChild(input);
      });
    });

    function addNewCard(title, column) {
      const cardsData = loadFromLocalStorage();
      const newId = Date.now().toString(); // Generate unique ID
      cardsData.push({ id: newId, column, title });
      saveToLocalStorage(cardsData);
      renderCards();
    }

    function showConfirmModal(cardId) {
      const modal = document.createElement('div');
      modal.setAttribute('data-testid', 'confirm-delete-modal');
      modal.classList.add('fixed', 'inset-0', 'flex', 'items-center', 'justify-center', 'bg-black', 'bg-opacity-50', 'z-50');
      modal.innerHTML = `
        <div class="bg-white p-6 rounded shadow-lg">
          <h3>Confirm Delete</h3>
          <p>Are you sure you want to delete this card?</p>
          <div class="mt-4 flex space-x-2">
            <button data-testid="confirm-delete" class="bg-red-500 text-white px-4 py-2 rounded">Delete</button>
            <button class="bg-gray-500 text-white px-4 py-2 rounded" onclick="closeModal()">Cancel</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);

      const confirmBtn = modal.querySelector('[data-testid="confirm-delete"]');
      confirmBtn.addEventListener('click', () => {
        deleteCard(cardId);
        closeModal();
      });
    }

    function closeModal() {
      const modal = document.querySelector('[data-testid="confirm-delete-modal"]');
      if (modal) {
        modal.remove();
      }
    }

    function deleteCard(cardId) {
      const cardsData = loadFromLocalStorage();
      for (let i = 0; i < cardsData.length; i++) {
        if (cardsData[i].id === cardId) {
          cardsData.splice(i, 1);
          break;
        }
      }
      saveToLocalStorage(cardsData);
    }
  </script>
</body>
</html>
