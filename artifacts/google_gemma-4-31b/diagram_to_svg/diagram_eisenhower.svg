<svg viewBox="0 0 1000 850" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="850" fill="#ffffff" />

  <!-- Definitions for arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#333">Eisenhower - Matrix - Marketing</text>

  <!-- Axes -->
  <g id="axes">
    <!-- Y Axis (Wichtigkeit) -->
    <line x1="240" y1="750" x2="240" y2="180" stroke="#333" stroke-width="3" marker-end="url(#arrowhead)" />
    <text x="230" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#333" transform="rotate(-90, 230, 460)">Wichtigkeit</text>
    <text x="210" y="200" text-anchor="end" font-family="Arial, sans-serif" font-size="18" fill="#333">hoch</text>
    <text x="210" y="760" text-anchor="end" font-family="Arial, sans-serif" font-size="18" fill="#333">niedrig</text>

    <!-- X Axis (Dringlichkeit) -->
    <line x1="240" y1="750" x2="760" y2="750" stroke="#333" stroke-width="3" marker-end="url(#arrowhead)" />
    <text x="500" y="780" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#333">Dringlichkeit</text>
    <text x="260" y="770" text-anchor="start" font-family="Arial, sans-serif" font-size="18" fill="#333">niedrig</text>
    <text x="740" y="770" text-anchor="end" font-family="Arial, sans-serif" font-size="18" fill="#333">hoch</text>
  </g>

  <!-- Matrix Grid -->
  <g id="matrix">
    <rect x="240" y="180" width="520" height="570" fill="none" stroke="#333" stroke-width="3" />
    <!-- Vertical Divider -->
    <line x1="500" y1="180" x2="500" y2="750" stroke="#333" stroke-width="2" />
    <!-- Horizontal Divider -->
    <line x1="240" y1="465" x2="760" y2="465" stroke="#333" stroke-width="2" />

    <!-- Quadrant 1: Top Left (Wichtig + Nicht dringend) -->
    <g id="q1">
      <text x="255" y="210" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Wichtig + Nicht dringend</text>
      <text x="265" y="245" font-family="Arial, sans-serif" font-size="16" fill="#333">• Content-Strategie</text>
      <text x="265" y="275" font-family="Arial, sans-serif" font-size="16" fill="#333">• Brand schärfen</text>
      <text x="265" y="305" font-family="Arial, sans-serif" font-size="16" fill="#333">• SEO aufräumen</text>
      <text x="265" y="335" font-family="Arial, sans-serif" font-size="16" fill="#333">• Zielgruppen verstehen</text>
    </g>

    <!-- Quadrant 2: Top Right (Wichtig + Dringend) -->
    <g id="q2">
      <text x="515" y="210" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Wichtig + Dringend</text>
      <text x="525" y="245" font-family="Arial, sans-serif" font-size="16" fill="#333">• Kampagne retten</text>
      <text x="525" y="275" font-family="Arial, sans-serif" font-size="16" fill="#333">• Shitstorm beantworten</text>
      <text x="525" y="305" font-family="Arial, sans-serif" font-size="16" fill="#333">• Newsletter mit falschem Link fixen</text>
      <text x="525" y="335" font-family="Arial, sans-serif" font-size="16" fill="#333">• Chef will bis 14 Uhr "viral gehen"</text>
    </g>

    <!-- Quadrant 3: Bottom Left (Nicht wichtig + Nicht dringend) -->
    <g id="q3">
      <text x="255" y="490" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Nicht wichtig + Nicht dringend</text>
      <text x="265" y="525" font-family="Arial, sans-serif" font-size="16" fill="#333">• Merch-Ideen mit Glitzer</text>
      <text x="265" y="555" font-family="Arial, sans-serif" font-size="16" fill="#333">• Buzzword-Bingo</text>
      <text x="265" y="585" font-family="Arial, sans-serif" font-size="16" fill="#333">• TikTok-Tanz mit dem Maskottchen</text>
      <text x="265" y="615" font-family="Arial, sans-serif" font-size="16" fill="#333">• Hashtag brainstormen #innovation #synergy #wow</text>
    </g>

    <!-- Quadrant 4: Bottom Right (Nicht wichtig + Dringend) -->
    <g id="q4">
      <text x="515" y="490" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Nicht wichtig + Dringend</text>
      <text x="525" y="525" font-family="Arial, sans-serif" font-size="16" fill="#333">• Noch ein Last-Minute-Meeting</text>
      <text x="525" y="555" font-family="Arial, sans-serif" font-size="16" fill="#333">• Kann das Logo größer?</text>
      <text x="525" y="585" font-family="Arial, sans-serif" font-size="16" fill="#333">• LinkedIn-Post für "Welttag der Büroklammer"</text>
      <text x="525" y="615" font-family="Arial, sans-serif" font-size="16" fill="#333">• Folie 27 schöner machen</text>
    </g>
  </g>

  <!-- Side Notes and Doodles -->
  <g id="extras">
    <!-- Coffee Note -->
    <g transform="translate(780, 150)">
      <path d="M20,40 Q20,60 40,60 L60,60 Q80,60 80,40 L80,30 L20,30 Z" fill="none" stroke="#333" stroke-width="2" />
      <path d="M80,45 L90,45 L90,55 L80,55" fill="none" stroke="#333" stroke-width="2" />
      <path d="M30,20 Q35,10 40,20 M40,20 Q45,10 50,20" fill="none" stroke="#333" stroke-width="1" />
      <text x="95" y="40" font-family="Arial, sans-serif" font-size="16" fill="#333">Kaffee zählt nicht.</text>
      <text x="95" y="60" font-family="Arial, sans-serif" font-size="16" fill="#333">Aber hilft. :)</text>
    </g>

    <!-- Heart Note -->
    <g transform="translate(80, 520)">
      <path d="M30,20 Q30,0 50,0 Q70,0 70,20 Q70,40 50,60 Q30,40 30,20" fill="none" stroke="#333" stroke-width="2" />
      <text x="80" y="20" font-family="Arial, sans-serif" font-size="16" fill="#333">Erledigen,</text>
      <text x="80" y="40" font-family="Arial, sans-serif" font-size="16" fill="#333">wenn das Internet</text>
      <text x="80" y="60" font-family="Arial, sans-serif" font-size="16" fill="#333">wieder da ist.</text>
    </g>

    <!-- Doodles -->
    <!-- Target -->
    <circle cx="470" cy="420" r="20" fill="none" stroke="#333" stroke-width="2" />
    <circle cx="470" cy="420" r="10" fill="none" stroke="#333" stroke-width="2" />
    <circle cx="470" cy="420" r="2" fill="#333" />
    <line x1="470" y1="420" x2="490" y2="400" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />

    <!-- Viral Burst -->
    <path d="M680,300 L690,280 L710,290 L730,270 L750,290 L770,280 L780,300 L770,320 L750,310 L730,330 L710,310 L690,320 Z" fill="none" stroke="#333" stroke-width="2" />
    <text x="695" y="305" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">VIRAL??</text>

    <!-- Megaphone -->
    <path d="M640,370 L680,390 L680,350 Z" fill="none" stroke="#333" stroke-width="2" />
    <line x1="640" y1="370" x2="630" y2="370" stroke="#333" stroke-width="2" />

    <!-- Unicorn (Simplified) -->
    <path d="M450,650 Q470,620 490,650 L480,680 L460,680 Z" fill="none" stroke="#333" stroke-width="2" />
    <line x1="470" y1="630" x2="475" y2="610" stroke="#333" stroke-width="2" />

    <!-- Exclamation Marks -->
    <text x="780" y="680" font-family="Arial, sans-serif" font-size="30" fill="#333">!!!</text>
    <circle cx="785" cy="700" r="3" fill="#333" />
    <circle cx="795" cy="700" r="3" fill="#333" />
    <circle cx="805" cy="700" r="3" fill="#333" />
  </g>
</svg>