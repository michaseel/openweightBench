<svg width="100%" height="100%">
  <g transform="translate(50, 50)">
    <rect class="axis" width="1200" height="800" fill="#eee" stroke="#ccc"/>
    <line class="x-axis" x1="0" y1="300" x2="1200" y2="300" stroke="#888"/>
    <line class="y-axis" x1="300" y1="0" x2="300" y2="800" stroke="#888"/>

    <g class="axis-labels">
      <text x="50" y="280" class="label" fill="#333">Wichtigkeit</text>
      <text x="650" y="50" class="label" fill="#333">Dringlichkeit</text>
    </g>

    <g class="importance-scale">
      <rect class="importance-level" x="100" y="300" width="20" height="400" fill="#ddd"/>
      <text x="10" y="350" class="label" fill="#333">niedrig</text>
      <text x="1200" y="350" class="label" fill="#333">hoch</text>
    </g>

    <g class="urgency-scale">
      <rect class="urgency-level" x="300" y="100" width="600" height="20" fill="#ddd"/>
      <text x="400" y="100" class="label" fill="#333">niedrig</text>
      <text x="400" y="700" class="label" fill="#333">hoch</text>
    </g>

    <g class="quadrant">
      <g class="quadrant-top-left">
        <rect class="box" x="100" y="300" width="200" height="150" fill="#fff" stroke="#333"/>
        <text class="text" x="150" y="370" fill="#333">Nicht wichtig + Nicht dringend</text>
      </g>
    </g>

    <g class="quadrant">
      <g class="quadrant-top-right">
        <rect class="box" x="600" y="300" width="200" height="150" fill="#fff" stroke="#333"/>
        <text class="text" x="650" y="370" fill="#333">Wichtig + Dringend</text>
      </g>
    </g>

    <g class="quadrant">
      <g class="quadrant-bottom-left">
        <rect class="box" x="100" y="550" width="200" height="150" fill="#fff" stroke="#333"/>
        <text class="text" x="150" y="620" fill="#333">Nicht wichtig + Dringend</text>
      </g>
    </g>

    <g class="quadrant">
      <g class="quadrant-bottom-right">
        <rect class="box" x="600" y="550" width="200" height="150" fill="#fff" stroke="#333"/>
        <text class="text" x="650" y="620" fill="#333">Wichtig + Nicht dringend</text>
      </g>
    </g>

    <g class="example-elements">
      <text class="example" x="100" y="500" fill="#333">Erledigen, wenn das Internet da ist. :D</text>
      <path class="arrow" d="M 300,500 L 400,500" stroke="#333" stroke-width="2"/>
      <path class="arrow" d="M 600,500 L 700,500" stroke="#333" stroke-width="2"/>
      <path class="arrow" d="M 100,700 L 100,800" stroke="#333" stroke-width="2"/>
      <path class="arrow" d="M 600,700 L 600,800" stroke="#333" stroke-width="2"/>
    </g>

    <g class="coffee-note">
      <path class="coffee" d="M 600,750 C 620,750 640,780 640,800 C 640,820 620,820 600,820 Z" fill="#fff" stroke="#333"/>
      <text class="coffee-text" x="680" y="750" fill="#333">Kaffee zählt nicht. Aber hilft.</text>
    </g>

  </g>
</svg>