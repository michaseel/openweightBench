<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" style="background-color: #ffffff;">
  <defs>
    <!-- Arrowhead Marker Definition -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>

    <!-- Style Definitions -->
    <style type="text/css">
      .box { stroke: #333; stroke-width: 2; fill: #f9f9f9; }
      .process-box { rx: 10; ry: 10; }
      .decision-diamond { stroke: #333; stroke-width: 2; fill: #fff5e6; }
      .actor-symbol { fill: none; stroke: #333; stroke-width: 3; }
      .text-label { font-family: Arial, sans-serif; font-size: 14px; fill: #000; text-anchor: middle; }
    </style>
  </defs>

  <!-- Group for the entire diagram -->
  <g id="SSO_Flowchart">

    <!-- ==================== ACTORS & START POINTS ==================== -->

    <!-- Benutzer (User) - Left Side -->
    <g id="Benutzer">
      <circle cx="100" cy="250" r="30" class="actor-symbol"/>
      <text x="100" y="285" class="text-label">Benutzer</text>
    </g>

    <!-- App / Service Provider (SP) - Left Middle -->
    <g id="Service_Provider">
      <rect x="300" y="240" width="250" height="80" class="box process-box"/>
      <text x="425" y="275" class="text-label">App / Service Provider</text>
    </g>

    <!-- Identity Provider (IdP) - Right Side -->
    <g id="Identity_Provider">
      <rect x="800" y="160" width="350" height="40" class="box process-box"/>
      <text x="975" y="185" class="text-label">Identity Provider (IdP)</text>
    </g>

    <!-- Login Page (Part of IdP flow) -->
    <g id="Login_Page">
      <rect x="600" y="340" width="250" height="80" class="box process-box"/>
      <text x="725" y="375" class="text-label">Login-Seite</text>
    </g>

    <!-- Final State: Zugriff gewährt -->
    <g id="Zugriff_Gewaehrt">
      <rect x="100" y="680" width="250" height="70" class="box process-box"/>
      <text x="225" y="715" class="text-label">Zugriff gewährt</text>
    </g>

    <!-- ==================== FLOW CONNECTIONS (PATHS) ==================== -->

    <!-- 1. Benutzer -> App/SP: Zugang zu App -->
    <path d="M 130 280 L 300 280" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="205" y="265" class="text-label" style="font-size: 12px;">1. Zugang zu App</text>

    <!-- 2. App/SP -> IdP (Login Page): Weiterleitung zur Login-Seite -->
    <path d="M 550 280 L 600 340" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="575" y="310" class="text-label" style="font-size: 12px;">2. Weiterleitung zur Login-Seite</text>

    <!-- 3. Benutzer input (Implicitly from User to Login Page) -->
    <path d="M 100 450 L 600 450" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="350" y="435" class="text-label" style="font-size: 12px;">Benutzer gibt Anmeldedaten ein</text>

    <!-- 4. Login Page -> Decision Diamond (Authentication) -->
    <path d="M 600 420 L 780 390" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="690" y="355" class="text-label" style="font-size: 12px;">4. Authentifizierung</text>

    <!-- Decision Diamond (Anmeldedaten korrekt?) -->
    <g id="Decision_Box">
      <polygon points="780,390 960,390 960,590 780,590" class="decision-diamond"/>
      <text x="870" y="490" class="text-label">Anmeldedaten korrekt?</text>
    </g>

    <!-- Path: NO (Incorrect) -->
    <path d="M 960 590 L 1050 590" stroke="#CC0000" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="1035" y="615" class="text-label" style="font-size: 12px; fill: #CC0000;">Nein</text>

    <!-- Path: YES (Correct) -->
    <path d="M 780 390 L 780 650" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="740" y="520" class="text-label" style="font-size: 12px;">Ja</text>

    <!-- 5. Login Page -> Token/Assertion (SSO Response) -->
    <!-- This step is represented by the flow from the decision box to the SP redirect -->
    <path d="M 960 590 L 1080 590" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="1020" y="575" class="text-label" style="font-size: 12px;">5. Token / Assertion (SSO-Response)</text>

    <!-- 6. IdP -> App/SP: Redirect zurück zur App mit Token -->
    <path d="M 1080 590 L 550 340" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="700" y="460" class="text-label" style="font-size: 12px;">6. Redirect zurück zur App mit Token</text>

    <!-- 7. App/SP -> Zugriff gewährt: Zugriff auf Ressourcen -->
    <path d="M 300 320 L 225 680" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="475" y="500" class="text-label" style="font-size: 12px;">7. Zugriff auf Ressourcen</text>

  </g>
</svg>