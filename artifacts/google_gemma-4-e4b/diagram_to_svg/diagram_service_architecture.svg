<svg width="100%" height="100%" viewBox="0 0 1400 850" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <!-- Arrowhead Marker Definition -->
        <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5"markerWidth="6"markerHeight="6"orient="auto">
            <path d="M 0,0 L 10,5 L 0,10 z" fill="#333"/>
        </marker>
    </defs>

    <!-- Background/Title -->
    <rect x="50" y="40" width="1200" height="60" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
    <text x="700" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333">System Architecture</text>

    <!-- ======================================== -->
    <!-- LEFT COLUMN: GOALS & NOTES (Group 1) -->
    <!-- ======================================== -->
    <g id="goals_notes" transform="translate(50, 120)">
        <rect x="0" y="0" width="250" height="480" fill="#ffffff" stroke="#ccc" stroke-width="1"/>

        <!-- Goals Section -->
        <text x="20" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Goals:</text>
        <text x="20" y="60" font-family="Arial, sans-serif" font-size="14" fill="#555">• Scalability</text>
        <text x="20" y="85" font-family="Arial, sans-serif" font-size="14" fill="#555">• Reliability</text>
        <text x="20" y="110" font-family="Arial, sans-serif" font-size="14" fill="#555">• Security</text>
        <text x="20" y="135" font-family="Arial, sans-serif" font-size="14" fill="#555">• Maintainability</text>

        <!-- Notes Section -->
        <text x="20" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Notes:</text>
        <text x="20" y="210" font-family="Arial, sans-serif" font-size="14" fill="#555">• Use Docker for all services</text>
        <text x="20" y="235" font-family="Arial, sans-serif" font-size="14" fill="#555">• CI/CD with GitHub Actions</text>
        <text x="20" y="260" font-family="Arial, sans-serif" font-size="14" fill="#555">• Logs $\rightarrow$ ELK Stack</text>
    </g>

    <!-- ======================================== -->
    <!-- CORE SERVICES (Group 2) -->
    <!-- ======================================== -->
    <g id="core_services" transform="translate(300, 180)">

        <!-- Frontend Box -->
        <rect x="0" y="0" width="250" height="80" fill="#e6f7ff" stroke="#3498db" stroke-width="2"/>
        <text x="125" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Frontend</text>
        <text x="125" y="70" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3498db">(React)</text>

        <!-- API Gateway Box -->
        <rect x="300" y="0" width="250" height="80" fill="#e6f7ff" stroke="#3498db" stroke-width="2"/>
        <text x="425" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">API Gateway</text>
        <text x="425" y="70" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3498db">(Kong)</text>

        <!-- External API Box -->
        <rect x="600" y="0" width="250" height="80" fill="#fffbe6" stroke="#f39c12" stroke-width="2"/>
        <text x="725" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">External API</text>
        <text x="725" y="70" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#f39c12">(Payment Provider)</text>

        <!-- Auth Service Box -->
        <rect id="auth_service" x="800" y="0" width="250" height="80" fill="#e6ffe6" stroke="#2ecc71" stroke-width="2"/>
        <text x="925" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Auth Service</text>
        <text x="925" y="70" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2ecc71">(JWT)</text>

        <!-- Backend Box -->
        <rect id="backend_service" x="300" y="250" width="350" height="80" fill="#e6f7ff" stroke="#3498db" stroke-width="2"/>
        <text x="475" y="285" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Backend</text>
        <text x="475" y="310" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3498db">(Python/FastAPI)</text>

        <!-- Message Queue Box -->
        <rect id="message_queue" x="650" y="250" width="250" height="80" fill="#e6f7ff" stroke="#3498db" stroke-width="2"/>
        <text x="775" y="285" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Message Queue</text>
        <text x="775" y="310" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3498db">(RabbitMQ)</text>

        <!-- Worker Service Box -->
        <rect id="worker_service" x="1050" y="250" width="250" height="80" fill="#e6f7ff" stroke="#3498db" stroke-width="2"/>
        <text x="1175" y="285" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Worker Service</text>
        <text x="1175" y="310" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3498db">(Python)</text>

    </g>

    <!-- ======================================== -->
    <!-- DATA STORES & MONITORING (Group 3) -->
    <!-- ======================================== -->
    <g id="data_stores_monitoring" transform="translate(0, 520)">

        <!-- User DB -->
        <rect x="800" y="0" width="150" height="60" fill="#f0f0ff" stroke="#3498db" stroke-width="2"/>
        <text x="875" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">User DB</text>
        <text x="875" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#3498db">(PostgreSQL)</text>

        <!-- Database (Backend) -->
        <rect id="backend_db" x="300" y="0" width="250" height="60" fill="#f0f0ff" stroke="#3498db" stroke-width="2"/>
        <text x="425" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Database</text>
        <text x="425" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#3498db">(PostgreSQL)</text>

        <!-- File Storage -->
        <rect id="file_storage" x="1270" y="0" width="150" height="60" fill="#f0f0ff" stroke="#3498db" stroke-width="2"/>
        <text x="1345" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">File Storage</text>
        <text x="1345" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#3498db">(S3)</text>

        <!-- Monitoring Box -->
        <rect id="monitoring_box" x="600" y="-100" width="350" height="70" fill="#fefefe" stroke="#2c3e50" stroke-width="2"/>
        <text x="775" y="-70" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Monitoring</text>
        <text x="775" y="-40" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">(Prometheus + Grafana)</text>

    </g>


    <!-- ======================================== -->
    <!-- CONNECTIONS (Flows) -->
    <!-- ======================================== -->

    <!-- 1. Frontend -> API Gateway -->
    <path d="M 275, 120 L 300, 120" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="287.5" y="115" font-family="Arial, sans-serif" font-size="14" fill="#3498db">HTTPS</text>

    <!-- 2. API Gateway -> Auth Service (Implicit call/dependency) -->
    <path d="M 575, 120 C 650, 100 650, 100 650, 100 L 800, 100" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="725" y="90" font-family="Arial, sans-serif" font-size="14" fill="#3498db">Auth Check</text>

    <!-- 3. API Gateway -> Backend (Implicit call/dependency) -->
    <path d="M 575, 120 L 575, 250 C 650, 200 650, 200 650, 200" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="610" y="170" font-family="Arial, sans-serif" font-size="14" fill="#3498db">Request</text>

    <!-- 4. External API -> (Input to Gateway/Backend - Conceptual flow) -->
    <path d="M 550, 120 L 600, 120" stroke="#f39c12" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="575" y="115" font-family="Arial, sans-serif" font-size="14" fill="#f39c12">Payment Data</text>

    <!-- 5. API Gateway -> Message Queue -->
    <path d="M 575, 160 L 650, 160" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="612.5" y="155" font-family="Arial, sans-serif" font-size="14" fill="#3498db">Publish Event</text>

    <!-- 6. Message Queue -> Worker Service -->
    <path d="M 775, 200 L 1050, 200" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="912.5" y="195" font-family="Arial, sans-serif" font-size="14" fill="#3498db">Consume Message</text>

    <!-- 7. Backend -> Database -->
    <path d="M 300, 340 L 300, 650 C 300, 650 350, 650 350, 650" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="315" y="400" font-family="Arial, sans-serif" font-size="14" fill="#3498db">Read/Write</text>

    <!-- 8. Auth Service -> User DB -->
    <path d="M 750, 120 L 800, 120" stroke="#2ecc71" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="775" y="115" font-family="Arial, sans-serif" font-size="14" fill="#2ecc71">Validate Token</text>

    <!-- 9. Worker Service -> File Storage -->
    <path d="M 1050, 340 L 1270, 340" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="1160" y="335" font-family="Arial, sans-serif" font-size="14" fill="#3498db">Upload File</text>

    <!-- 10. Monitoring Flow (Conceptual connection from all services to monitoring) -->
    <line x1="600" y1="250" x2="600" y2="-100" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <text x="580" y="190" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">Metrics</text>

</svg>