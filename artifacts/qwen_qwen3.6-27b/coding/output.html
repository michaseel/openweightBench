<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind config for custom colors -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
            },
          },
        },
      },
    };
  </script>

  <style>
    /* ===== Base & Layout ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #0f172a 100%);
      color: #e2e8f0;
      overflow-x: auto;
    }

    /* ===== Scrollbar Styling ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* ===== Column Drop Zone Highlight ===== */
    .column-drop-highlight {
      background: rgba(56, 189, 248, 0.08) !important;
      border-color: rgba(56, 189, 248, 0.4) !important;
      box-shadow: inset 0 0 30px rgba(56, 189, 248, 0.05);
    }

    /* ===== Card Dragging State ===== */
    .card-dragging {
      opacity: 0.4;
      transform: scale(0.95);
      transition: opacity 0.15s, transform 0.15s;
    }

    /* ===== Card Transitions ===== */
    .kanban-card {
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.15s ease;
    }

    .kanban-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    /* ===== Column Transitions ===== */
    .kanban-column {
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* ===== Modal Overlay ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      min-width: 380px;
      max-width: 480px;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
    }

    /* ===== Card Edit Input ===== */
    .card-edit-input {
      background: #0f172a;
      border: 2px solid #38bdf8;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 12px;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    .card-edit-input:focus {
      border-color: #7dd3fc;
    }

    /* ===== Confetti Canvas ===== */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    /* ===== Column Header Glow ===== */
    .column-header-glow {
      position: relative;
    }

    .column-header-glow::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      border-radius: 1px;
    }

    .col-backlog .column-header-glow::after { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
    .col-in-progress .column-header-glow::after { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .col-review .column-header-glow::after { background: linear-gradient(90deg, #ec4899, #f472b6); }
    .col-done .column-header-glow::after { background: linear-gradient(90deg, #10b981, #34d399); }

    /* ===== Badge Count ===== */
    .badge-count {
      font-size: 11px;
      font-weight: 700;
      min-width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 11px;
      padding: 0 6px;
    }

    /* ===== Add Button Pulse ===== */
    .add-card-btn {
      transition: all 0.2s ease;
    }

    .add-card-btn:hover {
      transform: scale(1.05);
    }

    /* ===== Delete Button Hover ===== */
    .delete-btn {
      transition: all 0.15s ease;
    }

    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    /* ===== Card Appearance Animation ===== */
    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(-10px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-appear {
      animation: cardAppear 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* ===== Drag Over Indicator Line ===== */
    .drag-over-indicator {
      height: 3px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      border-radius: 2px;
      margin: 4px 0;
      animation: indicatorPulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes indicatorPulse {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }

    /* ===== Tooltip ===== */
    .tooltip {
      position: relative;
    }

    .tooltip::before {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: #0f172a;
      color: #e2e8f0;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: all 0.15s ease;
      border: 1px solid #334155;
      pointer-events: none;
    }

    .tooltip:hover::before {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) scale(1);
    }
  </style>
</head>

<body class="p-4 md:p-6 lg:p-8">

  <!-- Confetti Canvas (rendered on top of everything) -->
  <canvas id="confetti-canvas"></canvas>

  <!-- ===== Header ===== -->
  <header class="max-w-[1600px] mx-auto mb-8">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-sky-400 via-violet-400 to-pink-400 bg-clip-text text-transparent">
          Kanban Board
        </h1>
        <p class="text-slate-400 mt-1 text-sm">Drag &amp; drop cards between columns to manage your workflow</p>
      </div>
      <button
        id="reset-board-btn"
        onclick="resetBoard()"
        class="text-xs text-slate-500 hover:text-slate-300 transition-colors underline underline-offset-2"
      >
        Reset Board
      </button>
    </div>
  </header>

  <!-- ===== Board Container ===== -->
  <main id="board" class="max-w-[1600px] mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
    <!-- Columns are rendered by JavaScript -->
  </main>

  <!-- ===== Add Card Modal ===== -->
  <div id="add-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="add-modal-title">
    <div class="modal-content">
      <h2 id="add-modal-title" class="text-lg font-bold text-white mb-4">Add New Card</h2>
      <input
        id="add-card-input"
        data-testid="card-input"
        type="text"
        class="card-edit-input mb-4"
        placeholder="Enter card title..."
        autocomplete="off"
      />
      <div class="flex gap-3 justify-end">
        <button id="add-modal-cancel" class="px-4 py-2 text-sm text-slate-400 hover:text-white transition-colors rounded-lg hover:bg-slate-700">
          Cancel
        </button>
        <button id="add-modal-confirm" class="px-5 py-2 text-sm font-semibold bg-sky-500 hover:bg-sky-400 text-white rounded-lg transition-colors">
          Add Card
        </button>
      </div>
    </div>
  </div>

  <!-- ===== Delete Confirmation Modal ===== -->
  <div id="delete-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
    <div class="modal-content">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h2 id="delete-modal-title" class="text-lg font-bold text-white">Delete Card</h2>
      </div>
      <p id="delete-modal-message" class="text-slate-400 text-sm mb-6 leading-relaxed">
        Are you sure you want to delete this card? This action cannot be undone.
      </p>
      <div class="flex gap-3 justify-end">
        <button id="delete-modal-cancel" class="px-4 py-2 text-sm text-slate-400 hover:text-white transition-colors rounded-lg hover:bg-slate-700">
          Cancel
        </button>
        <button data-testid="confirm-delete" id="delete-modal-confirm" class="px-5 py-2 text-sm font-semibold bg-red-500 hover:bg-red-400 text-white rounded-lg transition-colors">
          Delete
        </button>
      </div>
    </div>
  </div>

  <!-- ===== Edit Card Modal ===== -->
  <div id="edit-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="modal-content">
      <h2 id="edit-modal-title" class="text-lg font-bold text-white mb-4">Edit Card</h2>
      <textarea
        id="edit-card-input"
        class="card-edit-input mb-4 resize-none"
        rows="3"
        placeholder="Edit card title..."
        autocomplete="off"
      ></textarea>
      <div class="flex gap-3 justify-end">
        <button id="edit-modal-cancel" class="px-4 py-2 text-sm text-slate-400 hover:text-white transition-colors rounded-lg hover:bg-slate-700">
          Cancel
        </button>
        <button id="edit-modal-confirm" class="px-5 py-2 text-sm font-semibold bg-violet-500 hover:bg-violet-400 text-white rounded-lg transition-colors">
          Save
        </button>
      </div>
    </div>
  </div>

  <script>
    /**
     * ============================================================================
     * KANBAN BOARD — Vanilla JS Implementation
     * ============================================================================
     *
     * Architecture:
     *   - State is an array of column objects, each containing an array of cards.
     *   - All state mutations go through a single `saveState()` call that persists
     *     to localStorage under the namespace "kanban-board-v1".
     *   - Drag-and-drop uses the native HTML5 Drag & Drop API.
     *   - Modals are used for adding, editing, and confirming deletion of cards.
     *   - Confetti is rendered on a full-screen <canvas> overlay.
     * ============================================================================
     */

    // ===== Namespace for localStorage =====
    const STORAGE_KEY = 'kanban-board-v1';

    // ===== Column definitions =====
    const COLUMN_DEFS = [
      { id: 'backlog',       label: 'Backlog',       icon: '📋', color: 'violet',  testId: 'column-backlog' },
      { id: 'in-progress',   label: 'In Progress',   icon: '🔄', color: 'amber',   testId: 'column-in-progress' },
      { id: 'review',        label: 'Review',        icon: '🔍', color: 'pink',    testId: 'column-review' },
      { id: 'done',          label: 'Done',          icon: '✅', color: 'emerald', testId: 'column-done' },
    ];

    // ===== Color maps for Tailwind classes =====
    const COLOR_MAP = {
      violet:  { bg: 'bg-violet-500/10',   border: 'border-violet-500/30',   text: 'text-violet-400',   badge: 'bg-violet-500/20 text-violet-300',  dot: 'bg-violet-400' },
      amber:   { bg: 'bg-amber-500/10',    border: 'border-amber-500/30',    text: 'text-amber-400',    badge: 'bg-amber-500/20 text-amber-300',  dot: 'bg-amber-400' },
      pink:    { bg: 'bg-pink-500/10',     border: 'border-pink-500/30',     text: 'text-pink-400',     badge: 'bg-pink-500/20 text-pink-300',    dot: 'bg-pink-400' },
      emerald: { bg: 'bg-emerald-500/10',  border: 'border-emerald-500/30',  text: 'text-emerald-400',  badge: 'bg-emerald-500/20 text-emerald-300', dot: 'bg-emerald-400' },
    };

    // ===== Default / dummy data =====
    function getDefaultState() {
      return [
        {
          id: 'backlog',
          cards: [
            { id: generateId(), title: 'Research competitor features', description: 'Analyze top 5 competitors' },
            { id: generateId(), title: 'Define user personas', description: 'Create detailed personas' },
            { id: generateId(), title: 'Set up CI/CD pipeline', description: '' },
          ],
        },
        {
          id: 'in-progress',
          cards: [
            { id: generateId(), title: 'Design landing page mockup', description: 'Figma wireframes' },
            { id: generateId(), title: 'Implement authentication', description: 'OAuth2 with Google' },
          ],
        },
        {
          id: 'review',
          cards: [
            { id: generateId(), title: 'API documentation update', description: 'Swagger docs' },
          ],
        },
        {
          id: 'done',
          cards: [
            { id: generateId(), title: 'Project kickoff meeting', description: 'Completed ✅' },
            { id: generateId(), title: 'Set up development environment', description: 'Docker + Node.js' },
          ],
        },
      ];
    }

    // ===== State Management =====

    /**
     * Load state from localStorage, or return defaults if nothing is stored.
     */
    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          // Validate that it has the expected structure
          if (Array.isArray(parsed) && parsed.length === 4) {
            return parsed;
          }
        }
      } catch (e) {
        console.warn('Failed to load state from localStorage:', e);
      }
      return getDefaultState();
    }

    /**
     * Persist current state to localStorage.
     */
    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.warn('Failed to save state to localStorage:', e);
      }
    }

    /**
     * Reset the board to default state (used for testing / fresh start).
     */
    function resetBoard() {
      state = getDefaultState();
      saveState();
      render();
    }

    // ===== Global State =====
    let state = loadState();

    // ===== ID Generator =====
    function generateId() {
      return 'card-' + Date.now().toString(36) + '-' + Math.random().toString(36).substring(2, 8);
    }

    // ============================================================================
    // RENDERING
    // ============================================================================

    /**
     * Render the entire board from current state.
     */
    function render() {
      const board = document.getElementById('board');
      board.innerHTML = '';

      state.forEach((colState) => {
        const colDef = COLUMN_DEFS.find((d) => d.id === colState.id);
        if (!colDef) return;

        const colors = COLOR_MAP[colDef.color];
        const columnEl = document.createElement('div');
        columnEl.className = `kanban-column col-${colDef.id} rounded-2xl border ${colors.border} ${colors.bg} p-4 min-h-[300px] flex flex-col`;
        columnEl.setAttribute('data-testid', colDef.testId);
        columnEl.setAttribute('data-column-id', colDef.id);

        // ===== Column Header =====
        columnEl.innerHTML = `
          <div class="column-header-glow mb-4 pb-3 border-b border-white/5">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2">
                <span class="text-lg">${colDef.icon}</span>
                <h2 class="font-bold text-white text-base">${colDef.label}</h2>
                <span class="badge-count ${colors.badge}">${colState.cards.length}</span>
              </div>
            </div>
          </div>
          <div class="cards-container flex-1 space-y-3 min-h-[60px]" data-column-id="${colDef.id}">
            <!-- Cards rendered below -->
          </div>
          <button
            data-testid="add-card"
            class="add-card-btn mt-3 w-full py-2.5 rounded-xl border-2 border-dashed border-white/10 text-sm text-slate-400 hover:text-white hover:border-white/20 hover:bg-white/5 transition-all flex items-center justify-center gap-2"
            data-column-id="${colDef.id}"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Add card
          </button>
        `;

        // ===== Render Cards =====
        const cardsContainer = columnEl.querySelector('.cards-container');
        colState.cards.forEach((card) => {
          const cardEl = createCardElement(card, colDef);
          cardsContainer.appendChild(cardEl);
        });

        board.appendChild(columnEl);
      });

      // Re-attach event listeners
      attachDragAndDropListeners();
      attachAddCardListeners();
    }

    /**
     * Create a DOM element for a single card.
     */
    function createCardElement(card, colDef) {
      const colors = COLOR_MAP[colDef.color];
      const el = document.createElement('div');
      el.className = 'kanban-card card-appear bg-slate-800/80 border border-slate-700/50 rounded-xl p-4 cursor-grab active:cursor-grabbing group relative';
      el.setAttribute('data-testid', 'card');
      el.setAttribute('draggable', 'true');
      el.setAttribute('data-card-id', card.id);

      // Accent dot on the left
      const dotClass = colors.dot;

      el.innerHTML = `
        <div class="flex items-start gap-3">
          <div class="w-1 h-full min-h-[32px] rounded-full ${dotClass} flex-shrink-0 mt-0.5"></div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-slate-200 leading-relaxed break-words">${escapeHtml(card.title)}</p>
            ${card.description ? `<p class="text-xs text-slate-500 mt-1.5 line-clamp-2">${escapeHtml(card.description)}</p>` : ''}
          </div>
          <div class="flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
            <button
              class="edit-card-btn tooltip p-1.5 rounded-lg hover:bg-slate-700 text-slate-500 hover:text-sky-400 transition-colors"
              data-tooltip="Edit"
              data-card-id="${card.id}"
            >
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
            </button>
            <button
              data-testid="delete-card"
              class="delete-btn tooltip p-1.5 rounded-lg text-slate-500 hover:text-red-400 transition-colors"
              data-tooltip="Delete"
              data-card-id="${card.id}"
            >
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>
      `;

      // Edit button click
      el.querySelector('.edit-card-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        openEditModal(card.id);
      });

      // Delete button click
      el.querySelector('[data-testid="delete-card"]').addEventListener('click', (e) => {
        e.stopPropagation();
        openDeleteModal(card.id);
      });

      return el;
    }

    // ============================================================================
    // DRAG & DROP
    // ============================================================================

    let draggedCardId = null;
    let draggedCardEl = null;

    /**
     * Attach drag-and-drop event listeners to all cards and columns.
     */
    function attachDragAndDropListeners() {
      const cards = document.querySelectorAll('[data-testid="card"]');
      const columns = document.querySelectorAll('.cards-container');

      cards.forEach((cardEl) => {
        cardEl.addEventListener('dragstart', handleDragStart);
        cardEl.addEventListener('dragend', handleDragEnd);
      });

      columns.forEach((colContainer) => {
        colContainer.addEventListener('dragover', handleDragOver);
        colContainer.addEventListener('dragleave', handleDragLeave);
        colContainer.addEventListener('drop', handleDrop);
      });
    }

    /**
     * Drag start: store the card ID and add a visual class.
     */
    function handleDragStart(e) {
      draggedCardId = e.currentTarget.getAttribute('data-card-id');
      draggedCardEl = e.currentTarget;
      e.currentTarget.classList.add('card-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedCardId);

      // Slight delay so the class applies visually
      requestAnimationFrame(() => {
        if (draggedCardEl) draggedCardEl.style.opacity = '0.4';
      });
    }

    /**
     * Drag end: remove visual class.
     */
    function handleDragEnd(e) {
      e.currentTarget.classList.remove('card-dragging');
      e.currentTarget.style.opacity = '';
      draggedCardId = null;
      draggedCardEl = null;

      // Remove all drop highlights
      document.querySelectorAll('.column-drop-highlight').forEach((el) => {
        el.classList.remove('column-drop-highlight');
      });
      document.querySelectorAll('.drag-over-indicator').forEach((el) => {
        el.remove();
      });
    }

    /**
     * Drag over: highlight the target column and insert a visual indicator.
     */
    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';

      const container = e.currentTarget;
      const column = container.closest('.kanban-column');
      if (column) column.classList.add('column-drop-highlight');

      // Insert a visual indicator line at the drop position
      const afterElement = getDragAfterElement(container, e.clientY);
      let indicator = container.querySelector('.drag-over-indicator');
      if (!indicator) {
        indicator = document.createElement('div');
        indicator.className = 'drag-over-indicator';
      }

      if (afterElement) {
        container.insertBefore(indicator, afterElement);
      } else {
        container.appendChild(indicator);
      }
    }

    /**
     * Drag leave: remove highlight.
     */
    function handleDragLeave(e) {
      const container = e.currentTarget;
      const column = container.closest('.kanban-column');
      if (column) column.classList.remove('column-drop-highlight');

      // Remove indicator if the drag left the container entirely
      const rect = container.getBoundingClientRect();
      if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) {
        const indicator = container.querySelector('.drag-over-indicator');
        if (indicator) indicator.remove();
      }
    }

    /**
     * Drop: move the card to the new column at the correct position.
     */
    function handleDrop(e) {
      e.preventDefault();

      const targetColumnId = e.currentTarget.getAttribute('data-column-id');
      const cardId = draggedCardId;

      if (!cardId || !targetColumnId) return;

      // Find the card in state
      let sourceCol = null;
      let card = null;
      let sourceColIndex = -1;
      let cardIndex = -1;

      state.forEach((col, ci) => {
        const idx = col.cards.findIndex((c) => c.id === cardId);
        if (idx !== -1) {
          sourceCol = col;
          card = col.cards[idx];
          sourceColIndex = ci;
          cardIndex = idx;
        }
      });

      if (!card || !sourceCol) return;

      // Remove from source column
      sourceCol.cards.splice(cardIndex, 1);

      // Find target column
      const targetCol = state.find((c) => c.id === targetColumnId);
      if (!targetCol) return;

      // Determine insertion index based on drop position
      const afterElement = getDragAfterElement(e.currentTarget, e.clientY);
      if (afterElement && afterElement.getAttribute('data-card-id')) {
        const afterCardId = afterElement.getAttribute('data-card-id');
        const insertIndex = targetCol.cards.findIndex((c) => c.id === afterCardId);
        if (insertIndex !== -1) {
          targetCol.cards.splice(insertIndex, 0, card);
        } else {
          targetCol.cards.push(card);
        }
      } else {
        targetCol.cards.push(card);
      }

      // Check if card moved to "Done" — trigger confetti
      if (targetColumnId === 'done') {
        triggerConfetti();
      }

      saveState();
      render();
    }

    /**
     * Determine which card the mouse is just above (for insertion ordering).
     */
    function getDragAfterElement(container, y) {
      const cards = [...container.querySelectorAll('[data-testid="card"]:not(.card-dragging)')];

      let closest = null;
      let closestOffset = Number.POSITIVE_INFINITY;

      cards.forEach((card) => {
        const box = card.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > -closestOffset) {
          closestOffset = -offset;
          closest = card;
        }
      });

      return closest;
    }

    // ============================================================================
    // ADD CARD
    // ============================================================================

    let pendingAddColumnId = null;

    /**
     * Attach click listeners to all "Add card" buttons.
     */
    function attachAddCardListeners() {
      document.querySelectorAll('[data-testid="add-card"]').forEach((btn) => {
        btn.addEventListener('click', () => {
          pendingAddColumnId = btn.getAttribute('data-column-id');
          openAddModal();
        });
      });
    }

    /**
     * Open the "Add Card" modal.
     */
    function openAddModal() {
      const modal = document.getElementById('add-modal');
      const input = document.getElementById('add-card-input');
      modal.classList.add('active');
      input.value = '';
      setTimeout(() => input.focus(), 100);
    }

    /**
     * Close the "Add Card" modal.
     */
    function closeAddModal() {
      document.getElementById('add-modal').classList.remove('active');
      pendingAddColumnId = null;
    }

    /**
     * Confirm adding a new card.
     */
    function confirmAddCard() {
      const input = document.getElementById('add-card-input');
      const title = input.value.trim();

      if (!title) {
        input.focus();
        input.style.borderColor = '#ef4444';
        setTimeout(() => { input.style.borderColor = ''; }, 1500);
        return;
      }

      const targetCol = state.find((c) => c.id === pendingAddColumnId);
      if (!targetCol) return;

      const newCard = {
        id: generateId(),
        title: title,
        description: '',
      };

      targetCol.cards.push(newCard);
      saveState();
      closeAddModal();
      render();
    }

    // ============================================================================
    // EDIT CARD
    // ============================================================================

    let pendingEditCardId = null;

    /**
     * Open the "Edit Card" modal with the card's current title.
     */
    function openEditModal(cardId) {
      const card = findCard(cardId);
      if (!card) return;

      pendingEditCardId = cardId;
      const modal = document.getElementById('edit-modal');
      const textarea = document.getElementById('edit-card-input');
      textarea.value = card.title;
      modal.classList.add('active');
      setTimeout(() => textarea.focus(), 100);
    }

    /**
     * Close the "Edit Card" modal.
     */
    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('active');
      pendingEditCardId = null;
    }

    /**
     * Confirm editing a card.
     */
    function confirmEditCard() {
      const textarea = document.getElementById('edit-card-input');
      const newTitle = textarea.value.trim();

      if (!newTitle) {
        textarea.focus();
        textarea.style.borderColor = '#ef4444';
        setTimeout(() => { textarea.style.borderColor = ''; }, 1500);
        return;
      }

      const card = findCard(pendingEditCardId);
      if (!card) return;

      card.title = newTitle;
      saveState();
      closeEditModal();
      render();
    }

    // ============================================================================
    // DELETE CARD
    // ============================================================================

    let pendingDeleteCardId = null;

    /**
     * Open the delete confirmation modal.
     */
    function openDeleteModal(cardId) {
      const card = findCard(cardId);
      if (!card) return;

      pendingDeleteCardId = cardId;
      const modal = document.getElementById('delete-modal');
      const message = document.getElementById('delete-modal-message');
      message.textContent = `Are you sure you want to delete "${card.title}"? This action cannot be undone.`;
      modal.classList.add('active');
    }

    /**
     * Close the delete confirmation modal.
     */
    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.remove('active');
      pendingDeleteCardId = null;
    }

    /**
     * Confirm deleting a card.
     */
    function confirmDeleteCard() {
      if (!pendingDeleteCardId) return;

      for (const col of state) {
        const idx = col.cards.findIndex((c) => c.id === pendingDeleteCardId);
        if (idx !== -1) {
          col.cards.splice(idx, 1);
          break;
        }
      }

      saveState();
      closeDeleteModal();
      render();
    }

    // ============================================================================
    // HELPERS
    // ============================================================================

    /**
     * Find a card by ID across all columns.
     */
    function findCard(cardId) {
      for (const col of state) {
        const card = col.cards.find((c) => c.id === cardId);
        if (card) return card;
      }
      return null;
    }

    /**
     * Escape HTML to prevent XSS.
     */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================================================
    // MODAL EVENT LISTENERS
    // ============================================================================

    // --- Add Modal ---
    document.getElementById('add-modal-cancel').addEventListener('click', closeAddModal);
    document.getElementById('add-modal-confirm').addEventListener('click', confirmAddCard);
    document.getElementById('add-card-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        confirmAddCard();
      }
      if (e.key === 'Escape') {
        closeAddModal();
      }
    });

    // --- Edit Modal ---
    document.getElementById('edit-modal-cancel').addEventListener('click', closeEditModal);
    document.getElementById('edit-modal-confirm').addEventListener('click', confirmEditCard);
    document.getElementById('edit-card-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        confirmEditCard();
      }
      if (e.key === 'Escape') {
        closeEditModal();
      }
    });

    // --- Delete Modal ---
    document.getElementById('delete-modal-cancel').addEventListener('click', closeDeleteModal);
    document.getElementById('delete-modal-confirm').addEventListener('click', confirmDeleteCard);
    document.getElementById('delete-modal-message').addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeDeleteModal();
      }
    });

    // Close modals when clicking the overlay background
    ['add-modal', 'edit-modal', 'delete-modal'].forEach((modalId) => {
      document.getElementById(modalId).addEventListener('click', (e) => {
        if (e.target.id === modalId) {
          document.getElementById(modalId).classList.remove('active');
        }
      });
    });

    // ============================================================================
    // CONFETTI ANIMATION
    // ============================================================================

    /**
     * Trigger a confetti burst celebration.
     * Particles are drawn on a full-screen canvas overlay.
     */
    function triggerConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');

      // Resize canvas to window
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // Confetti particle configuration
      const particles = [];
      const particleCount = 120;
      const colors = [
        '#f472b6', '#a78bfa', '#38bdf8', '#34d399', '#fbbf24',
        '#fb923c', '#e879f9', '#22d3ee', '#f87171', '#a3e635',
      ];

      // Create particles from the center-bottom area
      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: canvas.width / 2 + (Math.random() - 0.5) * 200,
          y: canvas.height * 0.6,
          vx: (Math.random() - 0.5) * 16,
          vy: -(Math.random() * 18 + 6),
          size: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotationSpeed: (Math.random() - 0.5) * 12,
          gravity: 0.25 + Math.random() * 0.15,
          friction: 0.98,
          opacity: 1,
          shape: Math.random() > 0.5 ? 'rect' : 'circle',
        });
      }

      let frame = 0;
      const maxFrames = 180; // ~3 seconds at 60fps

      function animate() {
        if (frame >= maxFrames) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach((p) => {
          // Physics
          p.x += p.vx;
          p.vy += p.gravity;
          p.y += p.vy;
          p.vx *= p.friction;
          p.rotation += p.rotationSpeed;

          // Fade out in the last 60 frames
          if (frame > maxFrames - 60) {
            p.opacity = Math.max(0, p.opacity - 0.02);
          }

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate((p.rotation * Math.PI) / 180);
          ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color;

          if (p.shape === 'rect') {
            ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.restore();
        });

        frame++;
        requestAnimationFrame(animate);
      }

      animate();
    }

    // ============================================================================
    // INITIALIZATION
    // ============================================================================

    // Render the board on page load
    render();

    // Handle window resize for confetti canvas
    window.addEventListener('resize', () => {
      const canvas = document.getElementById('confetti-canvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
