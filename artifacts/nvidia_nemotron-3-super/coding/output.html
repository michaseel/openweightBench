<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanban Board</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Confetti particles */
  .confetti {
    position: fixed;
    top: -10px;
    pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to {
      transform: translateY(100vh) rotate(360deg);
      opacity: 0;
    }
  }
  /* Drag visual feedback */
  .dragging {
    opacity: 0.5;
  }
  /* Hide utility */
  .hidden { display: none; }
</style>
</head>
<body class="bg-gray-50 min-h-screen p-4">
  <h1 class="text-2xl font-bold mb-6 text-center">Kanban Board</h1>
  <div class="flex gap-4" id="board">
    <!-- Backlog Column -->
    <div data-testid="column-backlog" class="flex-1 bg-white rounded-lg shadow p-4 space-y-3">
      <h2 class="text-lg font-semibold">Backlog</h2>
      <div class="space-y-2" id="column-backlog-cards"></div>
      <button data-testid="add-card" class="self-start px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 transition">Add card</button>
      <input type="text" data-testid="card-input" data-column="backlog" class="mt-2 w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type card title...">
    </div>
    <!-- In Progress Column -->
    <div data-testid="column-in-progress" class="flex-1 bg-white rounded-lg shadow p-4 space-y-3">
      <h2 class="text-lg font-semibold">In Progress</h2>
      <div class="space-y-2" id="column-in-progress-cards"></div>
      <button data-testid="add-card" class="self-start px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 transition">Add card</button>
      <input type="text" data-testid="card-input" data-column="inprogress" class="mt-2 w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type card title...">
    </div>
    <!-- Review Column -->
    <div data-testid="column-review" class="flex-1 bg-white rounded-lg shadow p-4 space-y-3">
      <h2 class="text-lg font-semibold">Review</h2>
      <div class="space-y-2" id="column-review-cards"></div>
      <button data-testid="add-card" class="self-start px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 transition">Add card</button>
      <input type="text" data-testid="card-input" data-column="review" class="mt-2 w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type card title...">
    </div>
    <!-- Done Column -->
    <div data-testid="column-done" class="flex-1 bg-white rounded-lg shadow p-4 space-y-3">
      <h2 class="text-lg font-semibold">Done</h2>
      <div class="space-y-2" id="column-done-cards"></div>
      <button data-testid="add-card" class="self-start px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 transition">Add card</button>
      <input type="text" data-testid="card-input" data-column="done" class="mt-2 w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type card title...">
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="delete-modal" class="hidden fixed inset-0 flex items-center justify-center bg-black/50 z-50">
    <div class="bg-white rounded-lg p-6 w-96">
      <p class="mb-4">Are you sure you want to delete this card?</p>
      <div class="flex justify-end space-x-3">
        <button id="cancel-delete" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Cancel</button>
        <button data-testid="confirm-delete" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Confetti Container -->
  <div id="confetti-container" class="fixed inset-0 pointer-events-none"></div>

<script>
  // ======================
  // State Management
  // ======================
  const STATE_KEY = 'kanbanBoardState';
  let state = {
    columns: {
      backlog: [],
      inprogress: [],
      review: [],
      done: []
    }
  };

  // Temp variables for drag & delete
  let draggedCard = null;
  let draggedFrom = null;
  let deleteCardId = null;
  let deleteColumn = null;

  // Load state from localStorage or create dummy data
  function loadState() {
    const saved = localStorage.getItem(STATE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.columns) {
          state.columns = parsed.columns;
        }
      } catch (e) {
        console.error('Failed to parse state', e);
      }
    }
    // If board is empty, add some dummy cards
    const totalCards = Object.values(state.columns).reduce((sum, arr) => sum + arr.length, 0);
    if (totalCards === 0) {
      const dummyTitles = ['Sample task 1', 'Sample task 2'];
      Object.keys(state.columns).forEach(key => {
        dummyTitles.forEach((title, idx) => {
          state.columns[key].push({ id: `${key}-${idx}-${Date.now()}`, title });
        });
      });
      // Persist the dummy data
      saveState();
    }
  }

  // Save state to localStorage
  function saveState() {
    localStorage.setItem(STATE_KEY, JSON.stringify(state));
  }

  // Render the whole board based on current state
  function render() {
    Object.keys(state.columns).forEach(colKey => {
      const container = document.getElementById(`column-${colKey}-cards`);
      container.innerHTML = ''; // clear existing cards
      state.columns[colKey].forEach(card => {
        const cardEl = createCardElement(card, colKey);
        container.appendChild(cardEl);
      });
    });
  }

  // Create a single card DOM element
  function createCardElement(card, columnKey) {
    const cardDiv = document.createElement('div');
    cardDiv.dataset.testid = 'card';
    cardDiv.draggable = true;
    cardDiv.dataset.cardId = card.id;
    cardDiv.dataset.sourceColumn = columnKey;
    cardDiv.className = 'flex items-start space-x-3 p-3 bg-gray-50 rounded border border-gray-200 shadow-sm transition-transform duration-200';

    // Title (contenteditable)
    const titleDiv = document.createElement('div');
    titleDiv.contentEditable = true;
    titleDiv.className = 'flex-1 min-w-0 break-word';
    titleDiv.textContent = card.title;
    // Save on blur or Enter
    titleDiv.addEventListener('blur', () => {
      const newTitle = titleDiv.textContent.trim();
      if (newTitle !== card.title) {
        card.title = newTitle;
        saveState();
      }
    });
    titleDiv.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        titleDiv.blur();
      }
    });

    // Delete button
    const delBtn = document.createElement('button');
    delBtn.dataset.testid = 'delete-card';
    delBtn.className = 'ml-2 self-start px-2 py-1 bg-red-100 text-red-600 rounded hover:bg-red-200 transition';
    delBtn.innerHTML = '&times;';
    delBtn.title = 'Delete';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      openDeleteModal(card.id, columnKey);
    });

    cardDiv.appendChild(titleDiv);
    cardDiv.appendChild(delBtn);
    return cardDiv;
  }

  // ======================
  // Drag & Drop Handling
  // ======================
  function onDragStart(e) {
    const cardEl = e.target.closest('[data-testid="card"]');
    if (!cardEl) return;
    draggedCard = cardEl;
    draggedFrom = cardEl.dataset.sourceColumn;
    cardEl.classList.add('dragging');
  }

  function onDragEnd(e) {
    if (draggedCard) {
      draggedCard.classList.remove('dragging');
    }
    draggedCard = null;
    draggedFrom = null;
  }

  function onDragOver(e) {
    e.preventDefault(); // allow drop
    const target = e.target.closest('[data-testid^="column-"]');
    if (target) target.classList.add('border-blue-500');
  }

  function onDragLeave(e) {
    const target = e.target.closest('[data-testid^="column-"]');
    if (target) target.classList.remove('border-blue-500');
  }

  function onDrop(e) {
    e.preventDefault();
    const target = e.target.closest('[data-testid^="column-"]');
    if (!target) return;
    target.classList.remove('border-blue-500');
    if (!draggedCard) return;
    const targetColKey = target.dataset.testid.replace('column-', '');
    const cardId = draggedCard.dataset.cardId;
    if (draggedFrom === targetColKey) return; // no change

    // Move card in state
    const srcIdx = state.columns[draggedFrom].findIndex(c => c.id === cardId);
    if (srcIdx !== -1) {
      const [moved] = state.columns[draggedFrom].splice(srcIdx, 1);
      state.columns[targetColKey].push(moved);
      saveState();
      render();
      // Trigger confetti when moved to Done
      if (targetColKey === 'done') startConfetti();
    }
  }

  // ======================
  // Add Card Logic
  // ======================
  function handleAddCardInput(e) {
    if (e.key === 'Enter') {
      const input = e.target;
      const title = input.value.trim();
      if (title === '') return;
      const colKey = input.dataset.column;
      const newId = `${colKey}-${Date.now()}-${Math.floor(Math.random()*1000)}`;
      state.columns[colKey].push({ id: newId, title });
      input.value = '';
      saveState();
      render();
    }
  }

  // ======================
  // Delete Confirmation Modal
  // ======================
  function openDeleteModal(cardId, columnKey) {
    deleteCardId = cardId;
    deleteColumn = columnKey;
    deleteModal.classList.remove('hidden');
    // Focus confirm button for better UX
    document.querySelector('[data-testid="confirm-delete"]').focus();
  }

  function closeDeleteModal() {
    deleteModal.classList.add('hidden');
    deleteCardId = null;
    deleteColumn = null;
  }

  function confirmDelete() {
    if (deleteCardId && deleteColumn) {
      const idx = state.columns[deleteColumn].findIndex(c => c.id === deleteCardId);
      if (idx !== -1) {
        state.columns[deleteColumn].splice(idx, 1);
        saveState();
        render();
      }
    }
    closeDeleteModal();
  }

  // ======================
  // Confetti Animation
  // ======================
  function startConfetti() {
    const colors = ['#ff0', '#0ff', '#f0f', '#0f0', '#ff0'];
    const count = 50;
    for (let i = 0; i < count; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      const size = Math.random() * 6 + 2;
      piece.style.width = `${size}px`;
      piece.style.height = `${size}px`;
      piece.style.animationDuration = `${Math.random() * 2 + 3}s`;
      piece.style.animationDelay = `${Math.random() * 0.5}s`;
      document.getElementById('confetti-container').appendChild(piece);
      piece.addEventListener('animationend', () => piece.remove());
    }
  }

  // ======================
  // Event Listeners
  // ======================
  document.addEventListener('DOMContentLoaded', () => {
    loadState();
    render();

    // Drag & drop delegation
    document.getElementById('board').addEventListener('dragstart', onDragStart);
    document.getElementById('board').addEventListener('dragend', onDragEnd);
    document.getElementById('board').addEventListener('dragover', onDragOver);
    document.getElementById('board').addEventListener('dragleave', onDragLeave);
    document.getElementById('board').addEventListener('drop', onDrop);

    // Add card input handling (Enter key)
    document.getElementById('board').addEventListener('keydown', e => {
      if (e.target.matches('[data-testid="card-input"]')) {
        handleAddCardInput(e);
      }
    });

    // Delete modal buttons
    document.querySelector('[data-testid="confirm-delete"]').addEventListener('click', confirmDelete);
    document.getElementById('cancel-delete').addEventListener('click', closeDeleteModal);
    // Close modal on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !deleteModal.classList.contains('hidden')) {
        closeDeleteModal();
      }
    });
  });
</script>
</body>
</html>
