<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{padding:24px;display:inline-block;background:#fff}
  .wrap svg{display:block;height:auto;max-width:none}
</style></head><body><div class="wrap"><svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" style="background-color: #ffffff;">
    <defs>
        <!-- Arrowhead Marker Definition -->
        <marker id="arrowhead" markerWidth="10" markerHeight="6" refX="10" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#333"/>
        </marker>
    </defs>

    <!-- Title -->
    <g id="title-area">
        <text x="600" y="80" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="#333">Eisenhower - Marketing</text>
    </g>

    <!-- Axes and Labels -->
    <g id="axes">
        <!-- Horizontal Axis (Dringlichkeit) -->
        <line x1="50" y1="720" x2="1150" y2="720" stroke="#333" stroke-width="2"/>
        <text x="50" y="760" font-family="Arial, sans-serif" font-size="18" text-anchor="start">niedrig</text>
        <text x="1150" y="760" font-family="Arial, sans-serif" font-size="18" text-anchor="end">hoch</text>
        <text x="600" y="700" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#333">Dringlichkeit</text>

        <!-- Vertical Axis (Wichtigkeitsgrad) -->
        <line x1="50" y1="50" x2="50" y2="760" stroke="#333" stroke-width="2"/>
        <text x="30" y="50" font-family="Arial, sans-serif" font-size="18" text-anchor="end">hoch</text>
        <text x="30" y="760" font-family="Arial, sans-serif" font-size="18" text-anchor="end">niedrig</text>
        <text x="25" y="380" transform="rotate(-90 25 380)" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#333">Wichtigkeitsgrad</text>
    </g>

    <!-- Quadrant Definitions (Boxes) -->
    <g id="quadrants">
        <!-- Q1: Wichtig + Nicht dringend (Top Left) -->
        <rect x="50" y="50" width="480" height="320" fill="#f9f9f9" stroke="#333" stroke-width="2"/>
        <text x="300" y="100" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#333">Wichtig + Nicht dringend</text>

        <!-- Q2: Wichtig + Dringend (Top Right) -->
        <rect x="550" y="50" width="480" height="320" fill="#f9f9f9" stroke="#333" stroke-width="2"/>
        <text x="800" y="100" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#333">Wichtig + Dringend</text>

        <!-- Q3: Nicht wichtig + Nicht dringend (Bottom Left) -->
        <rect x="50" y="480" width="480" height="260" fill="#f9f9f9" stroke="#333" stroke-width="2"/>
        <text x="300" y="510" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#333">Nicht wichtig + Nicht dringend</text>

        <!-- Q4: Nicht wichtig + Dringend (Bottom Right) -->
        <rect x="550" y="480" width="480" height="260" fill="#f9f9f9" stroke="#333" stroke-width="2"/>
        <text x="800" y="510" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#333">Nicht wichtig + Dringend</text>

    </g>

    <!-- Content Placement (Bullet Points) -->
    <g id="content-q1">
        <text x="80" y="150" font-family="Arial, sans-serif" font-size="16">• Content + Strategie</text>
        <text x="80" y="190" font-family="Arial, sans-serif" font-size="16">• Brand schärfen</text>
        <text x="80" y="230" font-family="Arial, sans-serif" font-size="16">• SEO aufräumen</text>
        <text x="80" y="270" font-family="Arial, sans-serif" font-size="16">• Zielgruppen verstehen</text>
    </g>

    <g id="content-q2">
        <text x="580" y="150" font-family="Arial, sans-serif" font-size="16">• Kampagne retten</text>
        <text x="580" y="190" font-family="Arial, sans-serif" font-size="16">• Shitstorm beantworten</text>
        <text x="580" y="230" font-family="Arial, sans-serif" font-size="16">• Newsletter mit falschem Link fixen</text>
        <text x="580" y="270" font-family="Arial, sans-serif" font-size="16">• Chef will bis 14 Uhr "viral gehen"</text>
    </g>

    <g id="content-q3">
        <text x="80" y="520" font-family="Arial, sans-serif" font-size="16">• Merch-Ideen mit Glitzer</text>
        <text x="80" y="560" font-family="Arial, sans-serif" font-size="16">• Buzzword - Bingo</text>
        <text x="80" y="600" font-family="Arial, sans-serif" font-size="16">• TikTok-Tanz mit dem Maskottchen</text>
        <text x="80" y="640" font-family="Arial, sans-serif" font-size="16">• Hashtag brainstormen #innovation #synergy #wow</text>
    </g>

    <g id="content-q4">
        <!-- Note: The original diagram has a visual element (a drawing of an arrow/person) here. We replicate the text content structure. -->
        <text x="580" y="520" font-family="Arial, sans-serif" font-size="16">• (Kein spezifischer Inhalt im Original)</text>
    </g>

    <!-- Visual Elements / Drawings from Original Image -->
    <g id="visual-elements">
        <!-- Drawing of the arrow/person in Q4 area -->
        <path d="M 750 620 L 850 620 L 830 550 C 810 500, 900 450, 950 480" stroke="#333" stroke-width="3" fill="none"/>
        <text x="750" y="680" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">...</text>

        <!-- Small boxes/notes in the bottom right corner -->
        <g transform="translate(950, 450)">
            <rect width="80" height="60" fill="#fff" stroke="#333" stroke-width="1"/>
            <text x="5" y="20" font-family="Arial, sans-serif" font-size="12">Kaffee</text>
            <text x="5" y="40" font-family="Arial, sans-serif" font-size="12">(zählt nicht)</text>
        </g>
    </g>

</svg></div></body></html>
