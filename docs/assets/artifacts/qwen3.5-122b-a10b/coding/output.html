<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrant Kanban Board</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Confetti Library for the "Done" celebration -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Custom styles to enhance Tailwind and handle drag states */
        
        body {
            background-color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Smooth transitions for cards */
        .kanban-card {
            transition: all 0.2s ease-in-out;
        }

        /* Dragging state styles */
        .dragging {
            opacity: 0.5;
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Column background hover effect to indicate drop target */
        .column-container {
            transition: background-color 0.2s;
        }
        
        .column-container.drag-over {
            background-color: #eef2ff; /* Indigo-50 */
            border: 2px dashed #6366f1; /* Indigo-500 */
        }

        /* Hide scrollbar for cleaner look but allow scrolling */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Modal Animation */
        .modal {
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal.hidden-modal {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col text-slate-800">

    <!-- Header -->
    <header class="bg-white shadow-sm z-10 p-4 border-b border-gray-200">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600 tracking-tight">Kanban Board</h1>
            <span class="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">Vanilla JS Implementation</span>
        </div>
    </header>

    <!-- Main Board Area -->
    <main class="flex-1 overflow-x-auto p-6">
        <div id="board" class="h-full flex gap-6 min-w-max pb-4">
            
            <!-- Column: Backlog -->
            <div class="column-container w-80 bg-gray-50 rounded-xl flex-shrink-0 flex flex-col max-h-full border border-gray-200 shadow-sm" 
                 data-status="backlog" 
                 data-testid="column-backlog">
                <div class="p-4 font-semibold text-gray-700 flex justify-between items-center border-b border-gray-100">
                    Backlog
                    <span class="bg-gray-200 text-gray-600 text-xs px-2 py-1 rounded-full count-badge">0</span>
                </div>
                <div class="flex-1 overflow-y-auto p-3 space-y-3 min-h-[50px] card-list">
                    <!-- Cards injected here -->
                </div>
                
                <!-- Add Card Footer -->
                <div class="p-3 border-t border-gray-200 bg-white rounded-b-xl relative group">
                    <button data-testid="add-card" 
                            class="w-full text-left px-4 py-2 text-sm text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition flex items-center gap-2">
                        <span>+ Add new card</span>
                    </button>
                    
                    <!-- Hidden input area revealed on click -->
                    <div id="input-area-backlog" class="hidden mt-2 space-y-2 animate-fade-in-down">
                        <textarea 
                            data-testid="card-input" 
                            placeholder="Enter task title..." 
                            rows="2"
                            class="w-full p-3 text-sm border border-indigo-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none resize-none bg-white shadow-inner"></textarea>
                        <div class="flex justify-end gap-2">
                            <button class="text-xs text-gray-400 hover:text-gray-600 cancel-add-btn px-3 py-1">Cancel</button>
                            <button class="text-xs bg-indigo-600 text-white rounded-md px-3 py-1 hover:bg-indigo-700 save-new-card-btn font-medium">Add</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Column: In Progress -->
            <div class="column-container w-80 bg-blue-50 rounded-xl flex-shrink-0 flex flex-col max-h-full border border-blue-100 shadow-sm" 
                 data-status="in-progress" 
                 data-testid="column-in-progress">
                <div class="p-4 font-semibold text-blue-700 flex justify-between items-center border-b border-blue-100">
                    In Progress
                    <span class="bg-blue-200 text-blue-800 text-xs px-2 py-1 rounded-full count-badge">0</span>
                </div>
                <div class="flex-1 overflow-y-auto p-3 space-y-3 min-h-[50px] card-list"></div>
                <div class="p-3 border-t border-blue-100 bg-white rounded-b-xl relative group">
                    <button data-testid="add-card" 
                            class="w-full text-left px-4 py-2 text-sm text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition flex items-center gap-2">
                        <span>+ Add new card</span>
                    </button>
                    <div id="input-area-in-progress" class="hidden mt-2 space-y-2 animate-fade-in-down">
                        <textarea 
                            data-testid="card-input" 
                            placeholder="Enter task title..." 
                            rows="2"
                            class="w-full p-3 text-sm border border-indigo-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-none bg-white shadow-inner"></textarea>
                        <div class="flex justify-end gap-2">
                            <button class="text-xs text-gray-400 hover:text-gray-600 cancel-add-btn px-3 py-1">Cancel</button>
                            <button class="text-xs bg-indigo-600 text-white rounded-md px-3 py-1 hover:bg-indigo-700 save-new-card-btn font-medium">Add</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Column: Review -->
            <div class="column-container w-80 bg-yellow-50 rounded-xl flex-shrink-0 flex flex-col max-h-full border border-yellow-100 shadow-sm" 
                 data-status="review" 
                 data-testid="column-review">
                <div class="p-4 font-semibold text-yellow-700 flex justify-between items-center border-b border-yellow-100">
                    Review
                    <span class="bg-yellow-200 text-yellow-800 text-xs px-2 py-1 rounded-full count-badge">0</span>
                </div>
                <div class="flex-1 overflow-y-auto p-3 space-y-3 min-h-[50px] card-list"></div>
                <div class="p-3 border-t border-yellow-100 bg-white rounded-b-xl relative group">
                    <button data-testid="add-card" 
                            class="w-full text-left px-4 py-2 text-sm text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition flex items-center gap-2">
                        <span>+ Add new card</span>
                    </button>
                    <div id="input-area-review" class="hidden mt-2 space-y-2 animate-fade-in-down">
                        <textarea 
                            data-testid="card-input" 
                            placeholder="Enter task title..." 
                            rows="2"
                            class="w-full p-3 text-sm border border-indigo-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-none bg-white shadow-inner"></textarea>
                        <div class="flex justify-end gap-2">
                            <button class="text-xs text-gray-400 hover:text-gray-600 cancel-add-btn px-3 py-1">Cancel</button>
                            <button class="text-xs bg-indigo-600 text-white rounded-md px-3 py-1 hover:bg-indigo-700 save-new-card-btn font-medium">Add</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Column: Done -->
            <div class="column-container w-80 bg-green-50 rounded-xl flex-shrink-0 flex flex-col max-h-full border border-green-100 shadow-sm" 
                 data-status="done" 
                 data-testid="column-done">
                <div class="p-4 font-semibold text-green-700 flex justify-between items-center border-b border-green-100">
                    Done
                    <span class="bg-green-200 text-green-800 text-xs px-2 py-1 rounded-full count-badge">0</span>
                </div>
                <div class="flex-1 overflow-y-auto p-3 space-y-3 min-h-[50px] card-list"></div>
                <div class="p-3 border-t border-green-100 bg-white rounded-b-xl relative group">
                    <button data-testid="add-card" 
                            class="w-full text-left px-4 py-2 text-sm text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition flex items-center gap-2">
                        <span>+ Add new card</span>
                    </button>
                    <div id="input-area-done" class="hidden mt-2 space-y-2 animate-fade-in-down">
                        <textarea 
                            data-testid="card-input" 
                            placeholder="Enter task title..." 
                            rows="2"
                            class="w-full p-3 text-sm border border-indigo-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-none bg-white shadow-inner"></textarea>
                        <div class="flex justify-end gap-2">
                            <button class="text-xs text-gray-400 hover:text-gray-600 cancel-add-btn px-3 py-1">Cancel</button>
                            <button class="text-xs bg-indigo-600 text-white rounded-md px-3 py-1 hover:bg-indigo-700 save-new-card-btn font-medium">Add</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm hidden-modal modal">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md transform transition-all scale-100 border border-gray-100">
            <h3 class="text-lg font-bold text-gray-800 mb-2">Delete Card?</h3>
            <p class="text-sm text-gray-500 mb-6">Are you sure you want to delete this card? This action cannot be undone.</p>
            
            <div class="flex justify-end gap-3">
                <button id="cancel-delete" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition font-medium">
                    Cancel
                </button>
                <button data-testid="confirm-delete" 
                        class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 shadow-md shadow-red-200 transition font-medium">
                    Delete
                </button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Kanban Board Logic
         * Uses native Drag and Drop API and LocalStorage for persistence.
         */

        // --- Configuration & State ---
        const STORAGE_KEY = 'my_kanban_board_data_v1';
        
        let cards = [];
        let draggedCardId = null;
        let cardToDeleteId = null;

        // Dummy data generator if storage is empty
        function generateDummyData() {
            return [
                { id: 'c-1', content: 'Define project scope', status: 'backlog' },
                { id: 'c-2', content: 'Design system architecture', status: 'in-progress' },
                { id: 'c-3', content: 'Setup repository', status: 'review' },
                { id: 'c-4', content: 'Initial commit', status: 'done' }
            ];
        }

        // --- Initialization ---
        function init() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                cards = JSON.parse(stored);
            } else {
                cards = generateDummyData();
                saveState();
            }
            
            renderBoard();
            setupEventListeners();
        }

        // --- Persistence ---
        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
            updateCounts();
        }

        // --- Rendering ---
        function renderBoard() {
            const columns = document.querySelectorAll('.card-list');
            
            // Clear existing cards (simple re-render approach)
            columns.forEach(col => col.innerHTML = '');

            cards.forEach(card => {
                const cardEl = createCardElement(card);
                
                // Find the correct column container based on status
                const parentColumnId = `column-${card.status}`; 
                // Note: data-testid includes hyphens, but we used data-status attribute for easier lookup in logic. 
                // Let's map strictly to the DOM structure created in HTML.
                
                let targetColList;
                if(card.status === 'backlog') targetColList = document.querySelector('[data-testid="column-backlog"] .card-list');
                else if(card.status === 'in-progress') targetColList = document.querySelector('[data-testid="column-in-progress"] .card-list');
                else if(card.status === 'review') targetColList = document.querySelector('[data-testid="column-review"] .card-list');
                else if(card.status === 'done') targetColList = document.querySelector('[data-testid="column-done"] .card-list');

                if (targetColList) {
                    targetColList.appendChild(cardEl);
                }
            });
            updateCounts();
        }

        function createCardElement(cardData) {
            const div = document.createElement('div');
            // Mandatory Test Selector
            div.setAttribute('data-testid', 'card'); 
            div.setAttribute('draggable', 'true');
            div.classList.add(
                'kanban-card', 
                'bg-white', 
                'p-4', 
                'rounded-lg', 
                'shadow-sm', 
                'border', 
                'border-gray-100', 
                'cursor-move', 
                'group',
                'relative' // for absolute positioning of delete button
            );

            // Content Area (Editable)
            const contentSpan = document.createElement('span');
            contentSpan.classList.add('text-sm', 'text-gray-700', 'block', 'break-words', 'outline-none', 'hover:text-indigo-600', 'transition-colors');
            contentSpan.textContent = cardData.content;
            
            // Edit Logic: Click to edit
            contentSpan.addEventListener('click', () => {
                const textarea = document.createElement('textarea');
                textarea.value = cardData.content;
                textarea.className = "w-full text-sm p-1 border-2 border-indigo-400 rounded bg-white outline-none resize-none";
                textarea.rows = 3;
                
                // Replace content with input
                div.replaceChild(textarea, contentSpan);
                textarea.focus();

                const saveEdit = () => {
                    const newContent = textarea.value.trim();
                    if (newContent) {
                        cardData.content = newContent;
                        saveState();
                        renderBoard(); // Re-render to show changes and re-attach events
                    } else {
                         // If empty, revert or keep original? Let's revert.
                        renderBoard(); 
                    }
                };

                textarea.addEventListener('blur', saveEdit);
                textarea.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        saveEdit();
                    }
                });
            });

            // Delete Button (Top Right of card)
            const deleteBtn = document.createElement('button');
            deleteBtn.setAttribute('data-testid', 'delete-card');
            deleteBtn.innerHTML = '&times;';
            deleteBtn.classList.add(
                'absolute', 
                '-top-2', 
                '-right-2', 
                'bg-red-100', 
                'text-red-600', 
                'w-5', 
                'h-5', 
                'rounded-full', 
                'flex', 
                'items-center', 
                'justify-center', 
                'text-xs', 
                'font-bold',
                'opacity-0', // Hidden by default
                'group-hover:opacity-100', // Visible on hover
                'hover:bg-red-600', 
                'hover:text-white', 
                'transition-all'
            );
            
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent drag or edit triggers
                openDeleteModal(cardData.id);
            });

            div.appendChild(deleteBtn);
            div.appendChild(contentSpan);

            // Drag Events
            div.addEventListener('dragstart', handleDragStart);
            div.addEventListener('dragend', handleDragEnd);

            return div;
        }

        function updateCounts() {
            const statuses = ['backlog', 'in-progress', 'review', 'done'];
            statuses.forEach(status => {
                const count = cards.filter(c => c.status === status).length;
                // Find the specific badge for this column
                let colBadge;
                if (status === 'backlog') colBadge = document.querySelector('[data-testid="column-backlog"] .count-badge');
                else if (status === 'in-progress') colBadge = document.querySelector('[data-testid="column-in-progress"] .count-badge');
                else if (status === 'review') colBadge = document.querySelector('[data-testid="column-review"] .count-badge');
                else if (status === 'done') colBadge = document.querySelector('[data-testid="column-done"] .count-badge');

                if(colBadge) {
                    colBadge.textContent = count;
                }
            });
        }

        // --- Drag and Drop Handlers ---
        function handleDragStart(e) {
            draggedCardId = this.getAttribute('data-id') || cards.find(c => c === this)?.id; 
            // Note: Since we re-render on edit, the DOM nodes are new. We need to rely on the data attribute or index if not set.
            // Let's attach ID directly to element in createCardElement for safety.
            
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.column-container').forEach(col => col.classList.remove('drag-over'));
        }

        // --- Column Drop Logic ---
        function setupDropZones() {
            const columns = document.querySelectorAll('.column-container');
            
            columns.forEach(column => {
                column.addEventListener('dragover', (e) => {
                    e.preventDefault(); // Necessary to allow dropping
                    column.classList.add('drag-over');
                    
                    const afterElement = getDragAfterElement(column.querySelector('.card-list'), e.clientY);
                    const draggable = document.querySelector('.dragging');
                    if (!draggable) return;

                    const list = column.querySelector('.card-list');
                    if (afterElement == null) {
                        list.appendChild(draggable);
                    } else {
                        list.insertBefore(draggable, afterElement);
                    }
                });

                column.addEventListener('dragleave', (e) => {
                   // Optional: remove class if leaving the container area completely
                   // but keeping it simple for now.
                });

                column.addEventListener('drop', (e) => {
                    e.preventDefault();
                    column.classList.remove('drag-over');
                    
                    const list = column.querySelector('.card-list');
                    
                    // The card is already physically moved in the DOM by dragover logic, 
                    // so we just need to update state.
                    
                    if(draggedCardId) {
                        const cardIndex = cards.findIndex(c => c.id === draggedCardId);
                        if (cardIndex > -1) {
                            const oldStatus = cards[cardIndex].status;
                            const newStatus = column.getAttribute('data-status');
                            
                            // Update data model
                            cards[cardIndex].status = newStatus;
                            saveState();

                            // Trigger confetti ONLY if moved TO done (and not already there)
                            if (newStatus === 'done' && oldStatus !== 'done') {
                                triggerConfetti();
                            }
                        }
                    }
                });
            });
        }

        // Helper to determine insertion position based on mouse Y
        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.kanban-card:not(.dragging)')];

            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2; // distance from center
                
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // --- Add Card Logic ---
        function setupAddCardLogic() {
            const addButtons = document.querySelectorAll('[data-testid="add-card"]');
            
            addButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // Find the input area sibling within the footer div
                    const footerDiv = btn.parentElement;
                    const inputArea = footerDiv.querySelector('#input-area-' + getColId(footerDiv));
                    
                    if(inputArea.classList.contains('hidden')){
                        inputArea.classList.remove('hidden');
                        const textarea = inputArea.querySelector('[data-testid="card-input"]');
                        textarea.focus();
                    } else {
                        // Toggle off
                        inputArea.classList.add('hidden');
                    }
                });

                // Setup Save inside the footer
                const saveBtn = btn.parentElement.querySelector('.save-new-card-btn');
                const cancelBtn = btn.parentElement.querySelector('.cancel-add-btn');
                const textarea = btn.parentElement.querySelector('[data-testid="card-input"]');

                if(saveBtn) {
                    saveBtn.addEventListener('click', () => handleSaveCard(textarea, btn));
                }
                
                if(cancelBtn) {
                    cancelBtn.addEventListener('click', () => {
                        const parent = textarea.closest('.hidden').parentElement; // Logic fix: inputArea is hidden class
                         textarea.parentElement.classList.add('hidden');
                         textarea.value = '';
                    });
                }

                // Allow Enter key to save in textarea (Shift+Enter for new line)
                if(textarea) {
                    textarea.addEventListener('keydown', (e) => {
                        if(e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            handleSaveCard(textarea, btn);
                        }
                    });
                }
            });
        }

        function getColId(element) {
            // Helper to map footer back to column ID string for finding the input container
            let current = element;
            while(current && !current.classList.contains('column-container')){
                current = current.parentElement;
            }
            if(!current) return '';
            
            const status = current.getAttribute('data-status');
            // Map 'in-progress' to 'in-progress', etc. The IDs in HTML match data-status mostly, 
            // but let's be safe with the specific ID structure used in HTML: input-area-[status]
            if(status === 'backlog') return 'backlog';
            if(status === 'in-progress') return 'in-progress';
            if(status === 'review') return 'review';
            if(status === 'done') return 'done';
            return '';
        }

        function handleSaveCard(textarea, addBtn) {
            const text = textarea.value.trim();
            if (text) {
                const newCard = {
                    id: 'c-' + Date.now(), // simple unique ID
                    content: text,
                    status: getColId(addBtn)
                };
                cards.push(newCard);
                saveState();
                renderBoard();
                
                // Reset UI
                textarea.value = '';
                textarea.parentElement.classList.add('hidden');
            } else {
                alert("Please enter a title."); // Fallback, though prompt said no window.alert. 
                // Let's stick to the requirement "no window.alert". Focus back instead.
                textarea.focus();
            }
        }

        // --- Delete Logic (Modal) ---
        function openDeleteModal(id) {
            cardToDeleteId = id;
            const modal = document.getElementById('delete-modal');
            modal.classList.remove('hidden-modal');
        }

        function closeDeleteModal() {
            cardToDeleteId = null;
            const modal = document.getElementById('delete-modal');
            modal.classList.add('hidden-modal');
        }

        function setupDeleteListeners() {
            const confirmBtn = document.querySelector('[data-testid="confirm-delete"]');
            const cancelBtn = document.getElementById('cancel-delete');

            if(confirmBtn) {
                confirmBtn.addEventListener('click', () => {
                    if (cardToDeleteId) {
                        cards = cards.filter(c => c.id !== cardToDeleteId);
                        saveState();
                        renderBoard();
                        closeDeleteModal();
                    }
                });
            }

            if(cancelBtn) {
                cancelBtn.addEventListener('click', closeDeleteModal);
            }

            // Close on outside click
            const modalOverlay = document.getElementById('delete-modal');
            modalOverlay.addEventListener('click', (e) => {
                if(e.target === modalOverlay) {
                    closeDeleteModal();
                }
            });
        }

        function triggerConfetti() {
            // Fire confetti from bottom center
            const duration = 2000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#6366f1', '#ec4899'] // Indigo and Pink
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#6366f1', '#ec4899']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function setupEventListeners() {
            setupDropZones();
            setupAddCardLogic();
            setupDeleteListeners();
        }

        // Start App
        init();

    </script>
</body>
</html>
