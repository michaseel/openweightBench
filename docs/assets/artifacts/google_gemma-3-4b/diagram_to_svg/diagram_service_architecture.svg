    <rect x="650" y="150" width="300" height="250" stroke="black" fill="white" />
    <text x="680" y="200" font-size="14">Goals:</text>
    <text x="680" y="250" font-size="14">- Scalability</text>
    <text x="680" y="300" font-size="14">- Reliability</text>
    <text x="680" y="350" font-size="14">- Security</text>
    <text x="680" y="400" font-size="14">- Maintainability</text>
    <rect x="20" y="500" width="100" height="100" stroke="black" fill="white" />
    <text x="40" y="550" font-size="14">Frontend (React)</text>
    <rect x="500" y="500" width="100" height="100" stroke="black" fill="white" />
    <text x="540" y="550" font-size="14">API Gateway (Kong)</text>
    <rect x="20" y="350" width="100" height="100" stroke="black" fill="white" />
