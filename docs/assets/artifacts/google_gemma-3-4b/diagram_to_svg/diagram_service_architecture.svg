    <line x1="500" y1="500" x2="600" y2="700" stroke="black" stroke-width="2"/>
    <line x1="650" y1="150" x2="650" y2="350" stroke="black" stroke-width="2"/>
    <line x1="650" y1="350" x2="500" y2="700" stroke="black" stroke-width="2"/>
