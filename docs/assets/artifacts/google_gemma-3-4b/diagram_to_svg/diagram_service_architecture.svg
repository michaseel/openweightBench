    <rect x="20" y="150" width="100" height="100" stroke="black" fill="white" />
    <text x="40" y="180" font-size="14">External API</text>
    <rect x="500" y="150" width="100" height="100" stroke="black" fill="white" />
    <text x="540" y="180" font-size="14">Payment Provider</text>
    <rect x="20" y="50" width="100" height="100" stroke="black" fill="white" />
    <text x="40" y="70" font-size="14">Worker Service (Python)</text>
    <rect x="500" y="50" width="100" height="100" stroke="black" fill="white" />
    <text x="540" y="70" font-size="14">Database (PostgreSQL)</text>
    <rect x="20" y="700" width="100" height="100" stroke="black" fill="white" />
    <text x="40" y="730" font-size="14">Monitoring</text>
    <rect x="500" y="700" width="100" height="100" stroke="black" fill="white" />
    <text x="540" y="730" font-size="14">Prometheus + Grafana</text>
    <rect x="300" y="250" width="100" height="100" stroke="black" fill="white" />
    <text x="350" y="280" font-size="14">Logs -> ELK Stack</text>
    <rect x="600" y="250" width="100" height="100" stroke="black" fill="white" />
    <text x="650" y="280" font-size="14">CI/CD with GitHub Actions</text>
    <line x1="100" y1="150" x2="300" y2="250" stroke="black" stroke-width="2"/>
    <line x1="300" y1="250" x2="600" y2="350" stroke="black" stroke-width="2"/>
    <line x1="600" y1="350" x2="500" y2="700" stroke="black" stroke-width="2"/>
    <line x1="500" y1="700" x2="20" y2="150" stroke="black" stroke-width="2"/>
    <line x1="500" y1="700" x2="20" y2="350" stroke="black" stroke-width="2"/>
