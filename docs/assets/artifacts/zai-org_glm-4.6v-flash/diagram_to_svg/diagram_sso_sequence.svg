<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
        </marker>
    </defs>
    <style>
        text {
            font-family: Arial, sans-serif;
            font-size: 14px;
            fill: #000;
        }
    </style>
    
    <text x="600" y="60" text-anchor="middle">SSO - Ablaufdiagramm</text>
    
    <g id="benutzer">
        <circle cx="100" cy="200" r="8"/>
        <line x1="100" y1="208" x2="100" y2="230"/>
        <line x1="100" y1="230" x2="85" y2="245"/>
        <line x1="100" y1="230" x2="115" y2="245"/>
        <text x="100" y="270" text-anchor="middle">Benutzer</text>
    </g>
    
    <g id="app-sp">
        <rect x="280" y="180" width="180" height="60" fill="none" stroke="#000" stroke-width="2"/>
        <text x="370" y="215" text-anchor="middle">App /</text>
        <text x="370" y="235" text-anchor="middle">Service Provider</text>
    </g>
    
    <g id="idp">
        <rect x="580" y="180" width="180" height="60" fill="none" stroke="#000" stroke-width="2"/>
        <text x="670" y="215" text-anchor="middle">Identity Provider</text>
        <text x="670" y="235" text-anchor="middle">(IdP)</text>
    </g>
    
    <g id="login-page">
        <rect x="580" y="330" width="180" height="60" fill="none" stroke="#000" stroke-width="2"/>
        <text x="670" y="365" text-anchor="middle">Login-Seite</text>
    </g>
    
    <g id="decision">
        <polygon points="750,330 820,390 750,450 680,390" fill="none" stroke="#000" stroke-width="2"/>
        <text x="765" y="375" text-anchor="middle">Anmeldedaten</text>
        <text x="765" y="395" text-anchor="middle">korrekt?</text>
    </g>
    
    <g id="access-granted">
        <rect x="230" y="530" width="180" height="60" fill="none" stroke="#000" stroke-width="2"/>
        <text x="320" y="565" text-anchor="middle">Zugriff</text>
        <text x="320" y="585" text-anchor="middle">gewährt</text>
    </g>
    
    <line x1="100" y1="220" x2="280" y2="220" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="190" y="210" text-anchor="middle">1. Zugang zu App</text>
    
    <line x1="460" y1="210" x2="580" y2="210" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="520" y="200" text-anchor="middle">2. Weiterleitung zur Login-Seite</text>
    
    <line x1="670" y1="240" x2="670" y2="330" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="670" y="285" text-anchor="middle">3. Login-Seite anzeigen</text>
    
    <line x1="760" y1="390" x2="760" y2="430" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="760" y="410" text-anchor="middle">4. Authentifizierung</text>
    
    <line x1="765" y1="450" x2="370" y2="530" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="570" y="490" text-anchor="middle">5. Token / Assertion (SSO-Response)</text>
    
    <line x1="580" y1="390" x2="370" y2="470" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="475" y="430" text-anchor="middle">6. Redirect zurück zur App mit Token</text>
    
    <line x1="370" y1="530" x2="320" y2="590" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="320" y="560" text-anchor="middle">7. Zugriff auf Ressourcen</text>
    
    <line x1="765" y1="450" x2="670" y2="390" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
    <text x="715" y="420" text-anchor="middle">Benutzer gibt</text>
    <text x="715" y="440" text-anchor="middle">Anmeldedaten ein</text>
</svg>