<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{padding:24px;display:inline-block;background:#fff}
  /* Force a concrete render box: many model-emitted SVGs only set viewBox.
     Without a width here, an inline-block parent collapses the SVG to its
     intrinsic ~300x150 (or smaller) and the screenshot becomes a tiny
     blank tile. Fixed width + auto height uses viewBox aspect-ratio. */
  .wrap svg{display:block;width:1200px;height:auto;max-width:none}
</style></head><body><div class="wrap"><svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Marker für Pfeile -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
    
    <!-- Symbole -->
    <g id="target-icon">
      <circle cx="20" cy="10" r="8" stroke="#000" fill="none" stroke-width="2"/>
      <circle cx="20" cy="10" r="4" stroke="#000" fill="none" stroke-width="2"/>
      <path d="M 5 15 L 35 15 M 18 18 L 22 12" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
    </g>
    
    <g id="megaphone-icon">
      <path d="M 10 35 L 40 35 L 45 25 L 60 25 L 60 15 L 70 15 L 70 35 Z" stroke="#000" fill="none" stroke-width="2"/>
      <path d="M 45 25 L 55 25 M 48 25 L 52 25 M 50 25 L 50 15" stroke="#000" stroke-width="2"/>
    </g>

    <g id="unicorn-icon">
      <path d="M 30 25 Q 40 15, 60 20 Q 80 25, 70 40 L 60 50 L 50 45 L 40 55 L 30 45 Z" stroke="#000" fill="none" stroke-width="2"/>
      <path d="M 48 15 L 52 10" stroke="#000" stroke-width="2"/> <!-- Horn -->
    </g>

    <g id="exclamation-icon">
      <polygon points="30,35 40,15 50,35" fill="none" stroke="#000" stroke-width="2"/>
      <circle cx="35" cy="38" r="3" fill="#000"/>
      <circle cx="45" cy="38" r="3" fill="#000"/>
    </g>

    <g id="coffee-icon">
      <path d="M 20 15 L 30 15 L 30 25 Z M 20 15 L 40 15 L 40 25 Z" stroke="#000" fill="none"/> <!-- Cup -->
      <rect x="20" y="15" width="20" height="10" rx="3" ry="3" stroke="#000" fill="none"/>
    </g>

  </defs>

  <!-- Hintergrund (optional, weiß) -->
  <rect width="1400" height="900" fill="#ffffff"/>

  <!-- Titel -->
  <text x="700" y="50" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" font-weight="bold">Eisenhower - Matrix - Marketing</text>
  <line x1="300" y1="45" x2="1100" y2="45" stroke="#000" stroke-width="2"/>

  <!-- Achsen -->
  
  <!-- Y-Achse (Wichtigkeit) -->
  <g id="y-axis">
    <line x1="250" y1="850" x2="250" y2="450" stroke="#000" stroke-width="3"/>
    <text x="190" y="650" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" transform="rotate(-90 190 650)">Wichtigkeit</text>
    <!-- Pfeil oben -->
    <line x1="245" y1="450" x2="255" y2="430" stroke="#000" stroke-width="3"/>
    <polygon points="255,430 265,440 255,450" fill="#000"/>
    
    <!-- Labels -->
    <text x="180" y="470" font-family="Arial, sans-serif" font-size="16">hoch</text>
    <text x="180" y="830" font-family="Arial, sans-serif" font-size="16">niedrig</text>
  </g>

  <!-- X-Achse (Dringlichkeit) -->
  <g id="x-axis">
    <line x1="700" y1="850" x2="1350" y2="850" stroke="#000" stroke-width="3"/>
    <!-- Pfeil rechts -->
    <polygon points="1340,840 1360,850 1340,860" fill="#000"/>
    
    <!-- Labels -->
    <text x="270" y="890" font-family="Arial, sans-serif" font-size="16">niedrig</text>
    <text x="1300" y="890" font-family="Arial, sans-serif" font-size="16">hoch</text>
    
    <!-- Mitte Label -->
    <text x="750" y="840" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold">Dringlichkeit</text>
  </g>

  <!-- Matrix Rahmen -->
  <g id="matrix-frame">
    <!-- Linke Seite -->
    <line x1="300" y1="450" x2="300" y2="650" stroke="#000" stroke-width="3"/>
    
    <!-- Rechte Seite -->
    <line x1="750" y1="450" x2="750" y2="650" stroke="#000" stroke-width="3"/>
    
    <!-- Obere Seite -->
    <line x1="300" y1="450" x2="750" y2="450" stroke="#000" stroke-width="3"/>
    
    <!-- Untere Seite -->
    <line x1="300" y1="650" x2="750" y2="650" stroke="#000" stroke-width="3"/>
  </g>

  <!-- Quadrant 1: Top Left (Wichtig + Nicht dringend) -->
  <g id="q1">
    <rect x="400" y="500" width="280" height="170" stroke="#000" stroke-width="3" fill="none"/>
    
    <!-- Titel Box -->
    <text x="540" y="530" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">Wichtig + Nicht dringend</text>
    
    <!-- Liste -->
    <g font-family="Arial, sans-serif" font-size="14" fill="#000">
      <line x1="420" y1="560" x2="720" y2="560" stroke="#000" stroke-width="1.5"/>
      <text x="430" y="580">• Content-Strategie</text>
      
      <line x1="420" y1="600" x2="720" y2="600" stroke="#000" stroke-width="1.5"/>
      <text x="430" y="620">• Brand schärfen</text>
      
      <line x1="420" y1="640" x2="720" y2="640" stroke="#000" stroke-width="1.5"/>
      <text x="430" y="660">• SEO aufräumen</text>
      
      <line x1="420" y1="680" x2="720" y2="680" stroke="#000" stroke-width="1.5"/>
      <text x="430" y="700">• Zielgruppen verstehen</text>
    </g>

    <!-- Icon -->
    <use href="#target-icon" x="650" y="620" width="40" height="40"/>
  </g>

  <!-- Quadrant 2: Top Right (Wichtig + Dringend) -->
  <g id="q2">
    <rect x="800" y="500" width="280" height="170" stroke="#000" stroke-width="3" fill="none"/>

    <!-- Titel Box -->
    <text x="940" y="530" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">Wichtig + Dringend</text>

    <!-- Liste -->
    <g font-family="Arial, sans-serif" font-size="14" fill="#000">
      <line x1="820" y1="560" x2="1120" y2="560" stroke="#000" stroke-width="1.5"/>
      <text x="830" y="580">• Kampagne retten</text>

      <line x1="820" y1="600" x2="1120" y2="600" stroke="#000" stroke-width="1.5"/>
      <text x="830" y="620">• Shitstorm beantworten</text>

      <line x1="820" y1="640" x2="1120" y2="640" stroke="#000" stroke-width="1.5"/>
      <text x="830" y="660">• Newsletter mit</text>
      <text x="830" y="680">falschem Link fixen</text>

      <line x1="820" y1="720" x2="1120" y2="720" stroke="#000" stroke-width="1.5"/>
      <text x="830" y="740">• Chef will bis 14 Uhr</text>
      <text x="830" y="760">„viral gehen“</text>
    </g>

    <!-- Icons -->
    <use href="#megaphone-icon" x="1050" y="620" width="40" height="40"/>
    
    <!-- Viral Explosion -->
    <polygon points="980,570 1000,530 1020,570 1040,530 1020,550 1000,510 980,550" fill="#000"/>
    <text x="1000" y="560" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">VIRAL??</text>
  </g>

  <!-- Quadrant 3: Bottom Left (Nicht wichtig + Nicht dringend) -->
  <g id="q3">
    <rect x="400" y="750" width="280" height="170" stroke="#000" stroke-width="3" fill="none"/>

    <!-- Titel Box -->
    <text x="540" y="780" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">Nicht wichtig + Nicht dringend</text>

    <!-- Liste -->
    <g font-family="Arial, sans-serif" font-size="14" fill="#000">
      <line x1="420" y1="810" x2="720" y2="810" stroke="#000" stroke-width="1.5"/>
      <text x="430" y="830">• Merch-Ideen mit Glitzer</text>

      <line x1="420" y1="850" x2="720" y2="850" stroke="#000" stroke-width="1.5"/>
      <text x="430" y="870">• Buzzword-Bingo</text>

      <line x1="420" y1="890" x2="720" y2="890" stroke="#000" stroke-width="1.5"/>
      <text x="430" y="910">• TikTok-Tanz mit dem</text>
      <text x="430" y="930">Maskottchen</text>

      <line x1="420" y1="970" x2="720" y2="970" stroke="#000" stroke-width="1.5"/>
      <text x="430" y="990">• Hashtag brainstormen</text>
      <text x="430" y="1010">#innovation #synergy #wow</text>
    </g>

    <!-- Icon -->
    <use href="#unicorn-icon" x="650" y="870" width="40" height="40"/>
  </g>

  <!-- Quadrant 4: Bottom Right (Nicht wichtig + Dringend) -->
  <g id="q4">
    <rect x="800" y="750" width="280" height="170" stroke="#000" stroke-width="3" fill="none"/>

    <!-- Titel Box -->
    <text x="940" y="780" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" font-weight="bold">Nicht wichtig + Dringend</text>

    <!-- Liste -->
    <g font-family="Arial, sans-serif" font-size="14" fill="#000">
      <line x1="820" y1="810" x2="1120" y2="810" stroke="#000" stroke-width="1.5"/>
      <text x="830" y="830">• Noch ein Last-Minute-Meeting</text>

      <line x1="820" y1="850" x2="1120" y2="850" stroke="#000" stroke-width="1.5"/>
      <text x="830" y="870">• Kann das Logo größer?</text>

      <line x1="820" y1="910" x2="1120" y2="910" stroke="#000" stroke-width="1.5"/>
      <text x="830" y="930">• LinkedIn-Post für</text>
      <text x="830" y="950">„Welttag der Büroklammer“</text>

      <line x1="820" y1="990" x2="1120" y2="990" stroke="#000" stroke-width="1.5"/>
      <text x="830" y="1010">• Folie 27 schöner machen</text>
    </g>

    <!-- Icon -->
    <use href="#exclamation-icon" x="1050" y="870" width="40" height="40"/>
  </g>

  <!-- Randnotizen (Zusätze) -->
  
  <!-- Links: Herz & Text -->
  <g id="left-notes">
    <circle cx="200" cy="650" r="15" stroke="#000" fill="none"/>
    <path d="M 185 635 L 215 645 M 190 625 L 210 635" stroke="#000" stroke-width="2"/> <!-- Herz -->
    
    <text x="170" y="680" font-family="Arial, sans-serif" font-size="14">Erledigen,</text>
    <text x="170" y="700">wenn das</text>
    <text x="170" y="720">Internet</text>
    <text x="170" y="740">wieder da ist.</text>
    <text x="170" y="760">:)</text>
  </g>

  <!-- Rechts oben: Kaffee -->
  <g id="coffee-notes">
    <use href="#coffee-icon" x="1320" y="200" width="40" height="40"/>
    
    <text x="1325" y="240" font-family="Arial, sans-serif" font-size="14">Kaffee</text>
    <text x="1325" y="260">zählt nicht.</text>
    <text x="1325" y="280">Aber hilft.</text>
    <text x="1325" y="300">:)</text>
  </g>

  <!-- Rechts unten: Ausrufezeichen -->
  <use href="#exclamation-icon" x="1320" y="780" width="40" height="40"/>

</svg></div></body></html>
