<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <!-- Tailwind CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
        .card {
            transition: background-color 0.3s, transform 0.3s;
        }
    </style>
</head>
<body class="bg-gray-100 p-6">
    <div id="kanban-board" class="flex space-x-4">
        <!-- Backlog Column -->
        <div id="backlog" data-testid="column-backlog" class="w-1/4 bg-white p-4 rounded shadow-lg">
            <h2 class="text-xl font-bold mb-4">Backlog</h2>
            <div id="backlog-cards" class="space-y-4"></div>
            <button data-testid="add-card" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none">Add card</button>
        </div>

        <!-- In Progress Column -->
        <div id="in-progress" data-testid="column-in-progress" class="w-1/4 bg-white p-4 rounded shadow-lg">
            <h2 class="text-xl font-bold mb-4">In Progress</h2>
            <div id="in-progress-cards" class="space-y-4"></div>
            <button data-testid="add-card" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none">Add card</button>
        </div>

        <!-- Review Column -->
        <div id="review" data-testid="column-review" class="w-1/4 bg-white p-4 rounded shadow-lg">
            <h2 class="text-xl font-bold mb-4">Review</h2>
            <div id="review-cards" class="space-y-4"></div>
            <button data-testid="add-card" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none">Add card</button>
        </div>

        <!-- Done Column -->
        <div id="done" data-testid="column-done" class="w-1/4 bg-white p-4 rounded shadow-lg">
            <h2 class="text-xl font-bold mb-4">Done</h2>
            <div id="done-cards" class="space-y-4"></div>
            <button data-testid="add-card" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none">Add card</button>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white p-6 rounded shadow-lg text-center">
            <p class="text-xl mb-4">Are you sure you want to delete this card?</p>
            <button data-testid="confirm-delete" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 focus:outline-none">Delete</button>
            <button id="cancel-delete" class="ml-4 px-4 py-2 bg-gray-300 rounded hover:bg-gray-400 focus:outline-none">Cancel</button>
        </div>
    </div>

    <!-- Confetti Animation -->
    <canvas id="confetti" class="confetti"></canvas>

    <!-- Script for functionality -->
    <script>
        // Namespace for localStorage
        const NS = 'kanban-board';

        // Function to get cards from localStorage or set default
        function loadCards() {
            const storedCards = JSON.parse(localStorage.getItem(NS)) || {};
            return Object.assign({
                backlog: ['Initial Task 1', 'Initial Task 2'],
                inProgress: [],
                review: [],
                done: []
            }, storedCards);
        }

        // Function to save cards to localStorage
        function saveCards(cards) {
            localStorage.setItem(NS, JSON.stringify(cards));
        }

        // Function to create card element
        function createCard(title) {
            const card = document.createElement('div');
            card.className = 'card p-4 bg-white rounded shadow-lg flex justify-between items-center';
            card.draggable = true;
            card.setAttribute('data-testid', 'card');

            const titleSpan = document.createElement('span');
            titleSpan.contentEditable = true;
            titleSpan.className = 'w-full';
            titleSpan.textContent = title;

            const deleteButton = document.createElement('button');
            deleteButton.className = 'text-red-500 hover:text-red-600 focus:outline-none';
            deleteButton.setAttribute('data-testid', 'delete-card');
            deleteButton.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.93-1.858L5 7m5 4v6m4-6v6M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>';

            card.appendChild(titleSpan);
            card.appendChild(deleteButton);

            // Add drag and drop functionality
            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', card.outerHTML);
                e.dataTransfer.effectAllowed = 'move';
            });

            // Save changes on blur
            titleSpan.addEventListener('input', () => {
                saveBoard();
            });

            // Delete card confirmation
            deleteButton.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('delete-modal').classList.remove('hidden');
            });

            return card;
        }

        // Function to render cards in a column
        function renderColumn(columnId, cards) {
            const column = document.getElementById(`${columnId}-cards`);
            column.innerHTML = ''; // Clear existing cards
            cards.forEach(cardTitle => {
                const card = createCard(cardTitle);
                column.appendChild(card);
            });
        }

        // Function to render the entire board
        function renderBoard(cards) {
            renderColumn('backlog', cards.backlog);
            renderColumn('in-progress', cards.inProgress);
            renderColumn('review', cards.review);
            renderColumn('done', cards.done);

            // Add drag and drop functionality to columns
            ['backlog', 'in-progress', 'review', 'done'].forEach(columnId => {
                const column = document.getElementById(columnId);
                column.addEventListener('dragover', (e) => e.preventDefault());
                column.addEventListener('drop', (e) => {
                    const cardHtml = e.dataTransfer.getData('text/plain');
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = cardHtml;
                    const newCard = tempDiv.firstChild;

                    // Remove card from its current location
                    if (newCard.parentNode) {
                        newCard.parentNode.removeChild(newCard);
                    }

                    // Add card to the new column
                    document.getElementById(`${columnId}-cards`).appendChild(newCard);

                    // Save changes to localStorage
                    saveBoard();

                    // Trigger confetti if card moved to Done
                    if (columnId === 'done') {
                        confetti({
                            particleCount: 100,
                            spread: 70,
                            origin: { y: 0.6 }
                        });
                    }
                });
            });

            // Add event listeners to "Add card" buttons
            document.querySelectorAll('[data-testid="add-card"]').forEach(button => {
                button.addEventListener('click', () => {
                    const columnId = button.parentNode.id.replace('-cards', '');
                    const input = document.createElement('input');
                    input.setAttribute('data-testid', 'card-input');
                    input.className = 'p-2 border rounded w-full mb-2';
                    input.placeholder = 'Enter card title...';

                    // Append input and focus on it
                    button.parentNode.insertBefore(input, button);
                    input.focus();

                    // Add card when Enter is pressed
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            const cardTitle = input.value.trim();
                            if (cardTitle) {
                                document.getElementById(`${columnId}-cards`).appendChild(createCard(cardTitle));
                                input.parentNode.removeChild(input);
                                saveBoard();
                            }
                        }
                    });

                    // Remove input if focus is lost
                    input.addEventListener('blur', () => {
                        input.parentNode.removeChild(input);
                    });
                });
            });

            // Add event listeners to delete buttons
            document.querySelectorAll('[data-testid="delete-card"]').forEach(button => {
                button.addEventListener('click', () => {
                    document.getElementById('delete-modal').classList.remove('hidden');
                });
            });

            // Delete card confirmation
            document.getElementById('confirm-delete').addEventListener('click', () => {
                const selectedCard = document.querySelector('.card.selected');
                if (selectedCard) {
                    selectedCard.parentNode.removeChild(selectedCard);
                    document.getElementById('delete-modal').classList.add('hidden');
                    saveBoard();
                }
            });

            // Cancel delete
            document.getElementById('cancel-delete').addEventListener('click', () => {
                document.getElementById('delete-modal').classList.add('hidden');
            });

            // Mark card as selected on click
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                });
            });
        }

        // Function to save the current board state
        function saveBoard() {
            const cards = {
                backlog: Array.from(document.getElementById('backlog-cards').children).map(card => card.firstChild.textContent),
                inProgress: Array.from(document.getElementById('in-progress-cards').children).map(card => card.firstChild.textContent),
                review: Array.from(document.getElementById('review-cards').children).map(card => card.firstChild.textContent),
                done: Array.from(document.getElementById('done-cards').children).map(card => card.firstChild.textContent)
            };
            saveCards(cards);
        }

        // Load and render the board on page load
        window.onload = () => {
            const cards = loadCards();
            renderBoard(cards);
        };
    </script>

    <!-- Confetti library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</body>
</html>
