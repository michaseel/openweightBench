<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="black"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" font-size="24">Eisenhower - Matrix - Marketing</text>

  <!-- Vertical axis (Wichtigkeit) -->
  <line x1="150" y1="100" x2="150" y2="700" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="140" y="120" font-size="16">hoch</text>
  <text x="140" y="680" font-size="16">niedrig</text>

  <!-- Horizontal axis (Dringlichkeit) -->
  <line x1="150" y1="700" x2="1050" y2="700" stroke="black" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
  <text x="200" y="740" font-size="16">niedrig</text>
  <text x="1030" y="740" font-size="16">hoch</text>

  <!-- Quadrant rectangles -->
  <!-- Top-left: Wichtig + Nicht dringend -->
  <rect x="150" y="100" width="450" height="300" fill="white" stroke="black" stroke-width="2"/>
  <text x="375" y="115" text-anchor="middle" font-size="16">Wichtig + Nicht dringend</text>
  <text x="200" y="140" font-size="14">Content-Strategie</text>
  <text x="200" y="170" font-size="14">Brand schärfen</text>
  <text x="200" y="200" font-size="14">SEO optimieren</text>
  <text x="200" y="230" font-size="14">Rückgriffen verstehen</text>

  <!-- Top-right: Wichtig + Dringend -->
  <rect x="600" y="100" width="450" height="300" fill="white" stroke="black" stroke-width="2"/>
  <text x="825" y="115" text-anchor="middle" font-size="16">Wichtig + Dringend</text>
  <text x="725" y="140" font-size="14">Kampagne starten</text>
  <text x="725" y="170" font-size="14">Siteltern bearbeiten</text>
  <text x="725" y="200" font-size="14">Newsletter mit falschen Link fixen</text>
  <text x="725" y="230" font-size="14">Event will bis 49 Uhr schnell gehen</text>

  <!-- Bottom-left: Nicht wichtig + Nicht dringend -->
  <rect x="150" y="400" width="450" height="300" fill="white" stroke="black" stroke-width="2"/>
  <text x="375" y="415" text-anchor="middle" font-size="16">Nicht wichtig + Nicht dringend</text>
  <text x="200" y="440" font-size="14">Mark-Ideen mit Sticker</text>
  <text x="200" y="470" font-size="14">Buzzword-Bingo</text>
  <text x="200" y="500" font-size="14">TikTok-Tags mit den Maskottchen</text>
  <text x="200" y="530" font-size="14">Hashtag kreieren #machen #sagen #now #</text>

  <!-- Bottom-right: Nicht wichtig + Dringend -->
  <rect x="600" y="400" width="450" height="300" fill="white" stroke="black" stroke-width="2"/>
  <text x="825" y="415" text-anchor="middle" font-size="16">Nicht wichtig + Dringend</text>
  <text x="725" y="440" font-size="14">Noch ein Lead-Magnet-Mailing?</text>
  <text x="725" y="470" font-size="14">Kenn das Logo größer?</text>
  <text x="725" y="500" font-size="14">LinkedIn-Post für „Wichtig der Business“?</text>
  <text x="725" y="530" font-size="14">Falls 24 schöner machen</text>

  <!-- Decorative elements (optional) -->
  <text x="130" y="560" font-size="18" transform="rotate(-45 130 560)">Ich liebe dich, du bist mein Herz</text>
  <path d="M120 560 C130 540, 150 540, 160 560" stroke="black" stroke-width="2" fill="none"/>
  <circle cx="120" cy="580" r="10" fill="black"/>
  <text x="820" y="300" font-size="14">Kaffee zahlt nicht mehr hilft</text>
  <path d="M820 320 C830 310, 840 310, 850 320" stroke="black" stroke-width="2" fill="none"/>
  <circle cx="820" cy="340" r="6" fill="black"/>
  <path d="M820 360 C830 370, 840 370, 850 360" stroke="black" stroke-width="2" fill="none"/>
  <circle cx="820" cy="380" r="6" fill="black"/>
  <path d="M820 400 C830 410, 840 410, 850 400" stroke="black" stroke-width="2" fill="none"/>
  <circle cx="820" cy="420" r="6" fill="black"/>
  <path d="M820 440 C830 450, 840 450, 850 440" stroke="black" stroke-width="2" fill="none"/>
  <circle cx="820" cy="460" r="6" fill="black"/>
</svg>