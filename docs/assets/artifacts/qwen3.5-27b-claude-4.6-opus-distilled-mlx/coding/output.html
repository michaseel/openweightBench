<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti for celebration animation -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* Custom styles for drag and drop visual feedback */
        .dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }
        
        .drag-over {
            background-color: rgba(59, 130, 246, 0.1);
            border: 2px dashed #3b82f6;
        }
        
        /* Smooth transitions for card movements */
        .card-transition {
            transition: all 0.2s ease-in-out;
        }
        
        /* Custom scrollbar for better aesthetics */
        .scrollbar-custom::-webkit-scrollbar {
            width: 6px;
        }
        
        .scrollbar-custom::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        
        .scrollbar-custom::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        
        .scrollbar-custom::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen p-6">
    
    <!-- Header Section -->
    <header class="mb-8 text-center">
        <h1 class="text-4xl font-bold text-white mb-2 flex items-center justify-center gap-3">
            <span>📋</span>
            Kanban Board
        </h1>
        <p class="text-slate-400">Drag cards between columns to manage your workflow</p>
    </header>

    <!-- Main Board Container -->
    <main id="kanban-board" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
        <!-- Columns will be dynamically generated here -->
    </main>

    <!-- Modal for adding new cards -->
    <div id="add-card-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4 shadow-2xl">
            <h3 class="text-xl font-bold text-slate-800 mb-4">Add New Card</h3>
            <textarea 
                id="new-card-textarea" 
                data-testid="card-input"
                class="w-full p-3 border-2 border-slate-200 rounded-lg focus:border-purple-500 focus:outline-none resize-y min-h-[120px] text-slate-700"
                placeholder="Enter card title and description..."></textarea>
            <div class="flex justify-end gap-3 mt-4">
                <button 
                    id="cancel-add-btn"
                    class="px-4 py-2 text-slate-600 hover:text-slate-800 transition-colors">
                    Cancel
                </button>
                <button 
                    id="submit-add-btn"
                    class="px-6 py-2 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-lg hover:from-purple-700 hover:to-indigo-700 transition-all shadow-lg hover:shadow-xl">
                    Add Card
                </button>
            </div>
        </div>
    </div>

    <!-- Modal for editing cards -->
    <div id="edit-card-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4 shadow-2xl">
            <h3 class="text-xl font-bold text-slate-800 mb-4">Edit Card</h3>
            <textarea 
                id="edit-card-textarea" 
                data-testid="card-input"
                class="w-full p-3 border-2 border-slate-200 rounded-lg focus:border-purple-500 focus:outline-none resize-y min-h-[120px] text-slate-700"></textarea>
            <div class="flex justify-end gap-3 mt-4">
                <button 
                    id="cancel-edit-btn"
                    class="px-4 py-2 text-slate-600 hover:text-slate-800 transition-colors">
                    Cancel
                </button>
                <button 
                    id="submit-edit-btn"
                    class="px-6 py-2 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-lg hover:from-purple-700 hover:to-indigo-700 transition-all shadow-lg hover:shadow-xl">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-sm mx-4 shadow-2xl text-center">
            <div class="text-5xl mb-4">⚠️</div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">Delete Card?</h3>
            <p class="text-slate-600 mb-6">This action cannot be undone.</p>
            <div class="flex justify-center gap-4">
                <button 
                    id="cancel-delete-btn"
                    class="px-6 py-2 border-2 border-slate-300 text-slate-700 rounded-lg hover:bg-slate-100 transition-colors">
                    Cancel
                </button>
                <button 
                    id="confirm-delete-btn"
                    data-testid="confirm-delete"
                    class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors shadow-lg">
                    Delete
                </button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Kanban Board Application
         * A fully functional drag-and-drop kanban board with persistence
         */

        // ============= Configuration =============
        
        // Namespace for localStorage to avoid conflicts with other applications
        const STORAGE_NAMESPACE = 'kanban-board-v1';
        
        // Column definitions with styling and configuration
        const COLUMNS = [
            { 
                id: 'backlog', 
                title: 'Backlog', 
                color: 'from-slate-600 to-slate-700',
                borderColor: 'border-slate-300',
                icon: '📝'
            },
            { 
                id: 'in-progress', 
                title: 'In Progress', 
                color: 'from-amber-500 to-orange-600',
                borderColor: 'border-amber-300',
                icon: '⚙️'
            },
            { 
                id: 'review', 
                title: 'Review', 
                color: 'from-blue-500 to-indigo-600',
                borderColor: 'border-blue-300',
                icon: '🔍'
            },
            { 
                id: 'done', 
                title: 'Done', 
                color: 'from-emerald-500 to-green-600',
                borderColor: 'border-emerald-300',
                icon: '✅'
            }
        ];

        // ============= State Management =============

        let state = {
            backlog: [],
            'in-progress': [],
            review: [],
            done: []
        };

        let draggingCard = null;       // Currently dragged card element
        let dragSrcColumn = null;      // Source column of dragged card
        let dragSrcIndex = -1;         // Source index of dragged card
        let cardBeingEdited = null;     // ID of card currently being edited
        let cardBeingDeleted = null;    // ID of card pending deletion
        let targetColumnForAdd = null;  // Target column for new card

        /**
         * Load state from localStorage or initialize with dummy data
         */
        function loadState() {
            const stored = localStorage.getItem(STORAGE_NAMESPACE);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    // Validate and merge with default structure
                    COLUMNS.forEach(col => {
                        if (Array.isArray(parsed[col.id])) {
                            state[col.id] = parsed[col.id];
                        } else if (!parsed[col.id]) {
                            state[col.id] = [];
                        }
                    });
                } catch (e) {
                    console.error('Error parsing stored state:', e);
                    initializeDummyData();
                }
            } else {
                initializeDummyData();
            }
        }

        /**
         * Initialize with sample cards for first-time users
         */
        function initializeDummyData() {
            state = {
                backlog: [
                    { id: generateId(), content: 'Research competitor features', createdAt: Date.now() },
                    { id: generateId(), content: 'Create user personas', createdAt: Date.now() },
                    { id: generateId(), content: 'Design system documentation', createdAt: Date.now() }
                ],
                'in-progress': [
                    { id: generateId(), content: 'Implement authentication flow', createdAt: Date.now() },
                    { id: generateId(), content: 'Build responsive navigation', createdAt: Date.now() }
                ],
                review: [
                    { id: generateId(), content: 'Unit tests for utility functions', createdAt: Date.now() }
                ],
                done: [
                    { id: generateId(), content: 'Project setup and configuration', createdAt: Date.now() },
                    { id: generateId(), content: 'Database schema design', createdAt: Date.now() }
                ]
            };
            saveState();
        }

        /**
         * Save current state to localStorage
         */
        function saveState() {
            localStorage.setItem(STORAGE_NAMESPACE, JSON.stringify(state));
        }

        /**
         * Generate unique ID for cards
         */
        function generateId() {
            return 'card-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        /**
         * Trigger confetti celebration animation
         */
        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#10b981', '#3b82f6', '#8b5cf6', '#f59e0b'],
                disableForWidth: 200,
                scalar: window.devicePixelRatio || 1
            });
        }

        // ============= DOM Rendering =============

        /**
         * Render the entire board
         */
        function renderBoard() {
            const board = document.getElementById('kanban-board');
            board.innerHTML = '';

            COLUMNS.forEach(column => {
                const columnElement = createColumnElement(column);
                board.appendChild(columnElement);
            });

            setupDragAndDrop();
        }

        /**
         * Create a column DOM element with all its cards
         */
        function createColumnElement(column) {
            const columnDiv = document.createElement('div');
            
            // Column container with drag-and-drop attributes
            columnDiv.className = `bg-slate-800 rounded-xl shadow-xl overflow-hidden flex flex-col ${column.borderColor} border-t-4`;
            columnDiv.setAttribute('data-column-id', column.id);
            columnDiv.setAttribute('data-testid', `column-${column.id}`);
            columnDiv.setAttribute('draggable', 'true');

            // Column header
            const header = document.createElement('div');
            header.className = `p-4 bg-gradient-to-r ${column.color} shadow-lg`;
            header.innerHTML = `
                <div class="flex items-center justify-between">
                    <h2 class="text-white font-bold text-lg flex items-center gap-2">
                        <span>${column.icon}</span>
                        ${column.title}
                    </h2>
                    <span class="bg-white/20 text-white text-sm font-semibold px-3 py-1 rounded-full">
                        ${state[column.id].length}
                    </span>
                </div>
            `;

            // Add card button
            const addButton = document.createElement('button');
            addButton.className = `m-3 mb-0 flex items-center justify-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg transition-all hover:shadow-md cursor-pointer`;
            addButton.setAttribute('data-testid', 'add-card');
            addButton.innerHTML = '<span>+</span> Add card';
            addButton.onclick = () => openAddModal(column.id);

            // Cards container
            const cardsContainer = document.createElement('div');
            cardsContainer.className = 'flex-1 p-3 min-h-[200px] space-y-3 scrollbar-custom overflow-y-auto max-h-[calc(100vh-280px)]';
            
            // Render cards for this column
            state[column.id].forEach(card => {
                const cardElement = createCardElement(card, column.id);
                cardsContainer.appendChild(cardElement);
            });

            columnDiv.appendChild(header);
            columnDiv.appendChild(addButton);
            columnDiv.appendChild(cardsContainer);

            return columnDiv;
        }

        /**
         * Create a card DOM element
         */
        function createCardElement(card, columnId) {
            const cardDiv = document.createElement('div');
            
            // Card styling with hover effects and transitions
            cardDiv.className = `bg-white rounded-lg p-4 shadow-md cursor-move card-transition hover:shadow-lg hover:-translate-y-1 relative group`;
            cardDiv.setAttribute('data-card-id', card.id);
            cardDiv.setAttribute('data-testid', 'card');
            cardDiv.setAttribute('draggable', 'true');

            // Card content with line breaks preserved
            cardDiv.innerHTML = `
                <div class="text-slate-800 whitespace-pre-wrap break-words leading-relaxed">
                    ${escapeHtml(card.content)}
                </div>
                
                <!-- Action buttons (visible on hover) -->
                <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button 
                        class="edit-btn p-1.5 text-slate-400 hover:text-purple-600 hover:bg-purple-100 rounded transition-colors"
                        title="Edit card">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                    </button>
                    <button 
                        class="delete-btn p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-100 rounded transition-colors"
                        data-testid="delete-card"
                        title="Delete card">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </button>
                </div>
            `;

            // Edit button click handler
            const editBtn = cardDiv.querySelector('.edit-btn');
            editBtn.onclick = (e) => {
                e.stopPropagation();
                openEditModal(card.id, columnId);
            };

            // Delete button click handler
            const deleteBtn = cardDiv.querySelector('.delete-btn');
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                openDeleteModal(card.id, columnId);
            };

            // Card click to edit (alternative to edit button)
            cardDiv.onclick = () => openEditModal(card.id, columnId);

            return cardDiv;
        }

        /**
         * Escape HTML to prevent XSS
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        // ============= Drag and Drop =============

        /**
         * Setup drag and drop event listeners
         */
        function setupDragAndDrop() {
            // Card drag start
            document.querySelectorAll('[data-card-id]').forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);
            });

            // Column drag events
            document.querySelectorAll('[data-column-id]').forEach(column => {
                column.addEventListener('dragover', handleDragOver);
                column.addEventListener('dragenter', handleDragEnter);
                column.addEventListener('dragleave', handleDragLeave);
                column.addEventListener('drop', handleDrop);
            });
        }

        /**
         * Handle drag start event
         */
        function handleDragStart(e) {
            draggingCard = this;
            dragSrcColumn = this.closest('[data-column-id]');
            
            // Find the index of the card being dragged
            const columnId = dragSrcColumn.getAttribute('data-column-id');
            const cardId = this.getAttribute('data-card-id');
            dragSrcIndex = state[columnId].findIndex(c => c.id === cardId);

            this.classList.add('dragging');
            
            // Set drag image data
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', cardId);
        }

        /**
         * Handle drag end event
         */
        function handleDragEnd(e) {
            this.classList.remove('dragging');
            
            // Remove any drag-over styling from all columns
            document.querySelectorAll('.drag-over').forEach(col => {
                col.classList.remove('drag-over');
            });

            draggingCard = null;
            dragSrcColumn = null;
            dragSrcIndex = -1;
        }

        /**
         * Handle drag over event (needed to allow dropping)
         */
        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        /**
         * Handle drag enter event (visual feedback)
         */
        function handleDragEnter(e) {
            e.preventDefault();
            if (this !== dragSrcColumn) {
                this.classList.add('drag-over');
            }
        }

        /**
         * Handle drag leave event (remove visual feedback)
         */
        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }

        /**
         * Handle drop event - move card between columns
         */
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');

            if (!draggingCard) return;

            const targetColumnId = this.getAttribute('data-column-id');
            const cardId = draggingCard.getAttribute('data-card-id');

            // Find and remove card from source column
            let card = null;
            const srcIndex = state[dragSrcColumn.getAttribute('data-column-id')].findIndex(c => c.id === cardId);
            if (srcIndex > -1) {
                card = state[dragSrcColumn.getAttribute('data-column-id')].splice(srcIndex, 0)[0];
            }

            if (card) {
                // Add card to target column
                state[targetColumnId].push(card);
                
                // Check if moved to "Done" column - trigger celebration!
                const wasNotInDone = dragSrcColumn.getAttribute('data-column-id') !== 'done';
                const nowInDone = targetColumnId === 'done';
                
                if (wasNotInDone && nowInDone) {
                    celebrate();
                }

                saveState();
                renderBoard();
            }
        }

        // ============= Modal Handlers =============

        /**
         * Open modal for adding a new card
         */
        function openAddModal(columnId) {
            targetColumnForAdd = columnId;
            const modal = document.getElementById('add-card-modal');
            const textarea = document.getElementById('new-card-textarea');
            
            textarea.value = '';
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            textarea.focus();
            
            // Handle Enter key to submit
            textarea.onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    submitNewCard();
                }
            };
        }

        /**
         * Submit new card from modal
         */
        function submitNewCard() {
            const textarea = document.getElementById('new-card-textarea');
            const content = textarea.value.trim();

            if (content) {
                state[targetColumnForAdd].push({
                    id: generateId(),
                    content: content,
                    createdAt: Date.now()
                });
                saveState();
                renderBoard();
            }

            closeAddModal();
        }

        /**
         * Close add card modal
         */
        function closeAddModal() {
            const modal = document.getElementById('add-card-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            targetColumnForAdd = null;
        }

        /**
         * Open modal for editing a card
         */
        function openEditModal(cardId, columnId) {
            cardBeingEdited = { id: cardId, columnId: columnId };
            
            // Find the card content
            const card = state[columnId].find(c => c.id === cardId);
            
            const modal = document.getElementById('edit-card-modal');
            const textarea = document.getElementById('edit-card-textarea');

            if (card) {
                textarea.value = card.content;
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            textarea.focus();

            // Handle Enter key to submit
            textarea.onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    submitEditCard();
                }
            };
        }

        /**
         * Submit edited card
         */
        function submitEditCard() {
            const textarea = document.getElementById('edit-card-textarea');
            const content = textarea.value.trim();

            if (cardBeingEdited && content) {
                const cardIndex = state[cardBeingEdited.columnId].findIndex(c => c.id === cardBeingEdited.id);
                if (cardIndex > -1) {
                    state[cardBeingEdited.columnId][cardIndex].content = content;
                    saveState();
                    renderBoard();
                }
            }

            closeEditModal();
        }

        /**
         * Close edit card modal
         */
        function closeEditModal() {
            const modal = document.getElementById('edit-card-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            cardBeingEdited = null;
        }

        /**
         * Open delete confirmation modal
         */
        function openDeleteModal(cardId, columnId) {
            cardBeingDeleted = { id: cardId, columnId: columnId };
            
            const modal = document.getElementById('delete-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        /**
         * Confirm and execute card deletion
         */
        function confirmDeleteCard() {
            if (cardBeingDeleted) {
                const cardIndex = state[cardBeingDeleted.columnId].findIndex(c => c.id === cardBeingDeleted.id);
                if (cardIndex > -1) {
                    state[cardBeingDeleted.columnId].splice(cardIndex, 1);
                    saveState();
                    renderBoard();
                }
            }

            closeDeleteModal();
        }

        /**
         * Close delete modal
         */
        function closeDeleteModal() {
            const modal = document.getElementById('delete-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            cardBeingDeleted = null;
        }

        // ============= Event Listeners for Modals =============

        // Add card modal buttons
        document.getElementById('submit-add-btn').onclick = submitNewCard;
        document.getElementById('cancel-add-btn').onclick = closeAddModal;

        // Edit card modal buttons
        document.getElementById('submit-edit-btn').onclick = submitEditCard;
        document.getElementById('cancel-edit-btn').onclick = closeEditModal;

        // Delete modal buttons
        document.getElementById('confirm-delete-btn').onclick = confirmDeleteCard;
        document.getElementById('cancel-delete-btn').onclick = closeDeleteModal;

        // Close modals on background click
        [document.getElementById('add-card-modal'), 
         document.getElementById('edit-card-modal'),
         document.getElementById('delete-modal')].forEach(modal => {
            modal.onclick = (e) => {
                if (e.target === modal) {
                    // Close the appropriate modal based on which one is open
                    if (modal.id === 'add-card-modal') closeAddModal();
                    else if (modal.id === 'edit-card-modal') closeEditModal();
                    else closeDeleteModal();
                }
            };
        });

        // ============= Initialization =============

        // Load state and render board on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            renderBoard();
            
            console.log('Kanban Board initialized with', 
                Object.values(state).reduce((sum, col) => sum + col.length, 0), 'cards');
        });

    </script>
</body>
</html>
