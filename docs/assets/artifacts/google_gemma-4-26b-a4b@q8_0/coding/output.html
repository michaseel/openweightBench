<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Kanban Board</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti for the "Done" celebration -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Custom transitions for smooth UI feel */
        .card-transition {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-transition:active {
            transform: scale(0.95);
        }
        /* Drag and drop visual cues */
        .column-drag-over {
            background-color: rgba(59, 130, 246, 0.1);
            outline: 2px dashed #3b82f6;
        }
        /* Smooth fade for modal */
        #modal-overlay {
            transition: opacity 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <!-- Main Header -->
    <header class="py-8 px-6 max-w-7xl mx-auto">
        <h1 class="text-4xl font-extrabold tracking-tight text-slate-800">
            Project <span class="text-blue-600">Kanban</span>
        </h1>
        <p class="text-slate-500 mt-2">Organize your workflow with ease.</p>
    </header>

    <!-- Kanban Board Container -->
    <main class="max-w-7xl mx-auto px-6 pb-12">
        <div id="board" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Columns will be rendered here by JavaScript -->
        </div>
    </main>

    <!-- Delete Confirmation Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center opacity-0">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm mx-4 transform transition-all scale-95">
            <h3 class="text-xl font-bold text-slate-800 mb-2">Delete Card?</h3>
            <p class="text-slate-600 mb-6">This action cannot be undone. Are you sure you want to remove this task?</p>
            <div class="flex justify-end gap-3">
                <button id="cancel-delete" class="px-4 py-2 text-slate-500 hover:text-slate-700 font-medium transition-colors">Cancel</button>
                <button id="confirm-delete" data-testid="confirm-delete" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-semibold transition-colors">Delete</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * CONFIGURATION & STATE
         */
        const STORAGE_KEY = 'my_kanban_v1_state';
        const COLUMNS = [
            { id: 'backlog', title: 'Backlog', color: 'bg-slate-200' },
            { id: 'in-progress', title: 'In Progress', color: 'bg-blue-500' },
            { id: 'review', title: 'Review', color: 'bg-purple-500' },
            { id: 'done', title: 'Done', color: 'bg-emerald-500' }
        ];

        let state = {
            cards: []
        };

        // Track which card is pending deletion in the modal
        let cardToDeleteId = null;

        /**
         * INITIALIZATION
         */
        function init() {
            loadState();
            if (state.cards.length === 0) {
                createDummyData();
            }
            renderBoard();
            setupEventListeners();
        }

        function createDummyData() {
            state.cards = [
                { id: '1', content: 'Research design patterns', columnId: 'backlog' },
                { id: '2', content: 'Implement drag and drop', columnId: 'in-progress' },
                { id: '3', content: 'Write unit tests', columnId: 'review' },
                { id: '4', content: 'Project setup complete', columnId: 'done' }
            ];
            saveState();
        }

        /**
         * STATE MANAGEMENT
         */
        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    state = JSON.parse(saved);
                } catch (e) {
                    console.error("Failed to parse state", e);
                }
            }
        }

        /**
         * CORE RENDERING LOGIC
         */
        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = ''; // Clear current view

            COLUMNS.forEach(col => {
                // Create Column Element
                const colEl = document.createElement('div');
                colEl.className = 'flex flex-col min-h-[500px] bg-slate-100/50 rounded-2xl p-4 border border-slate-200';
                colEl.setAttribute('data-testid', `column-${col.id}`);
                colEl.dataset.columnId = col.id;

                // Column Header
                const header = document.createElement('div');
                header.className = 'flex items-center justify-between mb-4 px-2';
                header.innerHTML = `
                    <h2 class="font-bold text-slate-700 flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full ${col.color}"></span>
                        ${col.title}
                    </h2>
                    <span class="text-xs font-bold bg-slate-200 text-slate-600 px-2 py-1 rounded-full">
                        ${state.cards.filter(c => c.columnId === col.id).length}
                    </span>
                `;

                // Add Card Button Container
                const addBtnContainer = document.createElement('div');
                addBtnContainer.className = 'mb-4';
                
                const addBtn = document.createElement('button');
                addBtn.setAttribute('data-testid', 'add-card');
                addBtn.className = 'w-full py-2 px-4 text-sm font-medium text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg border-2 border-dashed border-slate-300 transition-all flex items-center justify-center gap-1';
                addBtn.innerHTML = `<span>+</span> Add Card`;
                addBtn.onclick = () => showAddInput(col.id, addBtnContainer);

                addBtnContainer.appendChild(addBtn);
                colEl.appendChild(header);
                colEl.appendChild(addBtnContainer);

                // Cards Container
                const cardsList = document.createElement('div');
                cardsList.className = 'flex-1 space-y-3';
                
                // Drag and drop listeners for the column
                cardsList.addEventListener('dragover', handleDragOver);
                cardsList.addEventListener('dragleave', handleDragLeave);
                cardsList.addEventListener('drop', handleDrop);

                // Filter cards belonging to this column
                const colCards = state.cards.filter(c => c.columnId === col.id);
                colCards.forEach(card => {
                    cardsList.appendChild(createCardElement(card));
                });

                colEl.appendChild(cardsList);
                board.appendChild(colEl);
            });
        }

        function createCardElement(card) {
            const cardEl = document.createElement('div');
            cardEl.className = 'group bg-white p-4 rounded-xl shadow-sm border border-slate-200 cursor-grab active:cursor-grabbing card-transition hover:shadow-md relative';
            cardEl.setAttribute('draggable', 'true');
            cardEl.setAttribute('data-testid', 'card');
            cardEl.dataset.id = card.id;

            // Content Area (Editable in place)
            const content = document.createElement('div');
            content.className = 'text-slate-700 text-sm leading-relaxed outline-none focus:ring-2 focus:ring-blue-400 rounded px-1 transition-all';
            content.contentEditable = true;
            content.innerText = card.content;
            
            // Update content on blur or Enter (to save edits)
            content.addEventListener('blur', () => updateCardContent(card.id, content.innerText));
            content.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    content.blur();
                }
            });

            // Delete Button
            const delBtn = document.createElement('button');
            delBtn.setAttribute('data-testid', 'delete-card');
            delBtn.className = 'absolute top-2 right-2 opacity-0 group-hover:opacity-100 p-1 text-slate-400 hover:text-red-500 transition-all';
            delBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            `;
            delBtn.onclick = (e) => {
                e.stopPropagation();
                openDeleteModal(card.id);
            };

            // Drag events
            cardEl.addEventListener('dragstart', handleDragStart);

            cardEl.appendChild(content);
            cardEl.appendChild(delBtn);
            return cardEl;
        }

        /**
         * ACTIONS & EVENT HANDLERS
         */

        function showAddInput(columnId, container) {
            const input = document.createElement('input');
            input.setAttribute('data-testid', 'card-input');
            input.className = 'w-full py-2 px-3 text-sm bg-white border-2 border-blue-400 rounded-lg outline-none shadow-inner';
            input.placeholder = 'What needs to be done?';
            
            container.innerHTML = ''; // Remove the "Add Card" button
            container.appendChild(input);
            input.focus();

            const saveNewCard = () => {
                const val = input.value.trim();
                if (val) {
                    const newCard = {
                        id: Date.now().toString(),
                        content: val,
                        columnId: columnId
                    };
                    state.cards.push(newCard);
                    saveState();
                    renderBoard();
                } else {
                    // If empty, revert to button
                    renderBoard(); 
                }
            };

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') saveNewCard();
                if (e.key === 'Escape') renderBoard();
            });

            // Handle clicking away
            input.addEventListener('blur', () => {
                // Small delay to allow Enter key logic to complete if applicable
                setTimeout(() => {
                    if (container.contains(input)) renderBoard();
                }, 150);
            });
        }

        function updateCardContent(id, newText) {
            const card = state.cards.find(c => c.id === id);
            if (card && card.content !== newText) {
                card.content = newText;
                saveState();
            }
        }

        // DRAG AND DROP LOGIC
        function handleDragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.dataset.id);
            e.target.style.opacity = '0.5';
        }

        function handleDragOver(e) {
            e.preventDefault(); // Necessary to allow drop
            const col = e.currentTarget.closest('[data-testid^="column-"]');
            if (col) col.classList.add('column-drag-over');
        }

        function handleDragLeave(e) {
            const col = e.currentTarget.closest('[data-testid^="column-"]');
            if (col) col.classList.remove('column-drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            const colEl = e.currentTarget.closest('[data-testid^="column-"]');
            if (!colEl) return;

            colEl.classList.remove('column-drag-over');
            const cardId = e.dataTransfer.getData('text/plain');
            const targetColumnId = colEl.getAttribute('data-testid').replace('column-', '');

            // Find the card in state
            const cardIndex = state.cards.findIndex(c => c.id === cardId);
            if (cardIndex > -1) {
                const oldColumnId = state.cards[cardIndex].columnId;
                state.cards[cardIndex].columnId = targetColumnId;

                // If moved to Done, trigger confetti
                if (targetColumnId === 'done' && oldColumnId !== 'done') {
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#10b981', '#3b82f6', '#8b5cf6']
                    });
                }

                saveState();
                renderBoard();
            }
        }

        // MODAL LOGIC
        function openDeleteModal(id) {
            cardToDeleteId = id;
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.add('opacity-100');
                overlay.querySelector('div').classList.replace('scale-95', 'scale-100');
            }, 10);
        }

        function closeDeleteModal() {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.remove('opacity-100');
            overlay.querySelector('div').classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                overlay.classList.add('hidden');
                cardToDeleteId = null;
            }, 200);
        }

        function confirmDelete() {
            if (cardToDeleteId) {
                state.cards = state.cards.filter(c => c.id !== cardToDeleteId);
                saveState();
                renderBoard();
                closeDeleteModal();
            }
        }

        /**
         * GLOBAL EVENT LISTENERS
         */
        function setupEventListeners() {
            // Modal control
            document.getElementById('cancel-delete').onclick = closeDeleteModal;
            document.getElementById('confirm-delete').onclick = confirmDelete;

            // Close modal on overlay click
            document.getElementById('modal-overlay').onclick = (e) => {
                if (e.target.id === 'modal-overlay') closeDeleteModal();
            };
        }

        // Boot the app
        init();

    </script>
</body>
</html>
