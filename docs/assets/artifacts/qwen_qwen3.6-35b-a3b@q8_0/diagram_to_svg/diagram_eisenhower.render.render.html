<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{padding:24px;display:inline-block;background:#fff}
  /* Force a concrete render box: many model-emitted SVGs only set viewBox.
     Without a width here, an inline-block parent collapses the SVG to its
     intrinsic ~300x150 (or smaller) and the screenshot becomes a tiny
     blank tile. Fixed width + auto height uses viewBox aspect-ratio. */
  .wrap svg{display:block;width:1200px;height:auto;max-width:none}
</style></head><body><div class="wrap"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <style>
      .title { font-family: sans-serif; font-size: 32px; font-weight: bold; text-anchor: middle; fill: #333; }
      .axis-label { font-family: sans-serif; font-size: 24px; fill: #333; }
      .quadrant-title { font-family: sans-serif; font-size: 20px; font-weight: bold; fill: #0055A4; text-decoration: underline; }
      .list-item { font-family: sans-serif; font-size: 18px; fill: #333; }
      .side-note { font-family: sans-serif; font-size: 16px; fill: #333; }
      .icon { fill: none; stroke: #333; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #333; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- Title -->
  <text x="500" y="60" class="title">Eisenhower - Matrix - Marketing</text>
  <line x1="250" y1="70" x2="750" y2="70" stroke="#333" stroke-width="2" />

  <!-- Main Matrix Box -->
  <rect x="200" y="100" width="600" height="500" fill="none" stroke="#333" stroke-width="3" />
  
  <!-- Grid Lines -->
  <line x1="500" y1="100" x2="500" y2="600" stroke="#333" stroke-width="3" />
  <line x1="200" y1="350" x2="800" y2="350" stroke="#333" stroke-width="3" />

  <!-- Axes -->
  <!-- Y Axis -->
  <line x1="150" y1="600" x2="150" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="110" y="350" class="axis-label" transform="rotate(-90 110 350)" text-anchor="middle">Wichtigkeit</text>
  <text x="110" y="120" class="axis-label" text-anchor="end">hoch</text>
  <text x="110" y="610" class="axis-label" text-anchor="end">niedrig</text>

  <!-- X Axis -->
  <line x1="200" y1="650" x2="800" y2="650" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="500" y="690" class="axis-label" text-anchor="middle">Dringlichkeit</text>
  <text x="220" y="680" class="axis-label" text-anchor="start">niedrig</text>
  <text x="780" y="680" class="axis-label" text-anchor="end">hoch</text>

  <!-- Quadrant 1: Top Left (Wichtig + Nicht dringend) -->
  <g id="quadrant-tl">
    <text x="220" y="140" class="quadrant-title">Wichtig + Nicht dringend</text>
    <text x="220" y="180" class="list-item">• Content-Strategie</text>
    <text x="220" y="210" class="list-item">• Brand schärfen</text>
    <text x="220" y="240" class="list-item">• SEO aufräumen</text>
    <text x="220" y="270" class="list-item">• Zielgruppen verstehen</text>
    
    <!-- Target Icon -->
    <g transform="translate(650, 450)">
      <circle cx="0" cy="0" r="30" class="icon" />
      <circle cx="0" cy="0" r="15" class="icon" />
      <circle cx="0" cy="0" r="3" class="icon-fill" />
      <line x1="20" y1="-20" x2="40" y2="-40" class="icon" />
      <line x1="35" y1="-40" x2="45" y2="-35" class="icon" />
      <line x1="40" y1="-40" x2="35" y2="-30" class="icon" />
    </g>
  </g>

  <!-- Quadrant 2: Top Right (Wichtig + Dringend) -->
  <g id="quadrant-tr">
    <text x="520" y="140" class="quadrant-title">Wichtig + Dringend</text>
    <text x="520" y="180" class="list-item">• Kampagne retten</text>
    <text x="520" y="210" class="list-item">• Shitstorm beantworten</text>
    <text x="520" y="240" class="list-item">• Newsletter mit</text>
    <text x="540" y="265" class="list-item">falschem Link fixen</text>
    <text x="520" y="295" class="list-item">• Chef will bis 14 Uhr</text>
    <text x="540" y="320" class="list-item">„viral gehen“</text>

    <!-- Viral Starburst -->
    <g transform="translate(750, 200)">
      <path d="M0,-20 L5,-5 L20,-10 L10,5 L20,20 L5,15 L0,30 L-5,15 L-20,20 L-10,5 L-20,-10 L-5,-5 Z" class="icon" />
      <text x="0" y="5" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">VIRAL??</text>
    </g>

    <!-- Megaphone Icon -->
    <g transform="translate(700, 450)">
      <path d="M0,0 L30,-15 L30,15 Z" class="icon" />
      <path d="M30,-15 L40,-25 L40,25 L30,15" class="icon" />
      <line x1="0" y1="0" x2="-10" y2="10" class="icon" />
      <line x1="-10" y1="10" x2="-10" y2="20" class="icon" />
      <line x1="-15" y1="15" x2="-5" y2="15" class="icon" />
      <path d="M45,-10 Q55,-10 55,0 Q55,10 45,10" class="icon" />
      <path d="M50,-20 Q65,-20 65,0 Q65,20 50,20" class="icon" />
    </g>
  </g>

  <!-- Quadrant 3: Bottom Left (Nicht wichtig + Nicht dringend) -->
  <g id="quadrant-bl">
    <text x="220" y="390" class="quadrant-title">Nicht wichtig + Nicht dringend</text>
    <text x="220" y="430" class="list-item">• Merch-Ideen mit Glitzer</text>
    <text x="220" y="460" class="list-item">• Buzzword-Bingo</text>
    <text x="220" y="490" class="list-item">• TikTok-Tanz mit dem</text>
    <text x="240" y="515" class="list-item">Maskottchen</text>
    <text x="220" y="545" class="list-item">• Hashtag brainstormen</text>
    <text x="240" y="570" class="list-item">#innovation #synergy #wow</text>

    <!-- Unicorn Icon -->
    <g transform="translate(650, 550)">
      <path d="M-20,20 Q-30,0 -10,-10 Q0,-20 10,-10 L15,0 L25,5 L20,15 Q10,25 -20,20 Z" class="icon" />
      <path d="M-5,-10 L0,-30 L5,-10" class="icon" />
      <circle cx="0" cy="-5" r="2" class="icon-fill" />
      <path d="M10,0 Q20,-10 30,0" class="icon" />
      <path d="M15,5 Q25,-5 35,5" class="icon" />
      <!-- Sparkles -->
      <path d="M-30,-10 L-25,-15 L-20,-10 L-25,-5 Z" class="icon-fill" />
      <path d="M30,-20 L35,-25 L40,-20 L35,-15 Z" class="icon-fill" />
    </g>
  </g>

  <!-- Quadrant 4: Bottom Right (Nicht wichtig + Dringend) -->
  <g id="quadrant-br">
    <text x="520" y="390" class="quadrant-title">Nicht wichtig + Dringend</text>
    <text x="520" y="430" class="list-item">• Noch ein Last-Minute-Meeting</text>
    <text x="520" y="460" class="list-item">• Kann das Logo größer?</text>
    <text x="520" y="490" class="list-item">• LinkedIn-Post für</text>
    <text x="540" y="515" class="list-item">„Welttag der Büroklammer“</text>
    <text x="520" y="545" class="list-item">• Folie 27 schöner machen</text>

    <!-- Exclamation Marks -->
    <g transform="translate(750, 550)">
      <rect x="0" y="0" width="10" height="30" rx="5" class="icon-fill" />
      <circle cx="5" cy="45" r="5" class="icon-fill" />
      
      <rect x="20" y="-10" width="10" height="30" rx="5" class="icon-fill" />
      <circle cx="25" cy="35" r="5" class="icon-fill" />
      
      <rect x="40" y="-20" width="10" height="30" rx="5" class="icon-fill" />
      <circle cx="45" cy="25" r="5" class="icon-fill" />
    </g>
  </g>

  <!-- Side Notes -->
  <!-- Left Side Note -->
  <g transform="translate(50, 500)">
    <!-- Heart Icon -->
    <path d="M10,5 Q10,-5 20,-5 Q30,-5 30,5 Q30,15 20,25 Q10,15 10,5 Z" class="icon" />
    <text x="40" y="0" class="side-note" text-anchor="start">Erledigen,</text>
    <text x="40" y="20" class="side-note" text-anchor="start">wenn das</text>
    <text x="40" y="40" class="side-note" text-anchor="start">Internet</text>
    <text x="40" y="60" class="side-note" text-anchor="start">wieder da</text>
    <text x="40" y="80" class="side-note" text-anchor="start">ist. :)</text>
  </g>

  <!-- Right Side Note -->
  <g transform="translate(850, 100)">
    <!-- Coffee Cup Icon -->
    <path d="M0,0 L30,0 L25,30 L5,30 Z" class="icon" />
    <path d="M30,5 Q45,5 45,15 Q45,25 30,25" class="icon" />
    <path d="M5,-10 Q10,-20 5,-30" class="icon" />
    <path d="M15,-10 Q20,-20 15,-30" class="icon" />
    
    <text x="0" y="50" class="side-note" text-anchor="start">Kaffee</text>
    <text x="0" y="70" class="side-note" text-anchor="start">zählt nicht.</text>
    <text x="0" y="90" class="side-note" text-anchor="start">Aber hilft.</text>
    <text x="0" y="110" class="side-note" text-anchor="start">:)</text>
  </g>

</svg></div></body></html>
