<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#fff;font-family:system-ui,-apple-system,sans-serif}
  .wrap{padding:24px;display:inline-block;background:#fff}
  /* Force a concrete render box: many model-emitted SVGs only set viewBox.
     Without a width here, an inline-block parent collapses the SVG to its
     intrinsic ~300x150 (or smaller) and the screenshot becomes a tiny
     blank tile. Fixed width + auto height uses viewBox aspect-ratio. */
  .wrap svg{display:block;width:1200px;height:auto;max-width:none}
</style></head><body><div class="wrap"><svg viewBox="0 0 1000 850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow Marker -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="7" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#000000" />
    </marker>
    
    <!-- Dashed Arrow Marker -->
    <marker id="arrow-dash" markerWidth="10" markerHeight="10" refX="9" refY="7" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#000000" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="50" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="bold">SSO - Ablaufdiagramm</text>
  <line x1="50" y1="72" x2="950" y2="72" stroke="#000000" stroke-width="1"/>

  <!-- Left Column Group -->
  <g id="left-column">
    <!-- User Actor -->
    <g id="user-actor" transform="translate(80, 120)">
      <circle cx="30" cy="15" r="15" fill="#000000"/>
      <line x1="30" y1="30" x2="30" y2="50" stroke="#000000" stroke-width="2"/>
      <line x1="25" y1="40" x2="35" y2="40" stroke="#000000" stroke-width="2"/>
      <line x1="30" y1="50" x2="30" y2="60" stroke="#000000" stroke-width="2"/>
      <line x1="30" y1="60" x2="45" y2="60" stroke="#000000" stroke-width="2"/>
      <line x1="30" y1="60" x2="30" y2="75" stroke="#000000" stroke-width="2"/>
      <text x="-15" y="95" font-family="Arial, sans-serif" font-size="16">Benutzer</text>
    </g>

    <!-- App / Service Provider Box -->
    <rect id="app-sp-box" x="250" y="140" width="200" height="80" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <text id="app-sp-text-1" x="350" y="175" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">App /</text>
    <text id="app-sp-text-2" x="350" y="195" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Service Provider</text>
  </g>

  <!-- Right Column Group -->
  <g id="right-column">
    <!-- Identity Provider Box -->
    <rect id="idp-box" x="580" y="120" width="240" height="90" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <text id="idp-text-1" x="700" y="155" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Identity Provider</text>
    <text id="idp-text-2" x="700" y="185" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">(IdP)</text>

    <!-- Login Page Box -->
    <rect id="login-box" x="580" y="320" width="240" height="90" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <text id="login-text" x="700" y="365" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">Login-Seite</text>

    <!-- Decision Diamond -->
    <polygon id="decision-diamond" points="720,480 810,520 720,560 630,520" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <text id="decision-text-1" x="720" y="505" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Anmeldedaten</text>
    <text id="decision-text-2" x="720" y="530" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">korrekt?</text>
  </g>

  <!-- Bottom Left Group -->
  <g id="bottom-left">
    <!-- Access Granted Box -->
    <rect id="access-granted-box" x="250" y="680" width="150" height="90" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <text id="access-granted-text-1" x="325" y="720" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Zugriff</text>
    <text id="access-granted-text-2" x="325" y="740" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">gewährt</text>
  </g>

  <!-- Bottom Right Group -->
  <g id="bottom-right">
    <!-- Token / Assertion Text -->
    <text id="token-text-1" x="720" y="640" font-family="Arial, sans-serif" font-size="18">5. Token / Assertion</text>
    <text id="token-text-2" x="720" y="665" font-family="Arial, sans-serif" font-size="18">(SSO-Response)</text>
  </g>

  <!-- Connecting Lines & Labels -->
  
  <!-- Line 1: User -> App/SP -->
  <line id="line-1" x1="200" y1="165" x2="350" y2="180" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text id="label-1" x="275" y="160" font-family="Arial, sans-serif" font-size="14">1. Zugang zu App</text>

  <!-- Line 2: App/SP -> IdP -->
  <line id="line-2" x1="500" y1="180" x2="640" y2="155" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text id="label-2" x="570" y="165" font-family="Arial, sans-serif" font-size="14">2. Weiterleitung</text>
  <text id="label-2b" x="570" y="185" font-family="Arial, sans-serif" font-size="14">zur Login-Seite</text>

  <!-- Line 3: IdP -> Login Page -->
  <line id="line-3" x1="700" y1="215" x2="700" y2="340" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text id="label-3" x="720" y="250" font-family="Arial, sans-serif" font-size="14">3. Login-Seite</text>
  <text id="label-3b" x="720" y="265" font-family="Arial, sans-serif" font-size="14">anzeigen</text>

  <!-- Line 4: Login Page -> Decision Diamond -->
  <line id="line-4" x1="700" y1="415" x2="720" y2="480" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text id="label-4" x="720" y="450" font-family="Arial, sans-serif" font-size="14">4. Authentifizierung</text>

  <!-- Line 5: Decision Diamond -> Token Text (Yes Path) -->
  <line id="line-5" x1="720" y1="560" x2="720" y2="640" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text id="label-5" x="720" y="610" font-family="Arial, sans-serif" font-size="14">Ja</text>

  <!-- Line 6: Decision Diamond -> App/SP (No Path) -->
  <polyline id="line-6" points="810,520 720,480 350,180" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-dash)"/>
  <text id="label-6" x="580" y="420" font-family="Arial, sans-serif" font-size="14">6. Redirect zurück</text>
  <text id="label-6b" x="580" y="435" font-family="Arial, sans-serif" font-size="14">zur App mit Token</text>
  <text id="label-6c" x="850" y="490" font-family="Arial, sans-serif" font-size="14">Nein</text>

  <!-- Line 7: Access Granted -> App/SP -->
  <line id="line-7" x1="325" y1="770" x2="350" y2="680" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text id="label-7" x="325" y="640" font-family="Arial, sans-serif" font-size="14">7. Zugriff</text>
  <text id="label-7b" x="325" y="655" font-family="Arial, sans-serif" font-size="14">auf Ressourcen</text>

  <!-- Side Note: User enters data -->
  <line id="side-note-line" x1="850" y1="320" x2="940" y2="350" stroke="#000000" stroke-width="1.5"/>
  <text id="side-note-text-1" x="860" y="345" font-family="Arial, sans-serif" font-size="14">Benutzer gibt</text>
  <text id="side-note-text-2" x="860" y="365" font-family="Arial, sans-serif" font-size="14">Anmeldedaten ein</text>

</svg></div></body></html>
