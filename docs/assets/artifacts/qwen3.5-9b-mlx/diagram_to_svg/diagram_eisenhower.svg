<svg viewBox="0 0 1200 850" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Whiteboard -->
  <rect x="5" y="5" width="1190" height="840" fill="#f8f9fa"/>
  
  <!-- Whiteboard Frame -->
  <rect x="60" y="40" width="1080" height="770" fill="#ffffff" stroke="#555" stroke-width="2"/>

  <!-- Title -->
  <text x="600" y="95" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#000">Eisenhower - Matrix - Marketing</text>

  <!-- Y-Axis (Wichtigkeit) -->
  <line x1="250" y1="160" x2="250" y2="640" stroke="#000" stroke-width="2"/>
  <text x="180" y="400" font-family="Arial, sans-serif" font-size="16" transform="rotate(-90 180 400)" text-anchor="middle">Wichtigkeit</text>
  
  <!-- X-Axis (Dringlichkeit) -->
  <line x1="250" y1="640" x2="950" y2="640" stroke="#000" stroke-width="2"/>
  <polygon points="950,640 935,650 965,650" fill="#000"/>
  <text x="600" y="680" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Dringlichkeit</text>

  <!-- Axis Labels -->
  <text x="240" y="150" font-family="Arial, sans-serif" font-size="14">hoch</text>
  <text x="240" y="650" font-family="Arial, sans-serif" font-size="14">niedrig</text>
  <text x="250" y="670" font-family="Arial, sans-serif" font-size="14">niedrig</text>
  <text x="950" y="670" font-family="Arial, sans-serif" font-size="14">hoch</text>

  <!-- Quadrant Grid Lines -->
  <line x1="600" y1="160" x2="600" y2="640" stroke="#000" stroke-width="1"/>
  <line x1="250" y1="420" x2="950" y2="420" stroke="#000" stroke-width="1"/>

  <!-- Quadrant TL: Wichtig + Nicht dringend -->
  <g id="quadrant-tl">
    <rect x="260" y="170" width="340" height="250" fill="#fff" stroke="#000" stroke-width="1"/>
    <text x="275" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Wichtig + Nicht dringend</text>
    <line x1="275" y1="210" x2="600" y2="210" stroke="#000"/>
    
    <text x="300" y="240" font-family="Arial, sans-serif" font-size="14">• Content-Strategie</text>
    <line x1="300" y1="265" x2="600" y2="265" stroke="#000"/>
    <text x="300" y="295" font-family="Arial, sans-serif" font-size="14">• Brand schärfen</text>
    <line x1="300" y1="325" x2="600" y2="325" stroke="#000"/>
    <text x="300" y="355" font-family="Arial, sans-serif" font-size="14">• SEO aufräumen</text>
    <line x1="300" y1="385" x2="600" y2="385" stroke="#000"/>
    <text x="300" y="415" font-family="Arial, sans-serif" font-size="14">• Zielgruppen verstehen</text>
    
    <!-- Target Icon -->
    <circle cx="500" cy="430" r="15" fill="#000"/>
    <circle cx="500" cy="430" r="8" fill="#fff"/>
    <circle cx="500" cy="430" r="8" fill="#000"/>
    <line x1="492" y1="438" x2="508" y2="438" stroke="#000"/>
    <line x1="500" y1="438" x2="500" y2="420" stroke="#000"/>
    <line x1="500" y1="438" x2="500" y2="456" stroke="#000"/>
  </g>

  <!-- Quadrant TR: Wichtig + Dringend -->
  <g id="quadrant-tr">
    <rect x="610" y="170" width="340" height="250" fill="#fff" stroke="#000" stroke-width="1"/>
    <text x="625" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Wichtig + Dringend</text>
    <line x1="625" y1="210" x2="950" y2="210" stroke="#000"/>
    
    <text x="650" y="240" font-family="Arial, sans-serif" font-size="14">• Kampagne retten</text>
    <line x1="650" y1="265" x2="950" y2="265" stroke="#000"/>
    <text x="650" y="295" font-family="Arial, sans-serif" font-size="14">• Shitstorm beantworten</text>
    <line x1="650" y1="325" x2="950" y2="325" stroke="#000"/>
    <text x="650" y="355" font-family="Arial, sans-serif" font-size="14">• Newsletter mit</text>
    <line x1="650" y1="375" x2="950" y2="375" stroke="#000"/>
    <text x="650" y="395" font-family="Arial, sans-serif" font-size="14">falschem Link fixen</text>
    <line x1="650" y1="425" x2="950" y2="425" stroke="#000"/>
    <text x="650" y="455" font-family="Arial, sans-serif" font-size="14">• Chef will bis 14 Uhr</text>
    <line x1="650" y1="475" x2="950" y2="475" stroke="#000"/>
    <text x="650" y="495" font-family="Arial, sans-serif" font-size="14">„viral gehen"</text>
    
    <!-- Viral Starburst -->
    <path d="M 850 260 L 840 270 L 850 280 L 860 270 Z" fill="#000"/>
    <text x="850" y="265" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">VIRAL??</text>
    
    <!-- Megaphone -->
    <path d="M 850 420 L 910 430 L 910 450 L 870 460 L 830 450 Z" fill="#000"/>
    <line x1="860" y1="435" x2="900" y2="445" stroke="#000"/>
  </g>

  <!-- Quadrant BL: Nicht wichtig + Nicht dringend -->
  <g id="quadrant-bl">
    <rect x="260" y="430" width="340" height="210" fill="#fff" stroke="#000" stroke-width="1"/>
    <text x="275" y="460" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Nicht wichtig + Nicht dringend</text>
    <line x1="275" y1="470" x2="600" y2="470" stroke="#000"/>
    
    <text x="300" y="500" font-family="Arial, sans-serif" font-size="14">• Merch-Ideen mit Glitzer</text>
    <line x1="300" y1="525" x2="600" y2="525" stroke="#000"/>
    <text x="300" y="555" font-family="Arial, sans-serif" font-size="14">• Buzzword-Bingo</text>
    <line x1="300" y1="585" x2="600" y2="585" stroke="#000"/>
    <text x="300" y="615" font-family="Arial, sans-serif" font-size="14">• TikTok-Tanz mit dem</text>
    <line x1="300" y1="635" x2="600" y2="635" stroke="#000"/>
    <text x="300" y="655" font-family="Arial, sans-serif" font-size="14">Maskottchen</text>
    <line x1="300" y1="685" x2="600" y2="685" stroke="#000"/>
    <text x="300" y="715" font-family="Arial, sans-serif" font-size="14">• Hashtag brainstormen</text>
    <line x1="300" y1="735" x2="600" y2="735" stroke="#000"/>
    <text x="300" y="755" font-family="Arial, sans-serif" font-size="14">#innovation #synergy #wow</text>
    
    <!-- Unicorn Icon -->
    <path d="M 450 620 Q 480 610 500 630 L 490 650 Q 470 660 450 630 Z" fill="#000"/>
    <circle cx="450" cy="630" r="10" fill="#000"/>
  </g>

  <!-- Quadrant BR: Nicht wichtig + Dringend -->
  <g id="quadrant-br">
    <rect x="610" y="430" width="340" height="210" fill="#fff" stroke="#000" stroke-width="1"/>
    <text x="625" y="460" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Nicht wichtig + Dringend</text>
    <line x1="625" y1="470" x2="950" y2="470" stroke="#000"/>
    
    <text x="650" y="500" font-family="Arial, sans-serif" font-size="14">• Noch ein Last-Minute-Meeting</text>
    <line x1="650" y1="525" x2="950" y2="525" stroke="#000"/>
    <text x="650" y="555" font-family="Arial, sans-serif" font-size="14">• Kann das Logo größer?</text>
    <line x1="650" y1="585" x2="950" y2="585" stroke="#000"/>
    <text x="650" y="615" font-family="Arial, sans-serif" font-size="14">• LinkedIn-Post für</text>
    <line x1="650" y1="635" x2="950" y2="635" stroke="#000"/>
    <text x="650" y="655" font-family="Arial, sans-serif" font-size="14">„Welttag der Büroklammer"</text>
    <line x1="650" y1="685" x2="950" y2="685" stroke="#000"/>
    <text x="650" y="715" font-family="Arial, sans-serif" font-size="14">• Folie 27 schöner machen</text>
    
    <!-- Exclamation Marks -->
    <line x1="950" y1="620" x2="940" y2="635" stroke="#000"/>
    <line x1="950" y1="635" x2="940" y2="650" stroke="#000"/>
    <line x1="950" y1="650" x2="940" y2="665" stroke="#000"/>
  </g>

  <!-- Side Notes -->
  
  <!-- Left Note (Heart) -->
  <g id="note-left">
    <path d="M 120 560 Q 140 580 160 560 L 160 540 Q 120 580 80 540 Z" fill="#000"/>
    <text x="100" y="590" font-family="Arial, sans-serif" font-size="12">Erledigen,</text>
    <text x="90" y="605" font-family="Arial, sans-serif" font-size="12">wenn das</text>
    <text x="90" y="620" font-family="Arial, sans-serif" font-size="12">Internet</text>
    <text x="90" y="635" font-family="Arial, sans-serif" font-size="12">wieder da</text>
    <text x="90" y="650" font-family="Arial, sans-serif" font-size="12">ist. ☺</text>
  </g>

  <!-- Right Top Note (Coffee) -->
  <g id="note-right-top">
    <path d="M 1050 160 L 1080 200 L 1050 240 Z" fill="#000"/> <!-- Cup -->
    <circle cx="1065" cy="180" r="20" fill="#fff"/>
    <circle cx="1065" cy="180" r="12" fill="#000"/>
    <line x1="1065" y1="140" x2="1080" y2="150" stroke="#000"/> <!-- Steam -->
    <text x="1040" y="260" font-family="Arial, sans-serif" font-size="14">Kaffee</text>
    <text x="1040" y="280" font-family="Arial, sans-serif" font-size="14">zählt nicht.</text>
    <text x="1040" y="300" font-family="Arial, sans-serif" font-size="14">Aber hilft.</text>
    <circle cx="1065" cy="320" r="4" fill="#000"/>
  </g>

</svg>